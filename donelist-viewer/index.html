function pad2(n) { return String(n).padStart(2, "0"); }
function dateStr(y, m, d) { return y + "-" + pad2(m) + "-" + pad2(d); }

function getLogDate() {
  const d = new Date();
  if (d.getHours() < 4) d.setDate(d.getDate() - 1);
  return { y: d.getFullYear(), m: d.getMonth() + 1, d: d.getDate() };
}

function weekNumFromFirst(year, month) {
  // month??0遺???쒖옉. ?대떦 ??1?쇱씠 ?ы븿??二쇱쓽 ?붿슂?쇱쓣 諛섑솚
  const firstOfMonth = new Date(year, month, 1);
  const firstDow = firstOfMonth.getDay();
  const firstWeekMon = new Date(firstOfMonth);
  firstWeekMon.setDate(1 - ((firstDow + 6) % 7));
  return firstWeekMon;
}

function getWeekRange(y, m, d) {
  const date = new Date(y, m - 1, d);
  const dow = date.getDay();
  const mon = new Date(date);
  mon.setDate(date.getDate() - ((dow + 6) % 7));
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);

  const monY = mon.getFullYear(), monM = mon.getMonth();
  const sunY = sun.getFullYear(), sunM = sun.getMonth();

  let label;
  if (monM === sunM && monY === sunY) {
    // ?????덉뿉 ?덈뒗 二???洹???1?쇱씠 ?ы븿??二쇰????멸린
    const base = weekNumFromFirst(monY, monM);
    const wn = Math.round((mon - base) / (7 * 86400000)) + 1;
    label = monY + "??" + (monM + 1) + "??" + wn + "二쇱감";
  } else {
    // ???ъ뿉 嫄몄튇 二???蹂묎린
    // ?댁쟾 ?? ?⑥닚???붿슂???좎쭨 湲곗?
    const wnOld = Math.ceil(mon.getDate() / 7);
    if (monY === sunY) {
      label = monY + "??" + (monM + 1) + "??" + wnOld + "二쇱감 / " + (sunM + 1) + "??1二쇱감";
    } else {
      label = monY + "??" + (monM + 1) + "??" + wnOld + "二쇱감 / " + sunY + "??" + (sunM + 1) + "??1二쇱감";
    }
  }

  return {
    start: dateStr(mon.getFullYear(), mon.getMonth() + 1, mon.getDate()),
    end: dateStr(sun.getFullYear(), sun.getMonth() + 1, sun.getDate()),
    label: label
  };
}

function getMonthRange(y, m) {
  const last = new Date(y, m, 0).getDate();
  return {
    start: dateStr(y, m, 1),
    end: dateStr(y, m, last),
    label: y + "??" + m + "??
  };
}

function getYearRange(y) {
  return {
    start: dateStr(y, 1, 1),
    end: dateStr(y, 12, 31),
    label: y + "??
  };
}

function shiftWeek(startStr, delta) {
  const d = new Date(startStr);
  d.setDate(d.getDate() + delta * 7);
  return getWeekRange(d.getFullYear(), d.getMonth() + 1, d.getDate());
}

function shiftMonth(y, m, delta) {
  let nm = m + delta;
  let ny = y;
  while (nm < 1) { nm += 12; ny--; }
  while (nm > 12) { nm -= 12; ny++; }
  return getMonthRange(ny, nm);
}

function shiftYear(y, delta) {
  return getYearRange(y + delta);
}

function formatDateLabel(dateKey) {
  const [y, m, d] = dateKey.split("-");
  const dow = ["??, "??, "??, "??, "紐?, "湲?, "??];
  const date = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
  return parseInt(m) + "??" + parseInt(d) + "??(" + dow[date.getDay()] + ")";
}

function formatTime(ts) {
  const d = new Date(ts);
  return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}

/* ?? Firebase ?곗씠??濡쒕뱶 ?? */
function parseDocData(data) {
  let items = [];
  if (data.items) { try { items = JSON.parse(data.items); } catch(e) {} }
  else if (data.entries) { items = data.entries; }
  return {
    items,
    moods: data.moods || [],
    periodStart: data.periodStart || false,
    periodEnd: data.periodEnd || false,
    statusLog: data.statusLog || [],
  };
}

async function loadDateRange(startDate, endDate) {
  const snap = await fireDb.collection("dailyLogEntries")
    .where(firebase.firestore.FieldPath.documentId(), ">=", startDate)
    .where(firebase.firestore.FieldPath.documentId(), "<=", endDate)
    .get();
  const result = {};
  snap.forEach(doc => {
    const parsed = parseDocData(doc.data());
    if (parsed.items.length > 0 || parsed.moods.length > 0 || parsed.statusLog.length > 0 || parsed.periodStart || parsed.periodEnd) {
      result[doc.id] = parsed;
    }
  });
  return result;
}

async function loadAll() {
  const snap = await fireDb.collection("dailyLogEntries").get();
  const result = {};
  snap.forEach(doc => {
    const parsed = parseDocData(doc.data());
    if (parsed.items.length > 0 || parsed.moods.length > 0 || parsed.statusLog.length > 0 || parsed.periodStart || parsed.periodEnd) {
      result[doc.id] = parsed;
    }
  });
  return result;
}

/* ?? 硫붿씤 ???? */
function DonelistViewer() {
  const today = getLogDate();
  const todayKey = dateStr(today.y, today.m, today.d);

  // 酉?紐⑤뱶: week, month, year, all
  const [viewMode, setViewMode] = useState("week");

  // 湲곌컙 ?곹깭
  const [weekRange, setWeekRange] = useState(() => getWeekRange(today.y, today.m, today.d));
  const [monthRange, setMonthRange] = useState(() => getMonthRange(today.y, today.m));
  const [yearRange, setYearRange] = useState(() => getYearRange(today.y));

  // 移댄뀒怨좊━ ?꾪꽣
  const [catFilter, setCatFilter] = useState("all");

  // ?곗씠??  const [rawData, setRawData] = useState({});
  const [loading, setLoading] = useState(true);

  // ?섏씠吏?  const [page, setPage] = useState(1);

  // ?섏씠吏 蹂寃???留??꾨줈 ?ㅽ겕濡?  useEffect(() => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [page]);

  // ?묎린/?쇱튂湲?(?좎쭨蹂?
  const [collapsed, setCollapsed] = useState({});

  // ?곹깭 ?⑤꼸 (?좎쭨 ?대룞 媛??
  const [statusDate, setStatusDate] = useState(todayKey);
  const [statusOpen, setStatusOpen] = useState(false);
  const [todayStatus, setTodayStatus] = useState({ moods: [], periodStart: false, periodEnd: false, statusLog: [] });
  const [tagConfig, setTagConfig] = useState({ tags: [], events: [] });
  const [newTag, setNewTag] = useState("");
  const [newEvent, setNewEvent] = useState("");
  const [editMode, setEditMode] = useState(false);

  // ?앸━ 二쇨린 硫뷀? ?곹깭 (?쒖꽦 ?щ? + ?쒖옉??
  const [periodMeta, setPeriodMeta] = useState({ active: false, startDate: null });

  // ?쒓렇 ?ㅼ젙 + ?앸━ 硫뷀? 濡쒕뱶 (1??
  useEffect(() => {
    loadTagConfig().then(setTagConfig);
    fireDb.collection("dailyLogMeta").doc("periodState").get().then(doc => {
      if (doc.exists) setPeriodMeta(doc.data());
    });
  }, []);

  // ?좏깮 ?좎쭨 ?곹깭 濡쒕뱶
  useEffect(() => {
    setTodayStatus({ moods: [], periodStart: false, periodEnd: false, statusLog: [] });
    fireDb.collection("dailyLogEntries").doc(statusDate).get().then(doc => {
      if (doc.exists) {
        const d = doc.data();
        setTodayStatus({ moods: d.moods || [], periodStart: d.periodStart || false, periodEnd: d.periodEnd || false, statusLog: d.statusLog || [] });
      }
    });
  }, [statusDate]);

  function savePeriodMeta(meta) {
    fireDb.collection("dailyLogMeta").doc("periodState").set(meta)
      .catch(e => console.warn("periodMeta save failed:", e));
  }

  const togglePeriodStart = () => {
    const newVal = !todayStatus.periodStart;
    const next = { ...todayStatus, periodStart: newVal, periodEnd: false };
    setTodayStatus(next);
    saveDayStatus(statusDate, { periodStart: newVal, periodEnd: false });
    const meta = newVal ? { active: true, startDate: statusDate } : { active: false, startDate: null };
    setPeriodMeta(meta);
    savePeriodMeta(meta);
    setRawData(prev => {
      const dayData = prev[statusDate] || { items: [], moods: [], periodStart: false, periodEnd: false, statusLog: [] };
      return { ...prev, [statusDate]: { ...dayData, periodStart: newVal, periodEnd: false } };
    });
  };

  const togglePeriodEnd = () => {
    const newVal = !todayStatus.periodEnd;
    const next = { ...todayStatus, periodEnd: newVal };
    setTodayStatus(next);
    saveDayStatus(statusDate, { periodEnd: newVal });
    const meta = newVal ? { active: false, startDate: null } : { active: true, startDate: periodMeta.startDate || statusDate };
    setPeriodMeta(meta);
    savePeriodMeta(meta);
    setRawData(prev => {
      const dayData = prev[statusDate] || { items: [], moods: [], periodStart: false, periodEnd: false, statusLog: [] };
      return { ...prev, [statusDate]: { ...dayData, periodEnd: newVal } };
    });
  };

  const [pendingStatus, setPendingStatus] = useState(null); // { type, value }
  const [statusNote, setStatusNote] = useState("");
  const statusNoteRef = React.useRef(null);

  const startStatusEntry = (type, value) => {
    setPendingStatus({ type, value });
    setStatusNote("");
    setTimeout(() => statusNoteRef.current && statusNoteRef.current.focus(), 100);
  };

  const confirmStatusEntry = () => {
    if (!pendingStatus) return;
    const entry = { type: pendingStatus.type, value: pendingStatus.value, time: Date.now() };
    if (statusNote.trim()) entry.note = statusNote.trim();
    const next = { ...todayStatus, statusLog: [...todayStatus.statusLog, entry] };
    setTodayStatus(next);
    saveDayStatus(statusDate, { statusLog: next.statusLog });
    setRawData(prev => {
      const dayData = prev[statusDate] || { items: [], moods: [], periodStart: false, periodEnd: false, statusLog: [] };
      return { ...prev, [statusDate]: { ...dayData, statusLog: next.statusLog } };
    });
    setPendingStatus(null);
    setStatusNote("");
  };

  const cancelStatusEntry = () => {
    setPendingStatus(null);
    setStatusNote("");
  };

  const removeStatusEntry = (index) => {
    const next = { ...todayStatus, statusLog: todayStatus.statusLog.filter((_, i) => i !== index) };
    setTodayStatus(next);
    saveDayStatus(statusDate, { statusLog: next.statusLog });
    setRawData(prev => {
      const dayData = prev[statusDate] || { items: [], moods: [], periodStart: false, periodEnd: false, statusLog: [] };
      return { ...prev, [statusDate]: { ...dayData, statusLog: next.statusLog } };
    });
  };

  const addTagToPool = (tag) => {
    if (!tag.trim() || tagConfig.tags.includes(tag.trim())) return;
    const next = { ...tagConfig, tags: [...tagConfig.tags, tag.trim()] };
    setTagConfig(next);
    saveTagConfig(next);
    setNewTag("");
  };

  const addEventToPool = (evt) => {
    if (!evt.trim() || tagConfig.events.includes(evt.trim())) return;
    const next = { ...tagConfig, events: [...tagConfig.events, evt.trim()] };
    setTagConfig(next);
    saveTagConfig(next);
    setNewEvent("");
  };

  const removeTagFromPool = (tag) => {
    const next = { ...tagConfig, tags: tagConfig.tags.filter(t => t !== tag) };
    setTagConfig(next);
    saveTagConfig(next);
  };

  const removeEventFromPool = (evt) => {
    const next = { ...tagConfig, events: tagConfig.events.filter(e => e !== evt) };
    setTagConfig(next);
    saveTagConfig(next);
  };

  // ?꾩옱 湲곌컙 ?뺣낫
  const currentRange = useMemo(() => {
    if (viewMode === "week") return weekRange;
    if (viewMode === "month") return monthRange;
    if (viewMode === "year") return yearRange;
    return { start: null, end: null, label: "?꾩껜" };
  }, [viewMode, weekRange, monthRange, yearRange]);

  // ?곗씠??濡쒕뱶
  useEffect(() => {
    setLoading(true);
    setPage(1);
    setCollapsed({});
    const doLoad = async () => {
      let data;
      if (viewMode === "all") {
        data = await loadAll();
      } else {
        data = await loadDateRange(currentRange.start, currentRange.end);
      }
      setRawData(data);
      setLoading(false);
    };
    doLoad();
  }, [viewMode, currentRange.start, currentRange.end]);

  // ?앸━ 湲곌컙 怨꾩궛: ?쒖옉~醫낅즺 ?ъ씠 紐⑤뱺 ?좎쭨瑜?'start'|'end'|'ongoing'?쇰줈 留ㅽ븨
  const periodDays = useMemo(() => {
    const allDates = Object.keys(rawData).sort();
    const result = {}; // dateKey -> 'start' | 'end' | 'ongoing'
    // ?꾩옱 酉?踰붿쐞 ?댁쟾???쒖옉???앸━媛 ?덈뒗吏 ?뺤씤
    let inPeriod = false;
    if (periodMeta.active && periodMeta.startDate && allDates.length > 0 && periodMeta.startDate < allDates[0]) {
      inPeriod = true;
    }
    for (const date of allDates) {
      const day = rawData[date];
      if (day.periodStart) {
        inPeriod = true;
        result[date] = 'start';
      } else if (day.periodEnd) {
        result[date] = 'end';
        inPeriod = false;
      } else if (inPeriod) {
        result[date] = 'ongoing';
      }
    }
    return result;
  }, [rawData, periodMeta]);

  // ?꾪꽣留곷맂 ?꾩씠??(?좎쭨蹂?洹몃９)
  const { dateGroups, totalItems, filteredItems } = useMemo(() => {
    const dates = Object.keys(rawData).sort().reverse();
    const groups = [];
    let total = 0;
    const allItems = [];

    dates.forEach(dateKey => {
      const dayData = rawData[dateKey] || {};
      const items = dayData.items || [];
      const filtered = catFilter === "all"
        ? items
        : items.filter(item => item.category === catFilter);
      if (filtered.length > 0) {
        // 移댄뀒怨좊━ ?쒖꽌 ??媛숈? 移댄뀒怨좊━ ?덉뿉???쒓컙??        const sorted = [...filtered].sort((a, b) => {
          const catDiff = (catOrder[a.category] ?? 99) - (catOrder[b.category] ?? 99);
          if (catDiff !== 0) return catDiff;
          return a.timestamp - b.timestamp;
        });
        groups.push({ dateKey, items: sorted });
        total += sorted.length;
        sorted.forEach(item => allItems.push({ ...item, dateKey }));
      }
    });

    return { dateGroups: groups, totalItems: total, filteredItems: allItems };
  }, [rawData, catFilter]);

  // ?섏씠吏?ㅼ씠???곸슜
  const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));
  const pagedItems = useMemo(() => {
    const start = (page - 1) * ITEMS_PER_PAGE;
    const end = start + ITEMS_PER_PAGE;
    return filteredItems.slice(start, end);
  }, [filteredItems, page]);

  // ?섏씠吏???대떦?섎뒗 ?좎쭨 洹몃９?쇰줈 ?ш뎄??  const pagedGroups = useMemo(() => {

    return groups;

  // 湲곌컙 ?대룞

    setPage(1);
    setCollapsed({});

      const [y, m] = monthRange.start.split("-").map(Number);
      setMonthRange(shiftMonth(y, m, -1));
    }
    else if (viewMode === "year") {
      const y = parseInt(yearRange.start);
      setYearRange(shiftYear(y, -1));
    }
  };

  const goNext = () => {
    setPage(1);
    setCollapsed({});
    if (viewMode === "week") setWeekRange(r => shiftWeek(r.start, 1));
    else if (viewMode === "month") {
      const [y, m] = monthRange.start.split("-").map(Number);
      setMonthRange(shiftMonth(y, m, 1));
    }
    else if (viewMode === "year") {
      const y = parseInt(yearRange.start);
      setYearRange(shiftYear(y, 1));

  // ?꾩껜 ?묎린/?쇱튂湲?  const allCollapsed = pagedGroups.length > 0 && pagedGroups.every(g => collapsed[g.dateKey]);
  const toggleAll = () => {
    if (allCollapsed) {
      setCollapsed({});
    } else {
      const next = {};
      pagedGroups.forEach(g => { next[g.dateKey] = true; });
      setCollapsed(next);
    }
  };

  // 移댄뀒怨좊━蹂?嫄댁닔 (?꾩옱 湲곌컙 ??
  const catCounts = useMemo(() => {
    const counts = { all: 0 };

      (dayData.items || []).forEach(item => {

    return counts;
  }, [rawData]);

  return (

              {/* 硫붾え ?낅젰? */}

                    {pendingStatus.type === "tag" ? "?쒓렇" : "?대깽??}: {pendingStatus.value}
                  </p>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input ref={statusNoteRef} type="text" value={statusNote} onChange={e => setStatusNote(e.target.value)}

                      style={S.statusNoteInput} />
                    <button onClick={confirmStatusEntry} style={S.statusConfirmBtn}>?뺤씤</button>
                    <button onClick={cancelStatusEntry} style={S.statusCancelBtn}>痍⑥냼</button>

              )}

              {/* ?ㅻ뒛??湲곕줉 */}
              {todayStatus.statusLog.length > 0 && (
                <div>
                  <span style={{ fontSize: 12, color: "#999", display: "block", marginBottom: 6 }}>{statusDate === todayKey ? "?ㅻ뒛??湲곕줉" : formatDateLabel(statusDate) + " 湲곕줉"}</span>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    {todayStatus.statusLog.map((entry, i) => (

                const dayMoods = dayData.moods || [];

                      </div>
                    )}

                );
              })}
            </div>

            {/* ?섏씠吏?ㅼ씠??*/}
            {totalPages > 1 && (
              <div style={S.pagination}>
                <button className="page-btn" style={{ ...S.pageBtn, opacity: page > 1 ? 1 : 0.3 }}
                  disabled={page <= 1} onClick={() => setPage(p => p - 1)}>? ?댁쟾</button>

                <div style={S.pageNumbers}>
                  {(() => {
                    const pages = [];
                    let start = Math.max(1, page - 2);

                    if (start > 1) {
                      pages.push(
                        <button key={1} className="page-btn" style={{ ...S.pageNumBtn, ...(page === 1 ? S.pageNumActive : {}) }}

                      );
                      if (start > 2) pages.push(<span key="d1" style={S.pageDots}>...</span>);

                    for (let i = start; i <= end; i++) {
                      pages.push(
                        <button key={i} className="page-btn" style={{ ...S.pageNumBtn, ...(page === i ? S.pageNumActive : {}) }}

                      pages.push(
                        <button key={totalPages} className="page-btn" style={{ ...S.pageNumBtn, ...(page === totalPages ? S.pageNumActive : {}) }}
                          onClick={() => setPage(totalPages)}>{totalPages}</button>
                      );
                    }

                    return pages;
                  })()}
                </div>

                <button className="page-btn" style={{ ...S.pageBtn, opacity: page < totalPages ? 1 : 0.3 }}
                  disabled={page >= totalPages} onClick={() => setPage(p => p + 1)}>?ㅼ쓬 ??/button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}
