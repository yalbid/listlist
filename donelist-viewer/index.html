<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ── Firebase ── */
const firebaseApp = firebase.initializeApp({
  apiKey: "AIzaSyC5zu4j-_ZChJQcEAEAZn9oBY1_amymnEM",
  authDomain: "happycalendar-1dd07.firebaseapp.com",
  projectId: "happycalendar-1dd07",
  storageBucket: "happycalendar-1dd07.firebasestorage.app",
  messagingSenderId: "961264346042",
  appId: "1:961264346042:web:35c85ff0a1c02ab2acb383"
});
const fireDb = firebaseApp.firestore();
const fireAuth = firebaseApp.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

/* ── 기분 아이콘 ── */
const MOOD_ICONS = [
  { value: 1, emoji: "\u{1F622}", label: "매우 안좋음" },
  { value: 2, emoji: "\u{1F614}", label: "안좋음" },
  { value: 3, emoji: "\u{1F610}", label: "보통" },
  { value: 4, emoji: "\u{1F60A}", label: "좋음" },
  { value: 5, emoji: "\u{1F604}", label: "매우 좋음" },
];
const moodMap = {};
MOOD_ICONS.forEach(m => { moodMap[m.value] = m; });

/* ── 카테고리 ── */
const CATEGORIES = [
  { id: "manga", label: "만화", emoji: "\u{1F4D6}", color: "#e8927c" },
  { id: "illust", label: "일러스트", emoji: "\u{1F3A8}", color: "#d4a574" },
  { id: "writing", label: "글", emoji: "\u270D\uFE0F", color: "#7cb5a0" },
  { id: "dev", label: "개발", emoji: "\u{1F4BB}", color: "#7ca3c4" },
  { id: "dojin", label: "동인", emoji: "\u{1F4D5}", color: "#c97ca0" },
  { id: "etc", label: "기타", emoji: "\u{1F4CC}", color: "#b39dcc" },
];
const catMap = {};
const catOrder = {};
CATEGORIES.forEach((c, i) => { catMap[c.id] = c; catOrder[c.id] = i; });

const ITEMS_PER_PAGE = 50;

/* ── 날짜 유틸 ── */
function pad2(n) { return String(n).padStart(2, "0"); }
function dateStr(y, m, d) { return y + "-" + pad2(m) + "-" + pad2(d); }

function getLogDate() {
  const d = new Date();
  if (d.getHours() < 4) d.setDate(d.getDate() - 1);
  return { y: d.getFullYear(), m: d.getMonth() + 1, d: d.getDate() };
}

function weekNumFromFirst(year, month) {
  // month는 0부터 시작. 해당 월 1일이 포함된 주의 월요일을 반환
  const firstOfMonth = new Date(year, month, 1);
  const firstDow = firstOfMonth.getDay();
  const firstWeekMon = new Date(firstOfMonth);
  firstWeekMon.setDate(1 - ((firstDow + 6) % 7));
  return firstWeekMon;
}

function getWeekRange(y, m, d) {
  const date = new Date(y, m - 1, d);
  const dow = date.getDay();
  const mon = new Date(date);
  mon.setDate(date.getDate() - ((dow + 6) % 7));
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);

  const monY = mon.getFullYear(), monM = mon.getMonth();
  const sunY = sun.getFullYear(), sunM = sun.getMonth();

  let label;
  if (monM === sunM && monY === sunY) {
    // 한 달 안에 있는 주 → 그 달 1일이 포함된 주부터 세기
    const base = weekNumFromFirst(monY, monM);
    const wn = Math.round((mon - base) / (7 * 86400000)) + 1;
    label = monY + "년 " + (monM + 1) + "월 " + wn + "주차";
  } else {
    // 두 달에 걸친 주 → 병기
    // 이전 달: 단순히 월요일 날짜 기준
    const wnOld = Math.ceil(mon.getDate() / 7);
    if (monY === sunY) {
      label = monY + "년 " + (monM + 1) + "월 " + wnOld + "주차 / " + (sunM + 1) + "월 1주차";
    } else {
      label = monY + "년 " + (monM + 1) + "월 " + wnOld + "주차 / " + sunY + "년 " + (sunM + 1) + "월 1주차";
    }
  }

  return {
    start: dateStr(mon.getFullYear(), mon.getMonth() + 1, mon.getDate()),
    end: dateStr(sun.getFullYear(), sun.getMonth() + 1, sun.getDate()),
    label: label
  };
}

function getMonthRange(y, m) {
  const last = new Date(y, m, 0).getDate();
  return {
    start: dateStr(y, m, 1),
    end: dateStr(y, m, last),
    label: y + "년 " + m + "월"
  };
}

function getYearRange(y) {
  return {
    start: dateStr(y, 1, 1),
    end: dateStr(y, 12, 31),
    label: y + "년"
  };
}

function shiftWeek(startStr, delta) {
  const d = new Date(startStr);
  d.setDate(d.getDate() + delta * 7);
  return getWeekRange(d.getFullYear(), d.getMonth() + 1, d.getDate());
}

function shiftMonth(y, m, delta) {
  let nm = m + delta;
  let ny = y;
  while (nm < 1) { nm += 12; ny--; }
  while (nm > 12) { nm -= 12; ny++; }
  return getMonthRange(ny, nm);
}

function shiftYear(y, delta) {
  return getYearRange(y + delta);
}

function formatDateLabel(dateKey) {
  const [y, m, d] = dateKey.split("-");
  const dow = ["일", "월", "화", "수", "목", "금", "토"];
  const date = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
  return parseInt(m) + "월 " + parseInt(d) + "일 (" + dow[date.getDay()] + ")";
}

function formatTime(ts) {
  const d = new Date(ts);
  return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}

/* ── Firebase 데이터 로드 ── */
function parseDocData(data) {
  let items = [];
  if (data.items) { try { items = JSON.parse(data.items); } catch(e) {} }
  else if (data.entries) { items = data.entries; }
  return {
    items,
    moods: data.moods || [],
    periodStart: data.periodStart || false,
    statusLog: data.statusLog || [],
  };
}

async function loadDateRange(startDate, endDate) {
  const snap = await fireDb.collection("dailyLogEntries")
    .where(firebase.firestore.FieldPath.documentId(), ">=", startDate)
    .where(firebase.firestore.FieldPath.documentId(), "<=", endDate)
    .get();
  const result = {};
  snap.forEach(doc => {
    const parsed = parseDocData(doc.data());
    if (parsed.items.length > 0 || parsed.moods.length > 0 || parsed.statusLog.length > 0 || parsed.periodStart) {
      result[doc.id] = parsed;
    }
  });
  return result;
}

async function loadAll() {
  const snap = await fireDb.collection("dailyLogEntries").get();
  const result = {};
  snap.forEach(doc => {
    const parsed = parseDocData(doc.data());
    if (parsed.items.length > 0 || parsed.moods.length > 0 || parsed.statusLog.length > 0 || parsed.periodStart) {
      result[doc.id] = parsed;
    }
  });
  return result;
}

async function loadTagConfig() {
  try {
    const doc = await fireDb.collection("dailyLogMeta").doc("tagConfig").get();
    if (!doc.exists) return { tags: ["친구", "가족", "마감", "동인행사", "입금일"], events: ["내원", "통증", "약변경"] };
    return doc.data();
  } catch(e) { return { tags: ["친구", "가족", "마감", "동인행사", "입금일"], events: ["내원", "통증", "약변경"] }; }
}

function saveTagConfig(config) {
  fireDb.collection("dailyLogMeta").doc("tagConfig").set(config)
    .catch(e => console.warn("tagConfig save failed:", e));
}

function saveDayStatus(dateKey, fields) {
  fireDb.collection("dailyLogEntries").doc(dateKey).set(fields, { merge: true })
    .catch(e => console.warn("status save failed:", e));
}

/* ── 인증 게이트 ── */
function AuthGate({ children }) {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [err, setErr] = useState("");
  useEffect(() => {
    const unsub = fireAuth.onAuthStateChanged(u => { setUser(u); setChecking(false); });
    return unsub;
  }, []);
  const doLogin = () => {
    setErr("");
    fireAuth.signInWithPopup(googleProvider).catch(e => {
      setErr(
        e.code === "auth/popup-blocked"
          ? "팝업이 차단되었습니다. 브라우저 팝업 차단을 해제해주세요."
          : e.message
      );
    });
  };
  if (checking) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "#1a1a2e", color: "#999", fontFamily: "Noto Sans KR, sans-serif" }}>
      <p>확인 중...</p>
    </div>
  );
  if (!user) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", gap: 16, background: "#1a1a2e", fontFamily: "Noto Sans KR, sans-serif" }}>
      <div style={{ fontSize: 48, marginBottom: 8 }}>📋</div>
      <p style={{ fontSize: 15, color: "#999" }}>로그인이 필요합니다</p>
      <button onClick={doLogin} style={{ padding: "10px 28px", fontSize: 14, background: "#b8a9d4", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontFamily: "inherit" }}>Google 계정으로 로그인</button>
      {err && <p style={{ fontSize: 12, color: "#e06060", maxWidth: 400, textAlign: "center", lineHeight: 1.5, padding: "0 20px" }}>{err}</p>}
    </div>
  );
  return children;
}

/* ── 메인 앱 ── */
function DonelistViewer() {
  const today = getLogDate();
  const todayKey = dateStr(today.y, today.m, today.d);

  // 뷰 모드: week, month, year, all
  const [viewMode, setViewMode] = useState("week");

  // 기간 상태
  const [weekRange, setWeekRange] = useState(() => getWeekRange(today.y, today.m, today.d));
  const [monthRange, setMonthRange] = useState(() => getMonthRange(today.y, today.m));
  const [yearRange, setYearRange] = useState(() => getYearRange(today.y));

  // 카테고리 필터
  const [catFilter, setCatFilter] = useState("all");

  // 데이터
  const [rawData, setRawData] = useState({});
  const [loading, setLoading] = useState(true);

  // 페이징
  const [page, setPage] = useState(1);

  // 페이지 변경 시 맨 위로 스크롤
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [page]);

  // 접기/펼치기 (날짜별)
  const [collapsed, setCollapsed] = useState({});

  // 오늘의 상태 패널
  const [statusOpen, setStatusOpen] = useState(false);
  const [todayStatus, setTodayStatus] = useState({ moods: [], periodStart: false, statusLog: [] });
  const [tagConfig, setTagConfig] = useState({ tags: [], events: [] });
  const [newTag, setNewTag] = useState("");
  const [newEvent, setNewEvent] = useState("");
  const [editMode, setEditMode] = useState(false);

  // 태그 설정 + 오늘 상태 로드
  useEffect(() => {
    loadTagConfig().then(setTagConfig);
    fireDb.collection("dailyLogEntries").doc(todayKey).get().then(doc => {
      if (doc.exists) {
        const d = doc.data();
        setTodayStatus({ moods: d.moods || [], periodStart: d.periodStart || false, statusLog: d.statusLog || [] });
      }
    });
  }, []);

  const togglePeriod = () => {
    const next = { ...todayStatus, periodStart: !todayStatus.periodStart };
    setTodayStatus(next);
    saveDayStatus(todayKey, { periodStart: next.periodStart });
    // rawData도 업데이트
    setRawData(prev => {
      const dayData = prev[todayKey] || { items: [], moods: [], periodStart: false, statusLog: [] };
      return { ...prev, [todayKey]: { ...dayData, periodStart: next.periodStart } };
    });
  };

  const addStatusEntry = (type, value) => {
    const entry = { type, value, time: Date.now() };
    const next = { ...todayStatus, statusLog: [...todayStatus.statusLog, entry] };
    setTodayStatus(next);
    saveDayStatus(todayKey, { statusLog: next.statusLog });
    setRawData(prev => {
      const dayData = prev[todayKey] || { items: [], moods: [], periodStart: false, statusLog: [] };
      return { ...prev, [todayKey]: { ...dayData, statusLog: next.statusLog } };
    });
  };

  const removeStatusEntry = (index) => {
    const next = { ...todayStatus, statusLog: todayStatus.statusLog.filter((_, i) => i !== index) };
    setTodayStatus(next);
    saveDayStatus(todayKey, { statusLog: next.statusLog });
    setRawData(prev => {
      const dayData = prev[todayKey] || { items: [], moods: [], periodStart: false, statusLog: [] };
      return { ...prev, [todayKey]: { ...dayData, statusLog: next.statusLog } };
    });
  };

  const addTagToPool = (tag) => {
    if (!tag.trim() || tagConfig.tags.includes(tag.trim())) return;
    const next = { ...tagConfig, tags: [...tagConfig.tags, tag.trim()] };
    setTagConfig(next);
    saveTagConfig(next);
    setNewTag("");
  };

  const addEventToPool = (evt) => {
    if (!evt.trim() || tagConfig.events.includes(evt.trim())) return;
    const next = { ...tagConfig, events: [...tagConfig.events, evt.trim()] };
    setTagConfig(next);
    saveTagConfig(next);
    setNewEvent("");
  };

  const removeTagFromPool = (tag) => {
    const next = { ...tagConfig, tags: tagConfig.tags.filter(t => t !== tag) };
    setTagConfig(next);
    saveTagConfig(next);
  };

  const removeEventFromPool = (evt) => {
    const next = { ...tagConfig, events: tagConfig.events.filter(e => e !== evt) };
    setTagConfig(next);
    saveTagConfig(next);
  };

  // 현재 기간 정보
  const currentRange = useMemo(() => {
    if (viewMode === "week") return weekRange;
    if (viewMode === "month") return monthRange;
    if (viewMode === "year") return yearRange;
    return { start: null, end: null, label: "전체" };
  }, [viewMode, weekRange, monthRange, yearRange]);

  // 데이터 로드
  useEffect(() => {
    setLoading(true);
    setPage(1);
    setCollapsed({});
    const doLoad = async () => {
      let data;
      if (viewMode === "all") {
        data = await loadAll();
      } else {
        data = await loadDateRange(currentRange.start, currentRange.end);
      }
      setRawData(data);
      setLoading(false);
    };
    doLoad();
  }, [viewMode, currentRange.start, currentRange.end]);

  // 필터링된 아이템 (날짜별 그룹)
  const { dateGroups, totalItems, filteredItems } = useMemo(() => {
    const dates = Object.keys(rawData).sort().reverse();
    const groups = [];
    let total = 0;
    const allItems = [];

    dates.forEach(dateKey => {
      const dayData = rawData[dateKey] || {};
      const items = dayData.items || [];
      const filtered = catFilter === "all"
        ? items
        : items.filter(item => item.category === catFilter);
      if (filtered.length > 0) {
        // 카테고리 순서 → 같은 카테고리 안에서 시간순
        const sorted = [...filtered].sort((a, b) => {
          const catDiff = (catOrder[a.category] ?? 99) - (catOrder[b.category] ?? 99);
          if (catDiff !== 0) return catDiff;
          return a.timestamp - b.timestamp;
        });
        groups.push({ dateKey, items: sorted });
        total += sorted.length;
        sorted.forEach(item => allItems.push({ ...item, dateKey }));
      }
    });

    return { dateGroups: groups, totalItems: total, filteredItems: allItems };
  }, [rawData, catFilter]);

  // 페이지네이션 적용
  const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));
  const pagedItems = useMemo(() => {
    const start = (page - 1) * ITEMS_PER_PAGE;
    const end = start + ITEMS_PER_PAGE;
    return filteredItems.slice(start, end);
  }, [filteredItems, page]);

  // 페이지에 해당하는 날짜 그룹으로 재구성
  const pagedGroups = useMemo(() => {
    const groups = [];
    let currentDate = null;
    let currentGroup = null;
    pagedItems.forEach(item => {
      if (item.dateKey !== currentDate) {
        currentDate = item.dateKey;
        currentGroup = { dateKey: item.dateKey, items: [] };
        groups.push(currentGroup);
      }
      currentGroup.items.push(item);
    });
    return groups;
  }, [pagedItems]);

  // 기간 이동
  const goPrev = () => {
    setPage(1);
    setCollapsed({});
    if (viewMode === "week") setWeekRange(r => shiftWeek(r.start, -1));
    else if (viewMode === "month") {
      const [y, m] = monthRange.start.split("-").map(Number);
      setMonthRange(shiftMonth(y, m, -1));
    }
    else if (viewMode === "year") {
      const y = parseInt(yearRange.start);
      setYearRange(shiftYear(y, -1));
    }
  };

  const goNext = () => {
    setPage(1);
    setCollapsed({});
    if (viewMode === "week") setWeekRange(r => shiftWeek(r.start, 1));
    else if (viewMode === "month") {
      const [y, m] = monthRange.start.split("-").map(Number);
      setMonthRange(shiftMonth(y, m, 1));
    }
    else if (viewMode === "year") {
      const y = parseInt(yearRange.start);
      setYearRange(shiftYear(y, 1));
    }
  };

  const toggleDate = (dateKey) => {
    setCollapsed(prev => ({ ...prev, [dateKey]: !prev[dateKey] }));
  };

  // 전체 접기/펼치기
  const allCollapsed = pagedGroups.length > 0 && pagedGroups.every(g => collapsed[g.dateKey]);
  const toggleAll = () => {
    if (allCollapsed) {
      setCollapsed({});
    } else {
      const next = {};
      pagedGroups.forEach(g => { next[g.dateKey] = true; });
      setCollapsed(next);
    }
  };

  // 카테고리별 건수 (현재 기간 내)
  const catCounts = useMemo(() => {
    const counts = { all: 0 };
    CATEGORIES.forEach(c => { counts[c.id] = 0; });
    Object.values(rawData).forEach(dayData => {
      (dayData.items || []).forEach(item => {
        counts.all++;
        if (counts[item.category] !== undefined) counts[item.category]++;
      });
    });
    return counts;
  }, [rawData]);

  return (
    <div style={S.container}>
      {/* 헤더 */}
      <div style={S.header}>
        <div style={S.headerTop}>
          <div>
            <h1 style={{ ...S.title, cursor: "pointer" }} onClick={() => { if (confirm("로그아웃할까요?")) fireAuth.signOut(); }} title="로그아웃">Donelist Viewer</h1>
            <p style={S.subtitle}>한 일 모아보기</p>
          </div>
          {totalItems > 0 && (
            <div style={S.badge}>
              <span style={S.badgeNum}>{totalItems}</span>
              <span style={S.badgeLabel}>건</span>
            </div>
          )}
        </div>

        {/* 뷰 모드 탭 */}
        <div style={S.tabs}>
          {[
            { id: "week", label: "주간" },
            { id: "month", label: "월간" },
            { id: "year", label: "연간" },
            { id: "all", label: "전체" },
          ].map(v => (
            <button key={v.id} className="tab-btn" style={{ ...S.tab, ...(viewMode === v.id ? S.tabActive : {}) }}
              onClick={() => { setViewMode(v.id); setPage(1); setCatFilter("all"); setCollapsed({}); }}>
              {v.label}
            </button>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <div style={S.content}>

        {/* 오늘의 상태 패널 */}
        <div style={S.statusPanel}>
          <div onClick={() => setStatusOpen(!statusOpen)} style={S.statusToggle}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#e0e0e0" }}>
              {statusOpen ? "▼" : "▶"} 오늘의 상태
            </span>
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              {todayStatus.moods.length > 0 && <span style={{ fontSize: 14 }}>{moodMap[todayStatus.moods[todayStatus.moods.length - 1].mood]?.emoji}</span>}
              {todayStatus.periodStart && <span style={{ fontSize: 12 }}>{"\u{1FA78}"}</span>}
              {todayStatus.statusLog.filter(s => s.type === "tag").length > 0 && <span style={{ fontSize: 11, color: "#b8a9d4" }}>{[...new Set(todayStatus.statusLog.filter(s => s.type === "tag").map(s => s.value))].join(" ")}</span>}
            </div>
          </div>

          {statusOpen && (
            <div style={S.statusBody}>
              {/* 생리주기 토글 */}
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <button onClick={togglePeriod} style={{
                  ...S.periodBtn,
                  background: todayStatus.periodStart ? "rgba(232,100,100,0.2)" : "rgba(255,255,255,0.06)",
                  borderColor: todayStatus.periodStart ? "#e86464" : "rgba(255,255,255,0.1)",
                  color: todayStatus.periodStart ? "#e86464" : "#888",
                }}>{"\u{1FA78}"} 생리 시작일</button>
              </div>

              {/* 태그 */}
              <div style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 12, color: "#999" }}>태그</span>
                  <button onClick={() => setEditMode(!editMode)} style={{ background: "none", border: "none", color: "#888", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{editMode ? "완료" : "편집"}</button>
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {tagConfig.tags.map(tag => (
                    <div key={tag} style={{ display: "flex", alignItems: "center", gap: 2 }}>
                      <button onClick={() => addStatusEntry("tag", tag)} style={S.tagBtn}>{tag}</button>
                      {editMode && <button onClick={() => removeTagFromPool(tag)} style={S.removePoolBtn}>×</button>}
                    </div>
                  ))}
                  <div style={{ display: "flex", gap: 4 }}>
                    <input value={newTag} onChange={e => setNewTag(e.target.value)} onKeyDown={e => e.key === "Enter" && addTagToPool(newTag)}
                      placeholder="+" style={S.tagInput} />
                  </div>
                </div>
              </div>

              {/* 이벤트 */}
              <div style={{ marginBottom: 12 }}>
                <span style={{ fontSize: 12, color: "#999", display: "block", marginBottom: 6 }}>이벤트</span>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {tagConfig.events.map(evt => (
                    <div key={evt} style={{ display: "flex", alignItems: "center", gap: 2 }}>
                      <button onClick={() => addStatusEntry("event", evt)} style={S.eventBtn}>{evt}</button>
                      {editMode && <button onClick={() => removeEventFromPool(evt)} style={S.removePoolBtn}>×</button>}
                    </div>
                  ))}
                  <div style={{ display: "flex", gap: 4 }}>
                    <input value={newEvent} onChange={e => setNewEvent(e.target.value)} onKeyDown={e => e.key === "Enter" && addEventToPool(newEvent)}
                      placeholder="+" style={S.tagInput} />
                  </div>
                </div>
              </div>

              {/* 오늘의 기록 */}
              {todayStatus.statusLog.length > 0 && (
                <div>
                  <span style={{ fontSize: 12, color: "#999", display: "block", marginBottom: 6 }}>오늘의 기록</span>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    {todayStatus.statusLog.map((entry, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, padding: "4px 8px", background: "rgba(255,255,255,0.03)", borderRadius: 6 }}>
                        <span style={{ color: entry.type === "tag" ? "#b8a9d4" : "#e8927c" }}>{entry.type === "tag" ? "태그" : "이벤트"}</span>
                        <span style={{ color: "#ccc", flex: 1 }}>{entry.value}</span>
                        <span style={{ color: "#666" }}>{formatTime(entry.time)}</span>
                        <button onClick={() => removeStatusEntry(i)} style={{ background: "none", border: "none", color: "#666", cursor: "pointer", fontSize: 14, padding: "0 2px" }}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* 기간 네비게이션 */}
        {viewMode !== "all" && (
          <div style={S.periodNav}>
            <button onClick={goPrev} style={S.navBtn}>◀</button>
            <span style={S.periodLabel}>{currentRange.label}</span>
            <button onClick={goNext} style={S.navBtn}>▶</button>
          </div>
        )}

        {/* 카테고리 필터 */}
        <div style={S.catRow}>
          <button className="cat-btn"
            style={{ ...S.catBtn, background: catFilter === "all" ? "rgba(184,169,212,0.3)" : "rgba(255,255,255,0.06)", color: catFilter === "all" ? "#e0e0e0" : "#a0a0a0", borderColor: catFilter === "all" ? "#b8a9d455" : "rgba(255,255,255,0.1)" }}
            onClick={() => { setCatFilter("all"); setPage(1); }}>
            <span style={{ fontSize: 13, fontWeight: 500 }}>전체</span>
            <span style={{ fontSize: 11, color: catFilter === "all" ? "#ccc" : "#666" }}>{catCounts.all}</span>
          </button>
          {CATEGORIES.map(cat => (
            <button key={cat.id} className="cat-btn"
              style={{ ...S.catBtn, background: catFilter === cat.id ? cat.color : "rgba(255,255,255,0.06)", color: catFilter === cat.id ? "#fff" : "#a0a0a0", borderColor: catFilter === cat.id ? cat.color : "rgba(255,255,255,0.1)" }}
              onClick={() => { setCatFilter(cat.id); setPage(1); }}>
              <span style={{ fontSize: 14 }}>{cat.emoji}</span>
              <span style={{ fontSize: 13, fontWeight: 500 }}>{cat.label}</span>
              <span style={{ fontSize: 11, color: catFilter === cat.id ? "rgba(255,255,255,0.7)" : "#666" }}>{catCounts[cat.id]}</span>
            </button>
          ))}
        </div>

        {/* 로딩 */}
        {loading ? (
          <div style={S.empty}>
            <p style={{ color: "#888", fontSize: 14 }}>불러오는 중...</p>
          </div>
        ) : totalItems === 0 ? (
          <div style={S.empty}>
            <span style={{ fontSize: 32, marginBottom: 12 }}>📭</span>
            <p style={{ color: "#777", fontSize: 14, lineHeight: 1.6 }}>이 기간에는 기록이 없어요</p>
          </div>
        ) : (
          <>
            {/* 전체 접기/펼치기 + 페이지 정보 */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <button onClick={toggleAll} style={S.toggleAllBtn}>
                {allCollapsed ? "▶ 모두 펼치기" : "▼ 모두 접기"}
              </button>
              {totalPages > 1 && (
                <span style={{ fontSize: 12, color: "#666" }}>{page} / {totalPages} 페이지</span>
              )}
            </div>

            {/* 날짜별 그룹 */}
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {pagedGroups.map(group => {
                const isCollapsed = collapsed[group.dateKey];
                const dayData = rawData[group.dateKey] || {};
                const dayMoods = dayData.moods || [];
                const lastMood = dayMoods.length > 0 ? dayMoods[dayMoods.length - 1] : null;
                const dayPeriod = dayData.periodStart;
                const dayStatusLog = dayData.statusLog || [];
                const uniqueTags = [...new Set(dayStatusLog.filter(s => s.type === "tag").map(s => s.value))];
                const uniqueEvents = [...new Set(dayStatusLog.filter(s => s.type === "event").map(s => s.value))];
                return (
                  <div key={group.dateKey} className="fade-in" style={S.dateGroup}>
                    {/* 날짜 헤더 */}
                    <div className="date-group-header" onClick={() => toggleDate(group.dateKey)}
                      style={S.dateHeader}>
                      <span style={S.collapseIcon}>{isCollapsed ? "▶" : "▼"}</span>
                      <span style={S.dateLabel}>{formatDateLabel(group.dateKey)}</span>
                      {lastMood && <span style={{ fontSize: 16 }} title={(moodMap[lastMood.mood]?.label || "") + (lastMood.note ? " — " + lastMood.note : "")}>{moodMap[lastMood.mood]?.emoji}</span>}
                      {dayPeriod && <span style={{ fontSize: 13 }} title="생리 시작일">{"\u{1FA78}"}</span>}
                      {uniqueTags.map(t => <span key={t} style={S.headerTag}>{t}</span>)}
                      {uniqueEvents.map(e => <span key={e} style={S.headerEvent}>{e}</span>)}
                      <span style={{ flex: 1 }} />
                      <span style={S.dateCount}>{group.items.length}건</span>
                    </div>

                    {/* 항목 리스트 - 카테고리별 그룹 */}
                    {!isCollapsed && (
                      <div style={S.itemList}>
                        {(() => {
                          const catGroups = [];
                          let currentCat = null;
                          group.items.forEach(item => {
                            if (item.category !== currentCat) {
                              currentCat = item.category;
                              catGroups.push({ cat: item.category, items: [] });
                            }
                            catGroups[catGroups.length - 1].items.push(item);
                          });
                          return catGroups.map(cg => {
                            const c = catMap[cg.cat] || { emoji: "?", label: "?", color: "#888" };
                            return (
                              <div key={cg.cat} style={{ borderLeft: "3px solid " + c.color, margin: "6px 12px", borderRadius: 4 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px" }}>
                                  <span style={{ fontSize: 16 }}>{c.emoji}</span>
                                  <span style={{ fontSize: 14, fontWeight: 600, color: "#e0e0e0" }}>{c.label}</span>
                                  <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 6, background: c.color + "22", color: c.color, marginLeft: "auto" }}>{cg.items.length}건</span>
                                </div>
                                {cg.items.map(item => (
                                  <div key={item.id || item.timestamp} style={{ display: "flex", alignItems: "center", gap: 12, padding: "6px 14px 6px 28px", borderTop: "1px solid rgba(255,255,255,0.04)" }}>
                                    <span style={{ flex: 1, fontSize: 14, color: "#ccc", lineHeight: 1.5 }}>{item.memo}</span>
                                    <span style={{ fontSize: 11, color: "#666", flexShrink: 0 }}>{formatTime(item.timestamp)}</span>
                                  </div>
                                ))}
                              </div>
                            );
                          });
                        })()}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* 페이지네이션 */}
            {totalPages > 1 && (
              <div style={S.pagination}>
                <button className="page-btn" style={{ ...S.pageBtn, opacity: page > 1 ? 1 : 0.3 }}
                  disabled={page <= 1} onClick={() => setPage(p => p - 1)}>◀ 이전</button>

                <div style={S.pageNumbers}>
                  {(() => {
                    const pages = [];
                    let start = Math.max(1, page - 2);
                    let end = Math.min(totalPages, start + 4);
                    if (end - start < 4) start = Math.max(1, end - 4);

                    if (start > 1) {
                      pages.push(
                        <button key={1} className="page-btn" style={{ ...S.pageNumBtn, ...(page === 1 ? S.pageNumActive : {}) }}
                          onClick={() => setPage(1)}>1</button>
                      );
                      if (start > 2) pages.push(<span key="d1" style={S.pageDots}>...</span>);
                    }

                    for (let i = start; i <= end; i++) {
                      pages.push(
                        <button key={i} className="page-btn" style={{ ...S.pageNumBtn, ...(page === i ? S.pageNumActive : {}) }}
                          onClick={() => setPage(i)}>{i}</button>
                      );
                    }

                    if (end < totalPages) {
                      if (end < totalPages - 1) pages.push(<span key="d2" style={S.pageDots}>...</span>);
                      pages.push(
                        <button key={totalPages} className="page-btn" style={{ ...S.pageNumBtn, ...(page === totalPages ? S.pageNumActive : {}) }}
                          onClick={() => setPage(totalPages)}>{totalPages}</button>
                      );
                    }

                    return pages;
                  })()}
                </div>

                <button className="page-btn" style={{ ...S.pageBtn, opacity: page < totalPages ? 1 : 0.3 }}
                  disabled={page >= totalPages} onClick={() => setPage(p => p + 1)}>다음 ▶</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

  tagInput: { background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, padding: "4px 8px", fontSize: 12, color: "#e0e0e0", width: 50, fontFamily: "'Noto Sans KR', sans-serif", outline: "none" },

  periodNav: {

    background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: "12px 16px",
  },
  navBtn: {
    background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8,
    color: "#aaa", fontSize: 12, padding: "6px 14px", cursor: "pointer", fontFamily: "'Noto Sans KR', sans-serif",
  },
  periodLabel: { fontSize: 15, fontWeight: 600, color: "#e0e0e0" },

  catRow: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 },
  catBtn: {
    display: "flex", alignItems: "center", gap: 5, padding: "7px 12px", borderRadius: 20,
    border: "1px solid", cursor: "pointer", fontFamily: "'Noto Sans KR', sans-serif",
  },

  empty: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "60px 20px", textAlign: "center" },

  toggleAllBtn: {

  dateGroup: {

  },
  dateHeader: {

  pagination: {
    display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
    marginTop: 24, padding: "16px 0",
  },
  pageBtn: {
    background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8,
    color: "#aaa", fontSize: 12, padding: "8px 14px", cursor: "pointer", fontFamily: "'Noto Sans KR', sans-serif",
  },
  pageNumbers: { display: "flex", alignItems: "center", gap: 4 },
  pageNumBtn: {
    background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 6,
    color: "#888", fontSize: 12, padding: "6px 10px", cursor: "pointer", fontFamily: "'Noto Sans KR', sans-serif",
    minWidth: 32, textAlign: "center",
  },
  pageNumActive: {
    background: "rgba(184,169,212,0.2)", borderColor: "#b8a9d455", color: "#b8a9d4", fontWeight: 600,

  pageDots: { color: "#666", fontSize: 12, padding: "0 4px" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate><DonelistViewer /></AuthGate>);
</script>
