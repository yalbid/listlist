<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포스트잇 보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F0EB;
  --bg-card: #FFFFFF;
  --bg-hover: #FFF8F2;
  --text: #3D2E1F;
  --text-sub: #7A6555;
  --text-muted: #B09A85;
  --accent: #E8945A;
  --accent-hover: #D4803F;
  --accent-light: #FFF0E3;
  --border: #EDE0D1;
  --danger: #D45B5B;
  --danger-hover: #C04040;
  --shadow: rgba(61,46,31,0.08);
  --radius: 12px;
  --font: 'Noto Sans KR', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }
button { cursor:pointer; font-family:var(--font); border:none; }
input { font-family:var(--font); }

/* 로그인 화면 */
.login-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; gap:20px;
}
.login-screen h1 { font-size:28px; font-weight:700; }
.login-screen p { color:var(--text-sub); font-size:14px; }
.login-btn {
  padding:12px 32px; background:var(--accent); color:white; border-radius:var(--radius);
  font-size:15px; font-weight:600; transition:background 0.2s;
}
.login-btn:hover { background:var(--accent-hover); }
.login-error { color:var(--danger); font-size:13px; max-width:320px; text-align:center; }

/* 상단 바 */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 24px; background:var(--bg-card); border-bottom:1px solid var(--border);
}
.topbar-title { font-size:18px; font-weight:700; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-user { font-size:13px; color:var(--text-sub); }
.topbar-btn {
  padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500;
  background:var(--bg); color:var(--text-sub); transition:all 0.2s;
}
.topbar-btn:hover { background:var(--border); }

/* 보드 목록 */
.board-list {
  max-width:720px; margin:40px auto; padding:0 20px;
}
.board-list-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;
}
.board-list-header h2 { font-size:22px; font-weight:700; }
.add-board-btn {
  padding:10px 20px; background:var(--accent); color:white; border-radius:var(--radius);
  font-size:14px; font-weight:600; transition:background 0.2s;
}
.add-board-btn:hover { background:var(--accent-hover); }

.board-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px;
}
.board-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; cursor:pointer; transition:all 0.2s; position:relative;
}
.board-card:hover { border-color:var(--accent); box-shadow:0 4px 16px var(--shadow); transform:translateY(-2px); }
.board-card-title { font-size:16px; font-weight:600; margin-bottom:8px; word-break:break-word; }
.board-card-meta { font-size:12px; color:var(--text-muted); }
.board-card-actions {
  position:absolute; top:12px; right:12px; display:none; gap:4px;
}
.board-card:hover .board-card-actions { display:flex; }
.board-action-btn {
  width:28px; height:28px; border-radius:6px; background:var(--bg);
  color:var(--text-sub); font-size:13px; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.board-action-btn:hover { background:var(--accent-light); color:var(--accent); }
.board-action-btn.danger:hover { background:#FDE8E8; color:var(--danger); }

.empty-state {
  text-align:center; padding:60px 20px; color:var(--text-muted);
}
.empty-state p { font-size:15px; margin-bottom:8px; }
.empty-state span { font-size:13px; }

/* 모달 */
.modal-overlay {
  position:fixed; inset:0; background:rgba(61,46,31,0.3); display:flex;
  align-items:center; justify-content:center; z-index:1000;
}
.modal {
  background:var(--bg-card); border-radius:var(--radius); padding:24px;
  width:90%; max-width:400px; box-shadow:0 8px 32px var(--shadow);
}
.modal h3 { font-size:17px; font-weight:600; margin-bottom:16px; }
.modal-input {
  width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px;
  font-size:14px; outline:none; background:var(--bg); transition:border 0.2s;
}
.modal-input:focus { border-color:var(--accent); }
.modal-btns { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
.modal-btn {
  padding:8px 18px; border-radius:8px; font-size:13px; font-weight:500; transition:all 0.2s;
}
.modal-btn.primary { background:var(--accent); color:white; }
.modal-btn.primary:hover { background:var(--accent-hover); }
.modal-btn.cancel { background:var(--bg); color:var(--text-sub); }
.modal-btn.cancel:hover { background:var(--border); }
.modal-btn.danger { background:var(--danger); color:white; }
.modal-btn.danger:hover { background:var(--danger-hover); }

/* 로딩 */
.loading { display:flex; align-items:center; justify-content:center; height:100vh; color:var(--text-muted); font-size:14px; }

/* 캔버스 */
.canvas-wrap {
  position:relative; flex:1; overflow:hidden; height:calc(100vh - 49px);
  background:var(--bg); cursor:grab;
}
.canvas-wrap.grabbing { cursor:grabbing; }
.canvas {
  position:absolute; top:0; left:0; width:0; height:0;
  transform-origin:0 0;
}

/* 캔버스 툴바 */
.canvas-toolbar {
  position:absolute; top:12px; left:12px; z-index:10;
  display:flex; gap:6px; align-items:center;
}
.canvas-toolbar button {
  padding:6px 12px; border-radius:8px; font-size:13px; font-weight:500;
  background:var(--bg-card); color:var(--text-sub); border:1px solid var(--border);
  transition:all 0.2s; box-shadow:0 2px 8px var(--shadow);
}
.canvas-toolbar button:hover { border-color:var(--accent); color:var(--accent); }
.zoom-display {
  font-size:12px; color:var(--text-muted); background:var(--bg-card);
  padding:4px 10px; border-radius:6px; border:1px solid var(--border);
  box-shadow:0 2px 8px var(--shadow);
}

/* 포스트잇 */
.note {
  position:absolute; width:200px; min-height:120px;
  border-radius:4px; box-shadow:2px 3px 12px rgba(0,0,0,0.1);
  display:flex; flex-direction:column; cursor:grab; user-select:none;
  transition:box-shadow 0.2s;
}
.note.has-image { width:280px; }
.note:hover { box-shadow:3px 5px 18px rgba(0,0,0,0.15); }
.note.dragging { box-shadow:5px 8px 24px rgba(0,0,0,0.2); z-index:100; cursor:grabbing; }
.note-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px 4px; font-size:11px; color:rgba(0,0,0,0.4);
}
.note-del-btn {
  width:20px; height:20px; border-radius:4px; background:transparent;
  color:rgba(0,0,0,0.3); font-size:12px; display:flex; align-items:center;
  justify-content:center; opacity:0; transition:all 0.15s;
}
.note:hover .note-del-btn { opacity:1; }
.note-del-btn:hover { background:rgba(0,0,0,0.1); color:rgba(0,0,0,0.6); }
.note-body {
  flex:1; padding:4px 10px 10px; font-size:13px; line-height:1.5;
  white-space:pre-wrap; word-break:break-word; color:rgba(0,0,0,0.75);
  outline:none; cursor:text;
}
.note-body:empty::before {
  content:'메모를 입력하세요'; color:rgba(0,0,0,0.25); font-style:italic;
}

/* 포스트잇 색상 */
.note-color-person   { background:#FFEB8A; }
.note-color-event    { background:#FF9E9E; }
.note-color-setting  { background:#A0D8EF; }
.note-color-dialogue { background:#B8E6B8; }
.note-color-etc      { background:#E0D4F5; }

/* 메모 이미지 */
.note-image {
  padding:4px 10px 6px; cursor:default;
}
.note-image img {
  width:100%; border-radius:4px; display:block;
}
.note-image-remove {
  position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%;
  background:rgba(0,0,0,0.5); color:white; font-size:10px; border:none;
  display:none; align-items:center; justify-content:center; cursor:pointer;
}
.note-image:hover .note-image-remove { display:flex; }

/* 색상 선택 바 */
.note-colors {
  display:flex; gap:3px; padding:0 10px 6px; align-items:center;
}
.color-dot {
  width:16px; height:16px; border-radius:50%; border:2px solid transparent;
  cursor:pointer; transition:all 0.15s; flex-shrink:0;
}
.color-dot:hover { transform:scale(1.2); }
.color-dot.active { border-color:rgba(0,0,0,0.4); transform:scale(1.15); }
.color-dot.c-person   { background:#FFEB8A; }
.color-dot.c-event    { background:#FF9E9E; }
.color-dot.c-setting  { background:#A0D8EF; }
.color-dot.c-dialogue { background:#B8E6B8; }
.color-dot.c-etc      { background:#E0D4F5; }

/* 태그 표시 */
.note-tags {
  display:flex; flex-wrap:wrap; gap:3px; padding:0 10px 8px;
}
.note-tag {
  font-size:11px; padding:1px 6px; border-radius:4px;
  background:rgba(0,0,0,0.08); color:rgba(0,0,0,0.5);
}

/* 메모 추가 시 색상 선택 */
.add-menu {
  position:absolute; top:12px; left:12px; z-index:20;
  background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
  padding:10px 14px; box-shadow:0 4px 16px var(--shadow);
  display:flex; flex-direction:column; gap:6px;
}
.add-menu-label { font-size:12px; color:var(--text-sub); font-weight:500; }
.add-menu-colors { display:flex; gap:6px; }
.add-color-btn {
  width:32px; height:32px; border-radius:8px; border:2px solid transparent;
  cursor:pointer; transition:all 0.15s; display:flex; align-items:center;
  justify-content:center; font-size:11px; color:rgba(0,0,0,0.45); font-weight:500;
}
.add-color-btn:hover { border-color:rgba(0,0,0,0.3); transform:scale(1.08); }
.add-color-btn.c-person   { background:#FFEB8A; }
.add-color-btn.c-event    { background:#FF9E9E; }
.add-color-btn.c-setting  { background:#A0D8EF; }
.add-color-btn.c-dialogue { background:#B8E6B8; }
.add-color-btn.c-etc      { background:#E0D4F5; }

/* 필터 바 */
.filter-bar {
  position:absolute; top:12px; right:12px; z-index:10;
  display:flex; gap:6px; align-items:center;
}
.filter-bar input {
  padding:6px 10px; border-radius:8px; font-size:13px; border:1px solid var(--border);
  background:var(--bg-card); outline:none; width:140px; box-shadow:0 2px 8px var(--shadow);
  transition:border 0.2s;
}
.filter-bar input:focus { border-color:var(--accent); }
.filter-btn {
  padding:6px 10px; border-radius:8px; font-size:12px; font-weight:500;
  background:var(--bg-card); color:var(--text-sub); border:1px solid var(--border);
  transition:all 0.2s; box-shadow:0 2px 8px var(--shadow); cursor:pointer;
}
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
.filter-dropdown {
  position:absolute; top:40px; right:0; z-index:20;
  background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
  padding:10px; box-shadow:0 4px 16px var(--shadow); min-width:180px;
}
.filter-section { margin-bottom:8px; }
.filter-section:last-child { margin-bottom:0; }
.filter-section-title { font-size:11px; color:var(--text-muted); font-weight:600; margin-bottom:4px; }
.filter-chips { display:flex; flex-wrap:wrap; gap:4px; }
.filter-chip {
  padding:3px 8px; border-radius:6px; font-size:11px; cursor:pointer;
  border:1px solid var(--border); background:var(--bg); color:var(--text-sub);
  transition:all 0.15s;
}
.filter-chip:hover { border-color:var(--accent); }
.filter-chip.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); font-weight:600; }

/* 내보내기 메뉴 */
.export-menu {
  position:absolute; top:50px; left:12px; z-index:20;
  background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
  padding:10px; box-shadow:0 4px 16px var(--shadow); min-width:160px;
}
.export-menu-label { font-size:12px; color:var(--text-sub); font-weight:500; margin-bottom:6px; }
.export-menu button {
  display:block; width:100%; text-align:left; padding:8px 10px; border-radius:6px;
  font-size:13px; background:none; color:var(--text); border:none; cursor:pointer;
  transition:background 0.15s;
}
.export-menu button:hover { background:var(--accent-light); color:var(--accent); }

/* 토스트 */
.toast {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:30;
  padding:10px 20px; border-radius:10px; font-size:13px; font-weight:500;
  box-shadow:0 4px 16px var(--shadow); animation:fadeIn 0.3s ease;
  white-space:nowrap;
}
.toast.warn { background:#FFF3CD; color:#856404; border:1px solid #FFE69C; }
.toast.alert { background:#F8D7DA; color:#842029; border:1px solid #F5C2C7; }

/* 흐리게 처리 */
.note.dimmed { opacity:0.2; pointer-events:none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Firebase 초기화 ── */
const firebaseApp = firebase.initializeApp({
  apiKey: "AIzaSyC5zu4j-_ZChJQcEAEAZn9oBY1_amymnEM",
  authDomain: "happycalendar-1dd07.firebaseapp.com",
  projectId: "happycalendar-1dd07",
  storageBucket: "happycalendar-1dd07.firebasestorage.app",
  messagingSenderId: "961264346042",
  appId: "1:961264346042:web:35c85ff0a1c02ab2acb383"
});
const db = firebaseApp.firestore();
db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
const auth = firebaseApp.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

// ★ 처음 로그인 후 콘솔에 표시되는 UID를 여기에 붙여넣으세요
const OWNER_UID = "MGKoQI29bWUFLXMKCvSysNYCtqm2";

/* ── 색상 목록 ── */
const COLORS = [
  { id: 'person', label: '인물' },
  { id: 'event', label: '사건' },
  { id: 'setting', label: '설정' },
  { id: 'dialogue', label: '대사' },
  { id: 'etc', label: '기타' },
];

/* ── 이미지 리사이즈 (max 600x600, JPEG 압축) ── */
const resizeImage = (file, maxSize = 600) => new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

/* ── 자동 그룹핑 (거리 기반 클러스터링) ── */
const autoGroup = (notes, threshold = 300) => {
  const groups = [];
  const visited = new Set();
  notes.forEach(n => {
    if (visited.has(n.id)) return;
    const group = [n];
    visited.add(n.id);
    const queue = [n];
    while (queue.length > 0) {
      const cur = queue.shift();
      notes.forEach(other => {
        if (visited.has(other.id)) return;
        const dx = (cur.x + 100) - (other.x + 100);
        const dy = (cur.y + 60) - (other.y + 60);
        if (Math.sqrt(dx * dx + dy * dy) < threshold) {
          visited.add(other.id);
          group.push(other);
          queue.push(other);
        }
      });
    }
    groups.push(group);
  });
  return groups;
};

/* ── 태그 추출 (#태그) ── */
const extractTags = (text) => {
  const matches = text.match(/#[^\s#]+/g);
  return matches ? [...new Set(matches.map(t => t.slice(1)))] : [];
};

/* ── 날짜 포맷 ── */
const fmtDate = (ts) => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
};

/* ── 모달 컴포넌트 ── */
function Modal({ title, children, onClose }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>{title}</h3>
        {children}
      </div>
    </div>
  );
}

/* ── 보드 목록 화면 ── */
function BoardList({ user, onOpenBoard }) {
  const [boards, setBoards] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [newTitle, setNewTitle] = useState('');
  const [editBoard, setEditBoard] = useState(null);
  const [editTitle, setEditTitle] = useState('');
  const [deleteTarget, setDeleteTarget] = useState(null);

  const boardsRef = db.collection('users').doc(user.uid).collection('postit_boards');

  useEffect(() => {
    const unsub = boardsRef.orderBy('updatedAt', 'desc').onSnapshot(snap => {
      setBoards(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setLoading(false);
    });
    return unsub;
  }, [user.uid]);

  const addBoard = async () => {
    const title = newTitle.trim();
    if (!title) return;
    const now = firebase.firestore.FieldValue.serverTimestamp();
    await boardsRef.add({ title, createdAt: now, updatedAt: now });
    setNewTitle('');
    setShowAdd(false);
  };

  const updateBoard = async () => {
    const title = editTitle.trim();
    if (!title || !editBoard) return;
    await boardsRef.doc(editBoard.id).update({ title, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    setEditBoard(null);
  };

  const deleteBoard = async () => {
    if (!deleteTarget) return;
    // 하위 notes 컬렉션도 삭제
    const notes = await boardsRef.doc(deleteTarget.id).collection('notes').get();
    const batch = db.batch();
    notes.docs.forEach(doc => batch.delete(doc.ref));
    batch.delete(boardsRef.doc(deleteTarget.id));
    await batch.commit();
    setDeleteTarget(null);
  };

  if (loading) return <div className="loading">불러오는 중...</div>;

  return (
    <div className="board-list">
      <div className="board-list-header">
        <h2>내 보드</h2>
        <button className="add-board-btn" onClick={() => setShowAdd(true)}>+ 새 보드</button>
      </div>

      {boards.length === 0 ? (
        <div className="empty-state">
          <p>아직 보드가 없습니다</p>
          <span>새 보드를 만들어 메모를 흩뿌려 보세요</span>
        </div>
      ) : (
        <div className="board-grid">
          {boards.map(b => (
            <div key={b.id} className="board-card" onClick={() => onOpenBoard(b)}>
              <div className="board-card-actions">
                <button className="board-action-btn" title="이름 변경"
                  onClick={e => { e.stopPropagation(); setEditBoard(b); setEditTitle(b.title); }}>✏</button>
                <button className="board-action-btn danger" title="삭제"
                  onClick={e => { e.stopPropagation(); setDeleteTarget(b); }}>✕</button>
              </div>
              <div className="board-card-title">{b.title}</div>
              <div className="board-card-meta">
                생성 {fmtDate(b.createdAt)} · 수정 {fmtDate(b.updatedAt)}
              </div>
            </div>
          ))}
        </div>
      )}

      {showAdd && (
        <Modal title="새 보드 만들기" onClose={() => setShowAdd(false)}>
          <input className="modal-input" placeholder="보드 제목" autoFocus
            value={newTitle} onChange={e => setNewTitle(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addBoard()} />
          <div className="modal-btns">
            <button className="modal-btn cancel" onClick={() => setShowAdd(false)}>취소</button>
            <button className="modal-btn primary" onClick={addBoard}>만들기</button>
          </div>
        </Modal>
      )}

      {editBoard && (
        <Modal title="보드 이름 변경" onClose={() => setEditBoard(null)}>
          <input className="modal-input" autoFocus
            value={editTitle} onChange={e => setEditTitle(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && updateBoard()} />
          <div className="modal-btns">
            <button className="modal-btn cancel" onClick={() => setEditBoard(null)}>취소</button>
            <button className="modal-btn primary" onClick={updateBoard}>변경</button>
          </div>
        </Modal>
      )}

      {deleteTarget && (
        <Modal title="보드 삭제" onClose={() => setDeleteTarget(null)}>
          <p style={{fontSize:'14px',color:'var(--text-sub)',marginBottom:4}}>
            <strong>"{deleteTarget.title}"</strong> 보드와 안의 모든 메모가 삭제됩니다.
          </p>
          <p style={{fontSize:'13px',color:'var(--danger)'}}>이 작업은 되돌릴 수 없습니다.</p>
          <div className="modal-btns">
            <button className="modal-btn cancel" onClick={() => setDeleteTarget(null)}>취소</button>
            <button className="modal-btn danger" onClick={deleteBoard}>삭제</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── 포스트잇 메모 ── */
function Note({ note, scale, onUpdate, onDelete, dimmed }) {
  const noteRef = useRef(null);
  const bodyRef = useRef(null);
  const dragState = useRef(null);

  const startDrag = (e) => {
    if (e.target === bodyRef.current || bodyRef.current?.contains(e.target)) return;
    e.stopPropagation();
    const el = noteRef.current;
    el.classList.add('dragging');
    const startX = (e.clientX || e.touches?.[0]?.clientX) / scale;
    const startY = (e.clientY || e.touches?.[0]?.clientY) / scale;
    dragState.current = { startX, startY, origX: note.x, origY: note.y };

    const onMove = (ev) => {
      ev.preventDefault();
      const cx = (ev.clientX || ev.touches?.[0]?.clientX) / scale;
      const cy = (ev.clientY || ev.touches?.[0]?.clientY) / scale;
      const dx = cx - dragState.current.startX;
      const dy = cy - dragState.current.startY;
      el.style.left = (dragState.current.origX + dx) + 'px';
      el.style.top = (dragState.current.origY + dy) + 'px';
    };
    const onUp = (ev) => {
      el.classList.remove('dragging');
      const cx = (ev.clientX || ev.changedTouches?.[0]?.clientX) / scale;
      const cy = (ev.clientY || ev.changedTouches?.[0]?.clientY) / scale;
      const dx = cx - dragState.current.startX;
      const dy = cy - dragState.current.startY;
      const newX = Math.round(dragState.current.origX + dx);
      const newY = Math.round(dragState.current.origY + dy);
      if (newX !== note.x || newY !== note.y) {
        onUpdate(note.id, { x: newX, y: newY });
      }
      dragState.current = null;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  };

  const handleBlur = () => {
    const newText = bodyRef.current.innerText;
    if (newText !== note.text) {
      const tags = extractTags(newText);
      onUpdate(note.id, { text: newText, tags });
    }
  };

  const handlePaste = async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        const dataUrl = await resizeImage(file);
        onUpdate(note.id, { image: dataUrl });
        return;
      }
    }
  };

  const colorClass = 'note-color-' + (note.color || 'etc');
  const tags = note.tags || [];

  return (
    <div ref={noteRef} className={`note ${colorClass} ${dimmed ? 'dimmed' : ''} ${note.image ? 'has-image' : ''}`}
      style={{ left: note.x, top: note.y }}
      onMouseDown={startDrag} onTouchStart={startDrag}>
      <div className="note-header">
        <span>{fmtDate(note.createdAt)}</span>
        <button className="note-del-btn" title="삭제"
          onMouseDown={e => e.stopPropagation()}
          onClick={() => onDelete(note.id)}>✕</button>
      </div>
      {note.image && (
        <div className="note-image" onMouseDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()}
          style={{position:'relative'}}>
          <img src={note.image} alt="" />
          <button className="note-image-remove" onClick={() => onUpdate(note.id, { image: '' })}>✕</button>
        </div>
      )}
      <div ref={bodyRef} className="note-body" contentEditable suppressContentEditableWarning
        onBlur={handleBlur} onPaste={handlePaste}
        onMouseDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()}
      >{note.text}</div>
      <div className="note-colors" onMouseDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()}>
        {COLORS.map(c => (
          <div key={c.id} className={`color-dot c-${c.id} ${note.color === c.id ? 'active' : ''}`}
            title={c.label} onClick={() => onUpdate(note.id, { color: c.id })} />
        ))}
      </div>
      {tags.length > 0 && (
        <div className="note-tags">
          {tags.map(t => <span key={t} className="note-tag">#{t}</span>)}
        </div>
      )}
    </div>
  );
}

/* ── 보드 상세 화면 (무한 캔버스) ── */
function BoardView({ user, board, onBack }) {
  const [notes, setNotes] = useState([]);
  const [loading, setLoading] = useState(true);
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);
  const panState = useRef(null);
  const [cam, setCam] = useState({ x: 0, y: 0, zoom: 1 });

  const notesRef = db.collection('users').doc(user.uid)
    .collection('postit_boards').doc(board.id).collection('notes');

  useEffect(() => {
    const unsub = notesRef.orderBy('createdAt').onSnapshot(snap => {
      setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setLoading(false);
    });
    return unsub;
  }, [board.id]);

  // 캔버스 팬(이동)
  const startPan = (e) => {
    if (e.target !== wrapRef.current && e.target !== canvasRef.current) return;
    e.preventDefault();
    wrapRef.current.classList.add('grabbing');
    const cx = e.clientX || e.touches?.[0]?.clientX;
    const cy = e.clientY || e.touches?.[0]?.clientY;
    panState.current = { startX: cx, startY: cy, origX: cam.x, origY: cam.y };

    const onMove = (ev) => {
      ev.preventDefault();
      const mx = ev.clientX || ev.touches?.[0]?.clientX;
      const my = ev.clientY || ev.touches?.[0]?.clientY;
      const dx = mx - panState.current.startX;
      const dy = my - panState.current.startY;
      setCam(c => ({ ...c, x: panState.current.origX + dx, y: panState.current.origY + dy }));
    };
    const onUp = () => {
      wrapRef.current?.classList.remove('grabbing');
      panState.current = null;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  };

  // 줌
  const handleWheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    setCam(c => {
      const newZoom = Math.min(Math.max(c.zoom * delta, 0.3), 3);
      const rect = wrapRef.current.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const newX = mx - (mx - c.x) * (newZoom / c.zoom);
      const newY = my - (my - c.y) * (newZoom / c.zoom);
      return { x: newX, y: newY, zoom: newZoom };
    });
  };

  useEffect(() => {
    const el = wrapRef.current;
    if (el) el.addEventListener('wheel', handleWheel, { passive: false });
    return () => el?.removeEventListener('wheel', handleWheel);
  }, []);

  const [showAddMenu, setShowAddMenu] = useState(false);
  const [searchText, setSearchText] = useState('');
  const [filterColor, setFilterColor] = useState(null);
  const [filterTag, setFilterTag] = useState(null);
  const [showFilter, setShowFilter] = useState(false);

  const allTags = [...new Set(notes.flatMap(n => n.tags || []))].sort();
  const hasFilter = searchText || filterColor || filterTag;

  const isMatch = (n) => {
    if (filterColor && n.color !== filterColor) return false;
    if (filterTag && !(n.tags || []).includes(filterTag)) return false;
    if (searchText && !(n.text || '').toLowerCase().includes(searchText.toLowerCase())) return false;
    return true;
  };

  const clearFilters = () => { setSearchText(''); setFilterColor(null); setFilterTag(null); };

  const [showExport, setShowExport] = useState(false);

  const buildMarkdown = (mode) => {
    let md = `# ${board.title}\n\n`;
    const colorLabel = (c) => (COLORS.find(x => x.id === c) || {}).label || c;

    if (mode === 'all') {
      notes.forEach(n => { if (n.text) md += `- ${n.text}\n`; });
    } else if (mode === 'byColor') {
      COLORS.forEach(c => {
        const group = notes.filter(n => n.color === c.id && n.text);
        if (group.length === 0) return;
        md += `## ${c.label}\n`;
        group.forEach(n => md += `- ${n.text}\n`);
        md += '\n';
      });
    } else if (mode === 'byTag') {
      const tagged = {};
      const untagged = [];
      notes.forEach(n => {
        if (!n.text) return;
        if (!n.tags || n.tags.length === 0) { untagged.push(n); return; }
        n.tags.forEach(t => { if (!tagged[t]) tagged[t] = []; tagged[t].push(n); });
      });
      Object.keys(tagged).sort().forEach(t => {
        md += `## #${t}\n`;
        tagged[t].forEach(n => md += `- ${n.text}\n`);
        md += '\n';
      });
      if (untagged.length > 0) {
        md += `## (태그 없음)\n`;
        untagged.forEach(n => md += `- ${n.text}\n`);
        md += '\n';
      }
    } else if (mode === 'byGroup') {
      const groups = autoGroup(notes.filter(n => n.text));
      groups.forEach((group, i) => {
        md += `## 그룹 ${i + 1} (${group.length}개)\n`;
        group.forEach(n => md += `- ${n.text}\n`);
        md += '\n';
      });
    }
    return md;
  };

  const downloadMd = (mode) => {
    const md = buildMarkdown(mode);
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${board.title}_${mode}.md`;
    a.click();
    URL.revokeObjectURL(url);
    setShowExport(false);
  };

  // 메모 추가
  const addNote = (color) => {
    const rect = wrapRef.current.getBoundingClientRect();
    const cx = (rect.width / 2 - cam.x) / cam.zoom;
    const cy = (rect.height / 2 - cam.y) / cam.zoom;
    const now = firebase.firestore.FieldValue.serverTimestamp();
    notesRef.add({
      text: '', color: color || 'etc',
      x: Math.round(cx - 100), y: Math.round(cy - 60),
      tags: [], createdAt: now, updatedAt: now
    });
    db.collection('users').doc(user.uid).collection('postit_boards').doc(board.id)
      .update({ updatedAt: now });
    setShowAddMenu(false);
  };

  // 메모 수정
  const updateNote = (noteId, data) => {
    data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    notesRef.doc(noteId).update(data);
    db.collection('users').doc(user.uid).collection('postit_boards').doc(board.id)
      .update({ updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  };

  // 메모 삭제
  const deleteNote = (noteId) => {
    notesRef.doc(noteId).delete();
  };

  const resetView = () => setCam({ x: 0, y: 0, zoom: 1 });

  const ZOOM_STEPS = [0.5, 0.75, 1];
  const cycleZoom = () => {
    setCam(c => {
      const rect = wrapRef.current.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const curIdx = ZOOM_STEPS.findIndex(z => z >= c.zoom - 0.01);
      const nextIdx = (curIdx + 1) % ZOOM_STEPS.length;
      const newZoom = ZOOM_STEPS[nextIdx];
      const newX = cx - (cx - c.x) * (newZoom / c.zoom);
      const newY = cy - (cy - c.y) * (newZoom / c.zoom);
      return { x: newX, y: newY, zoom: newZoom };
    });
  };

  if (loading) return <div className="loading">불러오는 중...</div>;

  return (
    <div>
      <div className="canvas-wrap" ref={wrapRef}
        onMouseDown={startPan} onTouchStart={startPan}>
        <div className="canvas-toolbar">
          <button onClick={onBack}>← 목록</button>
          <button onClick={() => setShowAddMenu(v => !v)}>+ 메모</button>
          <button onClick={() => setShowExport(v => !v)}>내보내기</button>
          <button onClick={resetView}>맞추기</button>
          <button className="zoom-display" onClick={cycleZoom} style={{cursor:'pointer'}}>{Math.round(cam.zoom * 100)}%</button>
        </div>
        <div className="filter-bar">
          <input placeholder="검색..." value={searchText}
            onChange={e => setSearchText(e.target.value)} />
          <button className={`filter-btn ${showFilter ? 'active' : ''}`}
            onClick={() => setShowFilter(v => !v)}>필터</button>
          {hasFilter && <button className="filter-btn" onClick={clearFilters}>초기화</button>}
          {showFilter && (
            <div className="filter-dropdown">
              <div className="filter-section">
                <div className="filter-section-title">색상</div>
                <div className="filter-chips">
                  {COLORS.map(c => (
                    <span key={c.id} className={`filter-chip ${filterColor === c.id ? 'active' : ''}`}
                      onClick={() => setFilterColor(filterColor === c.id ? null : c.id)}>{c.label}</span>
                  ))}
                </div>
              </div>
              {allTags.length > 0 && (
                <div className="filter-section">
                  <div className="filter-section-title">태그</div>
                  <div className="filter-chips">
                    {allTags.map(t => (
                      <span key={t} className={`filter-chip ${filterTag === t ? 'active' : ''}`}
                        onClick={() => setFilterTag(filterTag === t ? null : t)}>#{t}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
        {showExport && (
          <div className="export-menu">
            <div className="export-menu-label">마크다운으로 내보내기</div>
            <button onClick={() => downloadMd('all')}>전체 내보내기</button>
            <button onClick={() => downloadMd('byColor')}>색상별 내보내기</button>
            <button onClick={() => downloadMd('byTag')}>태그별 내보내기</button>
            <button onClick={() => downloadMd('byGroup')}>그룹별 내보내기</button>
          </div>
        )}
        {showAddMenu && (
          <div className="add-menu" style={{top:50, left:12}}>
            <div className="add-menu-label">색상을 선택하세요</div>
            <div className="add-menu-colors">
              {COLORS.map(c => (
                <button key={c.id} className={`add-color-btn c-${c.id}`}
                  onClick={() => addNote(c.id)}>{c.label}</button>
              ))}
            </div>
          </div>
        )}
        <div ref={canvasRef} className="canvas"
          style={{ transform: `translate(${cam.x}px, ${cam.y}px) scale(${cam.zoom})` }}>
          {notes.map(n => (
            <Note key={n.id} note={n} scale={cam.zoom}
              onUpdate={updateNote} onDelete={deleteNote}
              dimmed={hasFilter && !isMatch(n)} />
          ))}
        </div>
        {notes.length > 100 && (
          <div className="toast alert">메모가 {notes.length}개입니다! 내보내기 후 정리해보세요</div>
        )}
        {notes.length > 80 && notes.length <= 100 && (
          <div className="toast warn">메모가 {notes.length}개 — 슬슬 정리할 때가 됐어요</div>
        )}
      </div>
    </div>
  );
}

/* ── 앱 루트 ── */
function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [err, setErr] = useState('');
  const [currentBoard, setCurrentBoard] = useState(null);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => {
      if (u && OWNER_UID && u.uid !== OWNER_UID) {
        setErr('접근 권한이 없습니다.');
        auth.signOut();
        setUser(null);
      } else {
        setUser(u);
        if (u) console.log('UID:', u.uid);
      }
      setChecking(false);
    });
    return unsub;
  }, []);

  const doLogin = () => {
    setErr('');
    auth.signInWithPopup(googleProvider).catch(e => {
      setErr(e.code === 'auth/operation-not-allowed'
        ? 'Firebase 콘솔에서 Google 로그인을 활성화해주세요'
        : '로그인에 실패했습니다. 팝업 차단을 확인해주세요.');
    });
  };

  const doLogout = () => { auth.signOut(); setCurrentBoard(null); };

  if (checking) return <div className="loading">확인 중...</div>;

  if (!user) return (
    <div className="login-screen">
      <h1>포스트잇 보드</h1>
      <p>웹소설 초안을 위한 자유 메모 도구</p>
      <button className="login-btn" onClick={doLogin}>Google로 로그인</button>
      {err && <div className="login-error">{err}</div>}
    </div>
  );

  return (
    <div>
      <div className="topbar">
        <div className="topbar-title" style={{cursor:'pointer'}} onClick={() => setCurrentBoard(null)}>
          포스트잇 보드{currentBoard ? ` / ${currentBoard.title}` : ''}
        </div>
        <div className="topbar-right">
          <span className="topbar-user">{user.displayName || user.email}</span>
          <button className="topbar-btn" onClick={doLogout}>로그아웃</button>
        </div>
      </div>
      {currentBoard
        ? <BoardView user={user} board={currentBoard} onBack={() => setCurrentBoard(null)} />
        : <BoardList user={user} onOpenBoard={b => setCurrentBoard(b)} />
      }
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
