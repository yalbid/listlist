  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #1a1a2e; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast {
    0% { opacity: 0; transform: translateY(10px) scale(0.95); }
    15% { opacity: 1; transform: translateY(0) scale(1); }
    85% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-8px) scale(0.95); }
  }
  .entry-item { animation: fadeInUp 0.3s ease-out; }
  .toast-msg { animation: toast 1.8s ease-in-out forwards; }
  .cat-btn { transition: all 0.2s ease; }
  .cat-btn:hover { transform: translateY(-2px); }
  .cat-btn:active { transform: scale(0.96); }
  .tab-btn { transition: all 0.2s ease; }
  .tab-btn:hover { background: rgba(255,255,255,0.1) !important; }
  .remove-btn { transition: all 0.15s ease; opacity: 0; }
  .entry-row:hover .remove-btn { opacity: 1; }
  .summary-card { animation: fadeInUp 0.4s ease-out backwards; }
  input:focus { outline: none; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>

<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Firebase 초기화 & 인증 ── */
const firebaseApp=firebase.initializeApp({apiKey:"AIzaSyC5zu4j-_ZChJQcEAEAZn9oBY1_amymnEM",authDomain:"happycalendar-1dd07.firebaseapp.com",projectId:"happycalendar-1dd07",storageBucket:"happycalendar-1dd07.firebasestorage.app",messagingSenderId:"961264346042",appId:"1:961264346042:web:35c85ff0a1c02ab2acb383"});
const fireDb=firebaseApp.firestore();
const fireAuth=firebaseApp.auth();
const googleProvider=new firebase.auth.GoogleAuthProvider();

const MOOD_ICONS = [
  { value: 1, emoji: "\u{1F622}", label: "매우 안좋음" },
  { value: 2, emoji: "\u{1F614}", label: "안좋음" },
  { value: 3, emoji: "\u{1F610}", label: "보통" },
  { value: 4, emoji: "\u{1F60A}", label: "좋음" },
  { value: 5, emoji: "\u{1F604}", label: "매우 좋음" },
];

const CATEGORIES = [
  { id: "manga", label: "만화", emoji: "📖", color: "#e8927c" },
  { id: "illust", label: "일러스트", emoji: "🎨", color: "#d4a574" },
  { id: "writing", label: "글", emoji: "✍️", color: "#7cb5a0" },
  { id: "dev", label: "개발", emoji: "💻", color: "#7ca3c4" },
  { id: "dojin", label: "동인", emoji: "📕", color: "#c97ca0" },
  { id: "etc", label: "기타", emoji: "📌", color: "#b39dcc" },
];

function getToday() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function getTodayForLog() {
  const d = new Date();
  if (d.getHours() < 4) d.setDate(d.getDate() - 1);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function formatTime(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

async function loadDailyData(dateKey) {
  try {
    const doc = await fireDb.collection("dailyLogEntries").doc(dateKey).get();
    if (!doc.exists) return { entries: [], moods: [] };
    const data = doc.data();
    let entries = [];
    if (data.items) { try { entries = JSON.parse(data.items); } catch(e) {} }
    else if (data.entries) { entries = data.entries; }
    const moods = data.moods || [];
    return { entries, moods };
  } catch (e) { console.warn("Firebase load failed:", e); return { entries: [], moods: [] }; }
}

function saveEntriesToFirebase(dateKey, entries) {
  fireDb.collection("dailyLogEntries").doc(dateKey).set({ items: JSON.stringify(entries) }, { merge: true })
    .then(() => console.log("Firebase entries saved:", dateKey))
    .catch(e => console.warn("Firebase entries save failed:", e));
}

function saveMoodsToFirebase(dateKey, moods) {
  fireDb.collection("dailyLogEntries").doc(dateKey).set({ moods: moods }, { merge: true })
    .then(() => console.log("Firebase moods saved:", dateKey))
    .catch(e => console.warn("Firebase moods save failed:", e));
}

/* ── 작업 통계 탭 컴포넌트 ── */
function WorkStatsTab() {
  const [todayData, setTodayData] = useState(null);
  const [monthData, setMonthData] = useState(null);
  const [remoteManAll, setRemoteManAll] = useState({});
  const [loading, setLoading] = useState(true);
  const [monthKey, setMonthKey] = useState(() => {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
  });
  const [manMin, setManMin] = useState("");
  const [manCat, setManCat] = useState("dev");
  const [manDate, setManDate] = useState(getToday);
  const [manToast, setManToast] = useState(false);
  const [catColor, setCatColor] = useState(false);

  const fmtSec = (s) => {
    if (!s || s < 60) return "0분";
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    return h > 0 ? h + "시간 " + m + "분" : m + "분";
  };

  const todayKey = getToday();

  const loadData = async () => {
    setLoading(true);
    try {
      const [tDoc, mDoc, rmSnap] = await Promise.all([
        fireDb.collection("dailyStats").doc(todayKey).get(),
        fireDb.collection("monthlyStats").doc(monthKey).get(),
        fireDb.collection("remoteManualLog").get()
      ]);
      setTodayData(tDoc.exists ? tDoc.data() : null);
      setMonthData(mDoc.exists ? mDoc.data() : null);
      const rm = {};
      rmSnap.forEach(doc => { rm[doc.id] = doc.data(); });
      setRemoteManAll(rm);
    } catch (e) { console.warn("Firebase read failed:", e); }
    setLoading(false);
  };

  useEffect(() => { loadData(); }, [monthKey]);

  const addManual = async () => {
    const mins = parseInt(manMin);
    if (!mins || mins <= 0) return;
    const key = manDate;
    const sec = mins * 60;
    try {
      // remoteManualLog에 저장
      const docRef = fireDb.collection("remoteManualLog").doc(key);
      const doc = await docRef.get();
      const prev = doc.exists ? doc.data() : { dev: 0, dojin: 0, etc: 0 };
      prev[manCat] = (prev[manCat] || 0) + sec;
      await docRef.set(prev);
      setManMin("");
      setManToast(true);
      setTimeout(() => setManToast(false), 1800);
      loadData();
    } catch (e) { console.warn("Manual save failed:", e); }
  };

  const trackers = [
    { key: "comm", label: "커미션", emoji: "🎨", color: "#e8927c" },
    { key: "doodle", label: "일러스트", emoji: "✏️", color: "#d4a574" },
    { key: "doj", label: "동인지", emoji: "📖", color: "#c97ca0" },
    { key: "novel", label: "웹소설", emoji: "✍️", color: "#7cb5a0" },
    { key: "dev", label: "개발", emoji: "💻", color: "#7ca3c4" },
    { key: "dojin", label: "동인", emoji: "📕", color: "#c97ca0" },
    { key: "etc", label: "기타", emoji: "📌", color: "#b39dcc" },
  ];

  const prevMonth = () => {
    setSelDay(null);
    const [y, m] = monthKey.split("-").map(Number);
    const nm = m === 1 ? { y: y - 1, m: 12 } : { y, m: m - 1 };
    setMonthKey(nm.y + "-" + String(nm.m).padStart(2, "0"));
  };
  const nextMonth = () => {
    setSelDay(null);
    const [y, m] = monthKey.split("-").map(Number);
    const nm = m === 12 ? { y: y + 1, m: 1 } : { y, m: m + 1 };
    setMonthKey(nm.y + "-" + String(nm.m).padStart(2, "0"));
  };

  // 오늘 카테고리별 값 (자동추적은 dailyStats, 수동기록은 remoteManualLog에서 직접)
  const rmToday = remoteManAll[todayKey] || {};
  const getTodayVal = (key) => {
    const base = todayData || {};
    if (key === "comm") return base.comm || 0;
    if (key === "doodle") return 0;
    if (key === "doj") return base.doj || 0;
    if (key === "novel") return base.novel || 0;
    if (key === "dev") return (rmToday.dev || 0);
    if (key === "dojin") return (rmToday.dojin || 0);
    if (key === "etc") return (rmToday.etc || 0);
    return 0;
  };

  // 오늘 총합 = 자동추적 항목 개별 합산 + 수동기록(remoteManualLog)
  const autoTotal = todayData ? ((todayData.comm || 0) + (todayData.doodle || 0) + (todayData.doj || 0) + (todayData.novel || 0)) : 0;
  const rmTotal = (rmToday.dev || 0) + (rmToday.dojin || 0) + (rmToday.etc || 0);
  const todayTotal = autoTotal + rmTotal;

  // 월간 데이터 집계 (자동추적은 monthlyStats, 수동기록은 remoteManualLog에서 직접)
  const monthTotals = {};
  let monthGrandTotal = 0;
  let workDays = 0;
  trackers.forEach(t => { monthTotals[t.key] = 0; });
  const monthDatesProcessed = new Set();
  if (monthData) {
    Object.entries(monthData).forEach(([dateKey, day]) => {
      if (typeof day === "object" && day.total != null) {
        monthDatesProcessed.add(dateKey);
        const rm = remoteManAll[dateKey] || {};
        const dayAuto = (day.comm || 0) + (day.doodle || 0) + (day.doj || 0) + (day.novel || 0);
        const dayManual = (rm.dev || 0) + (rm.dojin || 0) + (rm.etc || 0);
        const dayTotal = dayAuto + dayManual;
        if (dayTotal > 0) workDays++;
        monthGrandTotal += dayTotal;
        trackers.forEach(t => {
          if (t.key === "dev") monthTotals[t.key] += (rm.dev || 0);
          else if (t.key === "dojin") monthTotals[t.key] += (rm.dojin || 0);
          else if (t.key === "etc") monthTotals[t.key] += (rm.etc || 0);
          else monthTotals[t.key] += (day[t.key] || 0);
        });
      }
    });
  }
  // monthlyStats에 없는 날짜의 원격 수동기록도 포함
  Object.entries(remoteManAll).forEach(([dateKey, rm]) => {
    if (dateKey.startsWith(monthKey + "-") && !monthDatesProcessed.has(dateKey)) {
      const rmDev = rm.dev || 0, rmDojin = rm.dojin || 0, rmEtc = rm.etc || 0;
      const dayTotal = rmDev + rmDojin + rmEtc;
      if (dayTotal > 0) {
        workDays++;
        monthGrandTotal += dayTotal;
        monthTotals["dev"] += rmDev;
        monthTotals["dojin"] += rmDojin;
        monthTotals["etc"] += rmEtc;
      }
    }
  });
  const maxTracker = Math.max(...trackers.map(t => monthTotals[t.key] || 0), 1);

  const [selDay, setSelDay] = useState(null);

  const [my, mm] = monthKey.split("-").map(Number);
  const monthLabel = my + "년 " + mm + "월";

  // 달력 셀 생성
  const buildCells = () => {
    const first = new Date(my, mm - 1, 1);
    const lastDay = new Date(my, mm, 0).getDate();
    const startDow = first.getDay();
    const cells = [];
    for (let i = 0; i < startDow; i++) cells.push(null);
    for (let d = 1; d <= lastDay; d++) {
      const key = monthKey + "-" + String(d).padStart(2, "0");
      const base = (monthData && monthData[key]) || {};
      const rm = remoteManAll[key] || {};
      const hasBase = typeof base === "object" && base.total != null;
      const comm = base.comm || 0, doodle = base.doodle || 0, doj = base.doj || 0, novel = base.novel || 0;
      const dev = rm.dev || 0;
      const dojin = rm.dojin || 0;
      const etc = rm.etc || 0;
      const total = comm + doodle + doj + novel + dev + dojin + etc;
      cells.push({ day: d, key, comm, doodle, doj, novel, dev, dojin, etc, total });
    }
    return cells;
  };
  const calCells = !loading ? buildCells() : [];
  const calMax = Math.max(...calCells.filter(c => c).map(c => c.total), 1);
  const getLevel = (t) => { if (!t) return 0; const r = t / calMax; if (r < 0.25) return 1; if (r < 0.5) return 2; if (r < 0.75) return 3; return 4; };
  const getDomColor = (c) => {
    if (!c || c.total <= 0) return null;
    let max = 0, color = "#b8a9d4";
    trackers.forEach(t => { if ((c[t.key] || 0) > max) { max = c[t.key]; color = t.color; } });
    return color;
  };
  const DOW = ["일", "월", "화", "수", "목", "금", "토"];
  const selectedCell = selDay != null ? calCells.find(c => c && c.day === selDay) : null;

  if (loading) {
    return (
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", padding: "60px 20px" }}>
        <span style={{ color: "#888", fontSize: 14 }}>불러오는 중...</span>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* 오늘 요약 */}
      <div style={{ background: "linear-gradient(135deg, rgba(184,169,212,0.12), rgba(169,184,212,0.12))", borderRadius: 16, padding: "24px 20px", textAlign: "center" }}>
        <p style={{ fontSize: 13, color: "#999", marginBottom: 8 }}>오늘의 총 작업시간</p>
        <p style={{ fontSize: 32, fontWeight: 600, color: "#b8a9d4", marginBottom: 4 }}>{fmtSec(todayTotal)}</p>
        {todayData && <p style={{ fontSize: 11, color: "#666" }}>마지막 갱신: {new Date(todayData.updatedAt).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })}</p>}
      </div>

      {/* 오늘 카테고리별 */}
      {todayTotal > 0 && (
        <div style={wsStyles.card}>
          <p style={wsStyles.cardTitle}>오늘 카테고리별</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {trackers.map(t => {
              const val = getTodayVal(t.key);
              if (val <= 0) return null;
              const pct = todayTotal > 0 ? Math.round(val / todayTotal * 100) : 0;
              const wo = todayData && todayData.workOutput ? todayData.workOutput : {};
              let outputText = "";
              if (t.key === "doj") {
                const parts = [];
                if (wo.dojConti > 0) parts.push("콘티 " + wo.dojConti + "p");
                if (wo.dojRough > 0) parts.push("러프 " + wo.dojRough + "p");
                if (wo.dojArtwork > 0) parts.push("작화 " + wo.dojArtwork + "p");
                if (wo.dojWritingPages > 0) parts.push("집필 " + wo.dojWritingPages + "p");
                if (wo.dojWritingChars > 0) parts.push("집필 " + (wo.dojWritingChars >= 10000 ? (wo.dojWritingChars / 10000).toFixed(1) + "만자" : wo.dojWritingChars.toLocaleString() + "자"));
                outputText = parts.join(", ");
              } else if (t.key === "novel") {
                if (wo.novelChars > 0) outputText = wo.novelChars >= 10000 ? (wo.novelChars / 10000).toFixed(1) + "만자" : wo.novelChars.toLocaleString() + "자";
              }
              return (
                <div key={t.key}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 16, width: 24, textAlign: "center" }}>{t.emoji}</span>
                    <span style={{ fontSize: 13, color: "#ccc", width: 52 }}>{t.label}</span>
                    <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,0.06)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ width: pct + "%", height: "100%", background: t.color, borderRadius: 3, transition: "width 0.3s" }} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: t.color, minWidth: 60, textAlign: "right" }}>{fmtSec(val)}</span>
                  </div>
                  {outputText && <div style={{ marginLeft: 34, marginTop: 3, fontSize: 11, color: "#999" }}>{outputText}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 수동 입력 */}
      <div style={wsStyles.card}>
        <p style={wsStyles.cardTitle}>수동 작업시간 입력</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <input type="date" value={manDate} onChange={e => setManDate(e.target.value)} style={wsStyles.formInput} />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setManCat("dev")} style={{ ...wsStyles.catToggle, background: manCat === "dev" ? "#7ca3c4" : "rgba(255,255,255,0.06)", color: manCat === "dev" ? "#fff" : "#aaa" }}>💻 개발</button>
            <button onClick={() => setManCat("dojin")} style={{ ...wsStyles.catToggle, background: manCat === "dojin" ? "#c97ca0" : "rgba(255,255,255,0.06)", color: manCat === "dojin" ? "#fff" : "#aaa" }}>📕 동인</button>
            <button onClick={() => setManCat("etc")} style={{ ...wsStyles.catToggle, background: manCat === "etc" ? "#b39dcc" : "rgba(255,255,255,0.06)", color: manCat === "etc" ? "#fff" : "#aaa" }}>📌 기타</button>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input type="number" placeholder="분 단위 입력" value={manMin} onChange={e => setManMin(e.target.value)} onKeyDown={e => e.key === "Enter" && addManual()} style={{ ...wsStyles.formInput, flex: 1 }} />
            <button onClick={addManual} style={{ ...wsStyles.addManBtn, opacity: manMin && parseInt(manMin) > 0 ? 1 : 0.3 }}>추가</button>
          </div>
        </div>
        {manToast && <p style={{ textAlign: "center", color: "#7cb5a0", fontSize: 13, marginTop: 10, fontWeight: 500 }}>✓ 저장했어요!</p>}
      </div>

      {/* 월간 통계 */}
      <div style={wsStyles.card}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <button onClick={prevMonth} style={wsStyles.navBtn}>◀</button>
          <span style={{ fontSize: 15, fontWeight: 600, color: "#e0e0e0" }}>{monthLabel}</span>
          <button onClick={nextMonth} style={wsStyles.navBtn}>▶</button>
        </div>

        {!monthData ? (
          <p style={{ textAlign: "center", color: "#666", fontSize: 13, padding: "20px 0" }}>이 달의 데이터가 없어요</p>
        ) : (
          <>
            {/* 월간 요약 카드 */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 16 }}>
              <div style={wsStyles.miniCard}>
                <p style={wsStyles.miniVal}>{fmtSec(monthGrandTotal)}</p>
                <p style={wsStyles.miniLabel}>총 작업</p>
              </div>
              <div style={wsStyles.miniCard}>
                <p style={wsStyles.miniVal}>{workDays}일</p>
                <p style={wsStyles.miniLabel}>작업 일수</p>
              </div>
              <div style={wsStyles.miniCard}>
                <p style={wsStyles.miniVal}>{fmtSec(workDays > 0 ? Math.round(monthGrandTotal / workDays) : 0)}</p>
                <p style={wsStyles.miniLabel}>일 평균</p>
              </div>
            </div>

            {/* 월간 카테고리별 */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
              {trackers.map(t => {
                const val = monthTotals[t.key] || 0;
                if (val <= 0) return null;
                const pct = Math.round(val / maxTracker * 100);
                return (
                  <div key={t.key} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 16, width: 24, textAlign: "center" }}>{t.emoji}</span>
                    <span style={{ fontSize: 13, color: "#ccc", width: 52 }}>{t.label}</span>
                    <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,0.06)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ width: pct + "%", height: "100%", background: t.color, borderRadius: 3, transition: "width 0.3s" }} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: t.color, minWidth: 60, textAlign: "right" }}>{fmtSec(val)}</span>
                  </div>
                );
              })}
            </div>

            {/* 달력 히트맵 */}
            <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 6 }}>
              <button onClick={() => setCatColor(!catColor)} style={{ background: catColor ? "rgba(184,169,212,0.15)" : "rgba(255,255,255,0.06)", border: "1px solid " + (catColor ? "#b8a9d455" : "rgba(255,255,255,0.1)"), borderRadius: 6, padding: "3px 10px", fontSize: 11, color: catColor ? "#b8a9d4" : "#888", cursor: "pointer", fontFamily: "inherit" }}>🎨 카테고리별</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
              {DOW.map(d => <div key={d} style={{ textAlign: "center", fontSize: 10, color: "#666", padding: "2px 0" }}>{d}</div>)}
              {calCells.map((c, i) => {
                if (!c) return <div key={"e" + i} />;
                const lv = getLevel(c.total);
                const isToday = c.key === todayKey;
                const isSel = c.day === selDay;
                const domC = catColor ? getDomColor(c) : null;
                const bg = lv === 0 ? "rgba(255,255,255,0.04)" : domC ? (domC + (lv === 1 ? "33" : lv === 2 ? "66" : lv === 3 ? "99" : "dd")) : lv === 1 ? "rgba(184,169,212,0.2)" : lv === 2 ? "rgba(184,169,212,0.4)" : lv === 3 ? "rgba(184,169,212,0.6)" : "rgba(184,169,212,0.85)";
                return (
                  <div key={c.day} onClick={() => setSelDay(isSel ? null : c.day)} style={{
                    aspectRatio: "1", borderRadius: 4, background: bg, display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 11, color: lv >= 3 ? "#fff" : "#999", cursor: "pointer", position: "relative",
                    boxShadow: isSel ? "inset 0 0 0 2px #b8a9d4" : isToday ? "inset 0 0 0 1.5px #b8a9d455" : "none",
                    transition: "all 0.15s",
                  }}>{c.day}</div>
                );
              })}
            </div>

            {/* 범례 */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 4, marginTop: 6, fontSize: 10, color: "#666" }}>
              <span>적음</span>
              {[0,1,2,3,4].map(lv => {
                const bg = lv === 0 ? "rgba(255,255,255,0.04)" : lv === 1 ? "rgba(184,169,212,0.2)" : lv === 2 ? "rgba(184,169,212,0.4)" : lv === 3 ? "rgba(184,169,212,0.6)" : "rgba(184,169,212,0.85)";
                return <div key={lv} style={{ width: 12, height: 12, borderRadius: 2, background: bg }} />;
              })}
              <span>많음</span>
            </div>

            {/* 선택한 날짜의 세부 통계 */}
            {selectedCell && (
              <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: 14, marginTop: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: "#e0e0e0" }}>{mm}월 {selectedCell.day}일</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#b8a9d4" }}>{fmtSec(selectedCell.total)}</span>
                </div>
                {selectedCell.total === 0 ? (
                  <p style={{ fontSize: 12, color: "#666", textAlign: "center", padding: "8px 0" }}>이 날은 기록이 없어요</p>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {trackers.map(t => {
                      const val = selectedCell[t.key] || 0;
                      if (val <= 0) return null;
                      return (
                        <div key={t.key} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                          <span style={{ width: 8, height: 8, borderRadius: "50%", background: t.color, flexShrink: 0 }} />
                          <span style={{ flex: 1, color: "#bbb" }}>{t.emoji} {t.label}</span>
                          <span style={{ fontWeight: 600, color: t.color }}>{fmtSec(val)}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </>
        )}
      </div>

      {/* 새로고침 버튼 */}
      <button onClick={loadData} style={wsStyles.refreshBtn}>🔄 새로고침</button>
    </div>
  );
}

function AuthGate({children}){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);
  const[err,setErr]=useState('');
  useEffect(()=>{const unsub=fireAuth.onAuthStateChanged(u=>{setUser(u);setChecking(false)});return unsub},[]);
  const doLogin=()=>{setErr('');fireAuth.signInWithPopup(googleProvider).catch(e=>{console.error('Auth error:',e);setErr(e.code==='auth/operation-not-allowed'?'Firebase 콘솔에서 Google 로그인을 활성화해주세요 (Authentication → Sign-in method → Google → 사용 설정)':e.code==='auth/popup-blocked'?'팝업이 차단되었습니다. 브라우저 팝업 차단을 해제해주세요.':e.message)})};
  if(checking)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#1a1a2e',color:'#999',fontFamily:'Noto Sans KR, sans-serif'}}><p>확인 중...</p></div>);
  if(!user)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,background:'#1a1a2e',fontFamily:'Noto Sans KR, sans-serif'}}>
    <div style={{fontSize:48,marginBottom:8}}>🔒</div>
    <p style={{fontSize:15,color:'#999'}}>로그인이 필요합니다</p>
    <button onClick={doLogin} style={{padding:'10px 28px',fontSize:14,background:'#b8a9d4',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'inherit'}}>Google 계정으로 로그인</button>
    {err&&<p style={{fontSize:12,color:'#e06060',maxWidth:400,textAlign:'center',lineHeight:1.5,padding:'0 20px'}}>{err}</p>}
  </div>);
  return children;
}
function DailyLog() {
  const today = getTodayForLog();
  const [entries, setEntries] = useState([]);
  const [moods, setMoods] = useState([]);
  const [selectedCat, setSelectedCat] = useState(null);
  const [memo, setMemo] = useState("");
  const [view, setView] = useState("log");
  const [showToast, setShowToast] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const inputRef = useRef(null);

  const currentMood = moods.length > 0 ? moods[moods.length - 1] : null;
  const [pendingMood, setPendingMood] = useState(null);
  const [moodNote, setMoodNote] = useState("");
  const moodNoteRef = useRef(null);

  const selectMood = (value) => {
    setPendingMood(value);
    setMoodNote("");
    setTimeout(() => moodNoteRef.current && moodNoteRef.current.focus(), 100);
  };

  const confirmMood = () => {
    if (pendingMood == null) return;
    const entry = { mood: pendingMood, time: Date.now() };
    if (moodNote.trim()) entry.note = moodNote.trim();
    const newMoods = [...moods, entry];
    setMoods(newMoods);
    setPendingMood(null);
    setMoodNote("");
    saveMoodsToFirebase(today, newMoods);
  };

  const cancelMood = () => {
    setPendingMood(null);
    setMoodNote("");
  };

  const removeMood = (index) => {
    const newMoods = moods.filter((_, i) => i !== index);
    setMoods(newMoods);
    saveMoodsToFirebase(today, newMoods);
  };

  // 처음 열 때 파이어베이스에서 불러오기
  useEffect(() => {
    loadDailyData(today).then(data => {
      setEntries(data.entries);
      setMoods(data.moods);
      setLoaded(true);
    });
  }, []);

  // entries가 바뀔 때마다 파이어베이스 저장
  useEffect(() => {
    if (loaded) saveEntriesToFirebase(today, entries);
  }, [entries, loaded]);

  const addEntry = () => {
    if (!selectedCat || !memo.trim()) return;
    const newEntry = { id: Date.now(), category: selectedCat, memo: memo.trim(), timestamp: Date.now() };
    setEntries(prev => [...prev, newEntry]);
    setMemo("");
    setSelectedCat(null);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 1800);
  };

  const removeEntry = (id) => { setEntries(prev => prev.filter(e => e.id !== id)); };
  const catInfo = (id) => CATEGORIES.find(c => c.id === id);

  const categorySummary = CATEGORIES.map(cat => ({
    ...cat,
    items: entries.filter(e => e.category === cat.id),
  })).filter(c => c.items.length > 0);

  const totalCount = entries.length;

  return (
    <div style={styles.container}>
      {/* Header */}
      <div style={styles.header}>
        <div style={styles.headerTop}>
          <div>
            <h1 style={{...styles.title, cursor:'pointer'}} onClick={()=>{if(confirm('로그아웃할까요?'))fireAuth.signOut()}} title="로그아웃">오늘 한 일</h1>
            <p style={styles.date}>{today.replace(/-/g, ". ")}</p>
          </div>
          {totalCount > 0 && (
            <div style={styles.badge}>
              <span style={styles.badgeNum}>{totalCount}</span>
              <span style={styles.badgeLabel}>건</span>
            </div>
          )}
        </div>
        <div style={styles.tabs}>
          <button className="tab-btn" style={{...styles.tab, ...(view === "log" ? styles.tabActive : {})}} onClick={() => setView("log")}>기록하기</button>
          <button className="tab-btn" style={{...styles.tab, ...(view === "summary" ? styles.tabActive : {})}} onClick={() => setView("summary")}>오늘의 정리</button>
          <button className="tab-btn" style={{...styles.tab, ...(view === "stats" ? styles.tabActive : {})}} onClick={() => setView("stats")}>작업 통계</button>
        </div>
      </div>

      {/* Content */}
      <div style={styles.content}>
        {view === "log" ? (
          <>
            {/* Mood Selector */}
            <div style={styles.moodSection}>
              <p style={styles.moodTitle}>오늘의 기분</p>
              <div style={styles.moodRow}>
                {MOOD_ICONS.map(m => (
                  <button key={m.value} onClick={() => selectMood(m.value)} style={{
                    ...styles.moodBtn,
                    background: pendingMood === m.value ? "rgba(184,169,212,0.35)" : currentMood && currentMood.mood === m.value && pendingMood == null ? "rgba(184,169,212,0.25)" : "transparent",
                    boxShadow: pendingMood === m.value ? "0 0 0 2px #b8a9d4" : currentMood && currentMood.mood === m.value && pendingMood == null ? "0 0 0 1px rgba(184,169,212,0.4)" : "none",
                  }}>
                    <span style={{ fontSize: 28 }}>{m.emoji}</span>
                  </button>
                ))}
              </div>
              {pendingMood != null && (
                <div style={styles.moodNoteArea}>
                  <p style={{ fontSize: 12, color: "#b8a9d4", marginBottom: 6 }}>{MOOD_ICONS.find(m => m.value === pendingMood)?.emoji} {MOOD_ICONS.find(m => m.value === pendingMood)?.label}</p>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input ref={moodNoteRef} type="text" value={moodNote} onChange={e => setMoodNote(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && confirmMood()} placeholder="사유 (선택)"
                      style={styles.moodNoteInput} />
                    <button onClick={confirmMood} style={styles.moodConfirmBtn}>확인</button>
                    <button onClick={cancelMood} style={styles.moodCancelBtn}>취소</button>
                  </div>
                </div>
              )}
              {pendingMood == null && currentMood && (
                <p style={styles.moodCurrent}>
                  {MOOD_ICONS.find(m => m.value === currentMood.mood)?.label} · {formatTime(currentMood.time)}
                  {currentMood.note && <span style={{ color: "#aaa" }}> — {currentMood.note}</span>}
                  {moods.length > 1 && <span style={{ color: "#666" }}> ({moods.length}번째)</span>}
                </p>
              )}
            </div>

            {/* Category Selector */}
            <div style={styles.catRow}>
              {CATEGORIES.map(cat => (
                <button
                  key={cat.id}
                  className="cat-btn"
                  onClick={() => { setSelectedCat(cat.id); setTimeout(() => inputRef.current && inputRef.current.focus(), 100); }}
                  style={{
                    ...styles.catBtn,
                    background: selectedCat === cat.id ? cat.color : "rgba(255,255,255,0.06)",
                    color: selectedCat === cat.id ? "#fff" : "#a0a0a0",
                    borderColor: selectedCat === cat.id ? cat.color : "rgba(255,255,255,0.1)",
                  }}
                >
                  <span style={{ fontSize: 16 }}>{cat.emoji}</span>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{cat.label}</span>
                </button>
              ))}
            </div>

            {/* Input */}
            <div style={styles.inputRow}>
              <input
                ref={inputRef}
                type="text"
                placeholder={selectedCat ? catInfo(selectedCat).label + " — 뭘 했나요?" : "카테고리를 먼저 선택해주세요"}
                value={memo}
                onChange={e => setMemo(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addEntry()}
                disabled={!selectedCat}
                style={{
                  ...styles.input,
                  borderColor: selectedCat ? catInfo(selectedCat).color + "66" : "rgba(255,255,255,0.08)",
                }}
              />
              <button
                onClick={addEntry}
                disabled={!selectedCat || !memo.trim()}
                style={{
                  ...styles.addBtn,
                  opacity: selectedCat && memo.trim() ? 1 : 0.3,
                  background: selectedCat && memo.trim() ? catInfo(selectedCat).color : "rgba(255,255,255,0.1)",
                }}
              >+</button>
            </div>

            {/* Entry List */}
            <div style={styles.entryList}>
              {entries.length === 0 && moods.length === 0 ? (
                <div style={styles.empty}>
                  <span style={{ fontSize: 32, marginBottom: 12 }}>🌙</span>
                  <p style={{ color: "#777", fontSize: 14, lineHeight: 1.6 }}>아직 기록이 없어요<br/>오늘 한 일을 하나씩 적어보세요</p>
                </div>
              ) : entries.length === 0 ? null : (
                [...entries].reverse().map(entry => {
                  const cat = catInfo(entry.category);
                  return (
                    <div key={entry.id} className="entry-item entry-row" style={styles.entry}>
                      <div style={{ ...styles.entryDot, background: cat.color }} />
                      <div style={styles.entryContent}>
                        <div style={styles.entryMeta}>
                          <span style={{ ...styles.entryTag, color: cat.color, background: cat.color + "18" }}>
                            {cat.emoji} {cat.label}
                          </span>
                          <span style={styles.entryTime}>{formatTime(entry.timestamp)}</span>
                        </div>
                        <p style={styles.entryText}>{entry.memo}</p>
                      </div>
                      <button className="remove-btn" onClick={() => removeEntry(entry.id)} style={styles.removeBtn} title="삭제">×</button>
                    </div>
                  );
                })
              )}
            </div>

            {/* Mood History */}
            {moods.length >= 1 && (
              <div style={styles.moodHistory}>
                <div style={styles.moodHistoryHeader}>
                  <span style={{ fontSize: 14 }}>{MOOD_ICONS.find(m => m.value === currentMood.mood)?.emoji}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#e0e0e0" }}>기분 변화</span>
                  <span style={styles.moodHistoryCount}>{moods.length}회</span>
                </div>
                {[...moods].reverse().map((m, ri) => {
                  const i = moods.length - 1 - ri;
                  return (
                  <div key={i} className="entry-row" style={styles.moodHistoryItem}>
                    <span style={{ fontSize: 14, flexShrink: 0 }}>{MOOD_ICONS.find(mi => mi.value === m.mood)?.emoji}</span>
                    <span style={{ fontSize: 12, color: "#b8a9d4", flexShrink: 0, width: 64 }}>{MOOD_ICONS.find(mi => mi.value === m.mood)?.label}</span>
                    {m.note ? <span style={{ flex: 1, fontSize: 12, color: "#aaa" }}>— {m.note}</span> : <span style={{ flex: 1 }} />}
                    <span style={{ fontSize: 11, color: "#666", flexShrink: 0 }}>{formatTime(m.time)}</span>
                    <button className="remove-btn" onClick={() => removeMood(i)} style={styles.moodRemoveBtn} title="삭제">×</button>
                  </div>
                  );
                })}
              </div>
            )}
          </>
        ) : view === "summary" ? (
          /* Summary View */
          <div style={styles.summaryWrap}>
            {totalCount === 0 ? (
              <div style={styles.empty}>
                <span style={{ fontSize: 32, marginBottom: 12 }}>🌙</span>
                <p style={{ color: "#777", fontSize: 14 }}>아직 기록된 일이 없어요</p>
              </div>
            ) : (
              <>
                <div style={styles.encouragement}>
                  <p style={styles.encourageText}>
                    {totalCount >= 8 ? "오늘 정말 많이 했어요! 🌟"
                      : totalCount >= 5 ? "알찬 하루였네요 ✨"
                      : totalCount >= 3 ? "착실하게 쌓아가고 있어요 💪"
                      : "한 걸음 한 걸음이 쌓여요 🌱"}
                  </p>
                  <p style={styles.encourageSub}>총 {totalCount}건, {categorySummary.length}개 분야에서 작업했어요</p>
                </div>

                {moods.length > 0 && (
                  <div className="summary-card" style={{ ...styles.summaryCard, animationDelay: "0s", borderLeft: "3px solid #b8a9d4" }}>
                    <div style={styles.summaryCardHeader}>
                      <span style={{ fontSize: 18 }}>{MOOD_ICONS.find(m => m.value === moods[moods.length - 1].mood)?.emoji}</span>
                      <span style={{ fontSize: 15, fontWeight: 600, color: "#e0e0e0" }}>기분</span>
                      <span style={{ ...styles.summaryCount, background: "rgba(184,169,212,0.12)", color: "#b8a9d4" }}>{moods.length}회</span>
                    </div>
                    <ul style={styles.summaryList}>
                      {moods.map((m, i) => (
                        <li key={i} style={styles.summaryItem}>
                          <span style={{ color: "#ccc" }}>{MOOD_ICONS.find(mi => mi.value === m.mood)?.emoji} {MOOD_ICONS.find(mi => mi.value === m.mood)?.label}{m.note ? " — " + m.note : ""}</span>
                          <span style={{ color: "#666", fontSize: 12, flexShrink: 0 }}>{formatTime(m.time)}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}

                {categorySummary.map((cat, i) => (
                  <div key={cat.id} className="summary-card" style={{ ...styles.summaryCard, animationDelay: ((moods.length > 0 ? 1 : 0) + i) * 0.08 + "s", borderLeft: "3px solid " + cat.color }}>
                    <div style={styles.summaryCardHeader}>
                      <span style={{ fontSize: 18 }}>{cat.emoji}</span>
                      <span style={{ fontSize: 15, fontWeight: 600, color: "#e0e0e0" }}>{cat.label}</span>
                      <span style={{ ...styles.summaryCount, background: cat.color + "22", color: cat.color }}>{cat.items.length}건</span>
                    </div>
                    <ul style={styles.summaryList}>
                      {cat.items.map(item => (
                        <li key={item.id} style={styles.summaryItem}>
                          <span style={{ color: "#ccc" }}>{item.memo}</span>
                          <span style={{ color: "#666", fontSize: 12, flexShrink: 0 }}>{formatTime(item.timestamp)}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}

                <div style={styles.closing}>
                  <p style={styles.closingText}>오늘도 수고 많았어요.<br/>이제 푹 쉬세요 😴</p>
                </div>
              </>
            )}
          </div>
        ) : view === "stats" ? (
          <WorkStatsTab />
        ) : null}
      </div>

      {showToast && <div className="toast-msg" style={styles.toast}>✓ 기록했어요!</div>}
    </div>
  );
}
