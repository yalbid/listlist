<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔒 나의 비밀 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR','Segoe UI',sans-serif}body{background:#0D1117;color:#C8D6E5;min-height:100vh}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1E2A35;border-radius:3px}
.hd{position:sticky;top:0;z-index:10;background:rgba(13,17,23,.9);backdrop-filter:blur(12px);border-bottom:1px solid #1E2A35;padding:12px 16px}.hi{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}.hl{display:flex;align-items:center;gap:10px}.hd h1{font-size:18px;font-weight:700}.hd .sub{font-size:12px;color:#4A5D6E}.hr{display:flex;align-items:center;gap:8px}
.abtn{background:none;border:1px solid #1E2A35;color:#4A5D6E;padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s}.abtn:hover,.abtn.on{border-color:#6B8299;color:#6B8299;background:rgba(107,130,153,.1)}
.abar{max-width:600px;margin:10px auto 0;display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.pill{background:none;border:1px solid #1E2A35;color:#4A5D6E;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}.pill:hover{border-color:#6B8299;color:#6B8299}.pill.on{background:#6B8299;border-color:#6B8299;color:white}
.cnt{max-width:600px;margin:0 auto}
.cmp{padding:16px;border-bottom:1px solid #1E2A35;transition:background .2s}.cmp.dg{background:rgba(107,130,153,.05)}.ci{display:flex;gap:12px}
.av{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#5C6B7A,#3D4F5F);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;overflow:hidden;position:relative}.av img{width:100%;height:100%;object-fit:cover}.av.ed{cursor:pointer;border:2px solid transparent;transition:border-color .2s}.av.ed:hover{border-color:#6B8299}.avb{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:#6B8299;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;border:2px solid #0D1117}
.cr{flex:1}textarea{width:100%;background:transparent;border:none;color:#C8D6E5;font-size:15px;resize:none;min-height:50px;line-height:1.5;outline:none}.tinput{width:100%;background:transparent;border:none;color:#6B8299;font-size:14px;padding:0;line-height:1.5;outline:none}
.ca{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #1E2A35}
.ib{background:none;border:none;color:#6B8299;cursor:pointer;padding:6px 8px;border-radius:8px;font-size:18px}.ib:hover{background:rgba(107,130,153,.1)}.ht{font-size:11px;color:#2A3A48;margin-left:4px}
.pb{background:#6B8299;color:white;border:none;padding:8px 20px;border-radius:20px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}.pb:hover:not(:disabled){background:#4A6B80;transform:scale(1.02)}.pb:disabled{opacity:.5;cursor:not-allowed}
.pg{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}.pi{position:relative}.pi img{width:80px;height:80px;object-fit:cover;border-radius:12px;border:1px solid #1E2A35}.pr{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);color:white;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}.pa{width:80px;height:80px;border-radius:12px;border:2px dashed #1E2A35;display:flex;align-items:center;justify-content:center;color:#2A3A48;font-size:12px;cursor:pointer}.pa:hover{border-color:#6B8299;color:#6B8299}
.dz{border:2px dashed #6B8299;border-radius:16px;padding:40px;text-align:center;color:#6B8299;background:rgba(107,130,153,.05);margin-top:8px}
.tp{display:inline-flex;margin:3px;background:rgba(107,130,153,.08);border:none;color:#6B8299;padding:3px 10px;border-radius:12px;font-size:13px;cursor:pointer;transition:all .2s}.tp:hover{background:rgba(107,130,153,.2)}.tp.on{background:rgba(107,130,153,.2);font-weight:700}
.tpv{display:inline-flex;background:rgba(107,130,153,.1);color:#6B8299;padding:2px 8px;border-radius:10px;font-size:12px;margin:2px}
.em{text-align:center;padding:60px 20px;color:#2A3A48}.em .ic{font-size:48px;margin-bottom:16px}.em p{font-size:15px;line-height:1.6}
.ig{border-radius:16px;overflow:hidden;outline:1px solid #1E2A35;margin-top:10px}.ig.g1{max-height:500px}.ig.g1 img{width:100%;max-height:500px;object-fit:contain;background:#000;display:block;cursor:pointer}.ig.g2{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:280px}.ig.g3{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:300px}.ig.g3 .gi0{grid-row:1/3}.ig.g4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;aspect-ratio:1/1}.ig img{width:100%;height:100%;object-fit:cover;background:#000;display:block;cursor:pointer}
.pc{padding:16px;border-bottom:1px solid #1E2A35;position:relative;transition:background .15s;animation:su .3s ease-out}.pc:hover{background:#111820}.pn{display:flex;gap:12px}.prt{flex:1;min-width:0}.ph{display:flex;align-items:center;gap:6px;margin-bottom:4px}.pt{font-size:15px;line-height:1.5;word-break:break-word}
.dl{position:absolute;top:12px;right:12px;background:none;border:none;color:#2A3A48;cursor:pointer;font-size:16px;padding:4px 8px;border-radius:50%;transition:all .2s;opacity:0}.pc:hover .dl{opacity:1}.dl:hover{background:rgba(244,33,46,.1);color:#F4212E}
.ab{display:flex;gap:2px;margin-top:10px;margin-left:-10px}.act{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#4A5D6E;cursor:pointer;padding:6px 10px;border-radius:20px;font-size:13px;transition:all .2s}.act:hover{background:rgba(255,255,255,.05)}.act.lk:hover{color:#D4778C;background:rgba(212,119,140,.1)}.act.rr:hover{color:#6B9F78;background:rgba(107,159,120,.1)}.act.cc:hover,.act.bm:hover{color:#6B8299;background:rgba(107,130,153,.1)}.lc{color:#D4778C}
.cms{margin-top:12px;padding-top:12px;border-top:1px solid #1E2A35}.cmi{display:flex;gap:10px;padding:8px 0;animation:fi .3s ease-out}.cma{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#6B8299;color:white;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;z-index:100;box-shadow:0 4px 20px rgba(107,130,153,.4);animation:tt 2s ease forwards}
.fhd{padding:12px 16px;border-bottom:1px solid #1E2A35;display:flex;align-items:center;gap:10px;flex-wrap:wrap}.fbk{background:none;border:none;color:#6B8299;cursor:pointer;font-size:18px}
.lb{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;animation:fi .2s ease}.lb img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px}.lbc,.lbp,.lbn{position:absolute;background:rgba(255,255,255,.1);border:none;color:white;border-radius:50%;cursor:pointer}.lbc{top:16px;right:16px;width:40px;height:40px;font-size:20px}.lbp,.lbn{top:50%;transform:translateY(-50%);width:44px;height:44px;font-size:20px}.lbp{left:16px}.lbn{right:16px}.lbd{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:8px}.ldd{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3)}.ldd.on{background:#6B8299}
.menu{position:absolute;top:110%;right:0;background:#0D1117;border:1px solid #1E2A35;border-radius:12px;overflow:hidden;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:20}.mni{display:block;width:100%;background:none;border:none;color:#C8D6E5;padding:10px 16px;font-size:14px;cursor:pointer;text-align:left;transition:background .15s}.mni:hover{background:rgba(255,255,255,.05)}.overlay{position:fixed;inset:0;z-index:9}
@keyframes fi{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes tt{0%{opacity:0;transform:translateX(-50%) translateY(20px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}90%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
</style></head><body>
<div class="hd"><div class="hi"><div class="hl"><span style="font-size:20px">🔒</span><div><h1>나의 비밀 기록</h1><span class="sub">나만 볼 수 있는 조용한 공간</span></div></div><div class="hr"><button class="abtn" id="aToggle" onclick="togArc()">📅 아카이브</button><div style="position:relative"><button class="abtn" id="mToggle" onclick="togMenu()">⚙️</button><div class="menu" id="menuDrop" style="display:none"><button class="mni" onclick="doBackup()">📦 백업 내보내기</button><button class="mni" onclick="document.getElementById('restIn').click()">📂 백업 복원하기</button></div></div><input type="file" id="restIn" accept=".json" style="display:none"><span style="font-size:12px;color:#2A3A48" id="pCnt">0개</span></div></div><div id="arcMonths" class="abar" style="display:none"></div><div id="arcTags" class="abar" style="display:none"></div></div>
<div class="cnt">
<div id="cmpSec"><div class="cmp" id="cmpBox"><div class="ci"><div class="av ed" id="cAv" onclick="document.getElementById('avIn').click()" title="프로필 사진 변경"><span id="avDef">룹</span><div class="avb">✎</div></div><input type="file" id="avIn" accept="image/*" style="display:none"><div class="cr"><textarea id="cTxt" placeholder="오늘 하루는 어땠나요? 기록을 남겨보세요..." rows="2"></textarea><div style="display:flex;align-items:center;gap:6px;margin-top:6px;padding:6px 0"><span style="color:#2A3A48;font-size:14px;flex-shrink:0">🏷️</span><input class="tinput" id="tagIn" placeholder="태그 입력 (쉼표 또는 공백으로 구분)"></div><div id="tagPrev"></div><div id="imgPrev"></div><div id="dropZ" style="display:none"><div class="dz">📎 여기에 이미지를 놓아주세요 (최대 4장)</div></div><div class="ca"><div style="display:flex;gap:4px;align-items:center"><input type="file" id="fIn" accept="image/*" multiple style="display:none"><button class="ib" onclick="document.getElementById('fIn').click()">🖼️</button><span class="ht" id="htTxt">Ctrl+V 붙여넣기 (최대 4장)</span></div><button class="pb" id="pBtn" disabled>기록</button></div></div></div></div></div>
<div id="fltHd" style="display:none"></div><div id="tl"></div>
<div class="em" id="emSt"><div class="ic">🌙</div><p>아직 기록이 없어요<br>오늘의 일상을 조용히 남겨보세요</p></div>
<div style="height:100px"></div></div>
<div class="lb" id="lbox" style="display:none" onclick="closeLB()"></div>
<div class="overlay" id="menuOvr" style="display:none" onclick="togMenu()"></div>
<script>
const DB_NAME="timeline-private-db",DB_VER=1,SK="posts",AK="avatar",TICK=6000,LR=.06,RR=.015,CR=.012,ML=500,MR=100,MC=6;
const CM=["오늘 하루도 고생했어요","좋은 사진이네요 ☺️","이런 분위기 좋다...","공감돼요","힐링된다","맛있겠다!","부러워요 ㅠㅠ","나도 가보고 싶다","좋은 하루 보내세요 🌿","덕분에 기분 좋아졌어요","예쁘다...","마음이 편해지는 사진","오늘도 수고했어요","잘 쉬어요 💤","소소하지만 확실한 행복","좋은 취향이시네요"];
/* IndexedDB wrapper */
let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains("kv"))d.createObjectStore("kv")};req.onsuccess=e=>{db=e.target.result;res(db)};req.onerror=e=>rej(e)})}
function dbGet(key){return new Promise((res,rej)=>{const tx=db.transaction("kv","readonly");const st=tx.objectStore("kv");const r=st.get(key);r.onsuccess=()=>res(r.result!==undefined?r.result:null);r.onerror=()=>res(null)})}
function dbSet(key,val){return new Promise((res,rej)=>{const tx=db.transaction("kv","readwrite");const st=tx.objectStore("kv");st.put(val,key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}
let posts=[],avSrc=null,pend=[],exp={},shArc=false,arcM=null,arcT=null,lbI=null,lbX=0,shMenu=false,lastTick=Date.now();
function sv(){dbSet(SK,posts)}
function svAv(){dbSet(AK,avSrc)}
const UN=["조용한산책","따뜻한이불","고요한숲","작은정원","느린오후","포근한밤","혼자서도괜찮아","잔잔한물결","아늑한구석","한잔의차","소소한일상","고양이낮잠"];
const AC=["#FF6B9D","#C084FC","#60A5FA","#34D399","#FBBF24","#F87171","#A78BFA","#38BDF8"];
function ta(ts){const s=Math.floor((Date.now()-ts)/1e3);if(s<60)return"방금 전";const m=Math.floor(s/60);if(m<60)return m+"분 전";const h=Math.floor(m/60);if(h<24)return h+"시간 전";const days=Math.floor(h/24);if(days<=7)return days+"일 전";const d=new Date(ts),now=new Date();const mm=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");if(d.getFullYear()===now.getFullYear())return mm+"-"+dd;return d.getFullYear()+"-"+mm+"-"+dd}
function fd(ts){const d=new Date(ts);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function pk(a){return a[Math.floor(Math.random()*a.length)]}function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmt(n){return n>=1e3?(n/1e3).toFixed(1).replace(/\.0$/,"")+"k":n}
function mk(ts){const d=new Date(ts);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function ml(k){const[y,m]=k.split("-");return y+"년 "+parseInt(m)+"월"}
function ptags(s){return s.split(/[\s,]+/).map(t=>t.replace(/^#*/,"").trim()).filter(Boolean).map(t=>"#"+t)}
function avH(sz=40){return avSrc?`<div class="av" style="width:${sz}px;height:${sz}px"><img src="${avSrc}"></div>`:`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.4}px">룹</div>`}
function updCAv(){const el=document.getElementById("cAv"),d=document.getElementById("avDef");if(avSrc){if(!el.querySelector("img")){const i=document.createElement("img");i.src=avSrc;el.insertBefore(i,d)}else el.querySelector("img").src=avSrc;d.style.display="none"}}
document.getElementById("avIn").addEventListener("change",e=>{const f=e.target.files[0];if(!f||!f.type.startsWith("image/"))return;const r=new FileReader;r.onload=ev=>{const i=new Image;i.onload=()=>{const c=document.createElement("canvas");c.width=128;c.height=128;const ctx=c.getContext("2d"),s=Math.min(i.width,i.height);ctx.drawImage(i,(i.width-s)/2,(i.height-s)/2,s,s,0,0,128,128);avSrc=c.toDataURL("image/jpeg",.8);svAv();updCAv();render();toast("프로필 사진 변경 완료 🌙")};i.src=ev.target.result};r.readAsDataURL(f);e.target.value=""});
function simReact(ticks){let ch=false;posts.forEach(p=>{for(let i=0;i<ticks;i++){const age=(Date.now()-p.createdAt)/1e3,rate=Math.max(.08,1-age/14400);if(Math.random()<rate*LR&&p.likes<ML){p.likes=Math.min(ML,p.likes+Math.ceil(Math.random()*3));ch=true}if(Math.random()<rate*RR&&p.retweets<MR){p.retweets=Math.min(MR,p.retweets+1);ch=true}if(Math.random()<rate*CR&&p.comments.length<MC){p.comments.push({id:Date.now()+Math.random(),username:pk(UN),text:pk(CM),time:Date.now()-(ticks-i)*TICK});ch=true}}});return ch}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&posts.length){const missed=Math.min(Math.floor((Date.now()-lastTick)/TICK),500);if(missed>1&&simReact(missed)){sv();render()}lastTick=Date.now()}});
function gridH(imgs){if(!imgs||!imgs.length)return"";const n=Math.min(imgs.length,4);return`<div class="ig g${n}">${imgs.slice(0,4).map((s,i)=>`<img class="gi${i}" src="${s}" onclick="openLB(${JSON.stringify(imgs).replace(/"/g,'&quot;')},${i})">`).join("")}</div>`}
function tagH(tags){if(!tags||!tags.length)return"";return`<div style="margin-top:8px">${tags.map(t=>`<button class="tp${arcT===t?" on":""}" onclick="event.stopPropagation();clickTag('${t}')">${t}</button>`).join("")}</div>`}
function updPrev(){const b=document.getElementById("imgPrev"),h=document.getElementById("htTxt");if(!pend.length){b.innerHTML="";h.textContent="Ctrl+V 붙여넣기 (최대 4장)"}else{let s='<div class="pg">';pend.forEach((img,i)=>{s+=`<div class="pi"><img src="${img}"><button class="pr" onclick="pend.splice(${i},1);updPrev()">×</button></div>`});if(pend.length<4)s+=`<div class="pa" onclick="document.getElementById('fIn').click()">+ 추가</div>`;s+='</div>';b.innerHTML=s;h.textContent=pend.length+"/4장 선택됨"}updBtn()}
function updTagPrev(){const v=document.getElementById("tagIn").value,b=document.getElementById("tagPrev");if(!v.trim()){b.innerHTML="";return}b.innerHTML=ptags(v).map(t=>`<span class="tpv">${t}</span>`).join("")}
function addImg(d){if(pend.length<4){pend.push(d);updPrev()}}
function updBtn(){document.getElementById("pBtn").disabled=!document.getElementById("cTxt").value.trim()&&!pend.length}
function togArc(){shArc=!shArc;document.getElementById("aToggle").classList.toggle("on",shArc);renderArc()}
function togMenu(){shMenu=!shMenu;document.getElementById("menuDrop").style.display=shMenu?"block":"none";document.getElementById("menuOvr").style.display=shMenu?"block":"none";document.getElementById("mToggle").classList.toggle("on",shMenu)}
function setMon(m){arcM=m;render()}function setTag(t){arcT=arcT===t?null:t;render()}
function clickTag(t){arcT=arcT===t?null:t;shArc=true;document.getElementById("aToggle").classList.add("on");render()}
function doBackup(){const d=JSON.stringify({posts,avatarSrc:avSrc,exportedAt:new Date().toISOString(),version:"private-v1"},null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`비밀기록_백업_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);togMenu();toast("백업 파일 다운로드 완료 🌙")}
document.getElementById("restIn").addEventListener("change",e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader;r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.posts&&Array.isArray(d.posts)){posts=d.posts;sv();if(d.avatarSrc){avSrc=d.avatarSrc;svAv();updCAv()}render();toast(`복원 완료! ${d.posts.length}개의 기록 🎉`)}else toast("올바른 백업 파일이 아니에요 😥")}catch(err){toast("파일을 읽을 수 없어요 😥")}};r.readAsText(f);e.target.value="";togMenu()});
function renderArc(){const mb=document.getElementById("arcMonths"),tb=document.getElementById("arcTags");if(!shArc||!posts.length){mb.style.display="none";tb.style.display="none";return}const mm={},tm={};posts.forEach(p=>{const k=mk(p.createdAt);mm[k]=(mm[k]||0)+1;(p.tags||[]).forEach(t=>{tm[t]=(tm[t]||0)+1})});const ks=Object.keys(mm).sort().reverse();if(ks.length){mb.style.display="flex";mb.innerHTML=`<button class="pill${arcM===null?" on":""}" onclick="setMon(null)">전체 (${posts.length})</button>`+ks.map(k=>`<button class="pill${arcM===k?" on":""}" onclick="setMon('${k}')">${ml(k)} (${mm[k]})</button>`).join("")}else mb.style.display="none";const tks=Object.entries(tm).sort((a,b)=>b[1]-a[1]);if(tks.length){tb.style.display="flex";tb.innerHTML=`<span style="font-size:12px;color:#2A3A48;flex-shrink:0;align-self:center">🏷️</span>`+tks.map(([t,c])=>`<button class="pill${arcT===t?" on":""}" onclick="setTag('${t}')" style="font-size:12px;padding:4px 10px">${t} (${c})</button>`).join("")}else tb.style.display="none"}
function render(){const isFlt=arcM||arcT;const fp=posts.filter(p=>{if(arcM&&mk(p.createdAt)!==arcM)return false;if(arcT&&!(p.tags||[]).includes(arcT))return false;return true});document.getElementById("pCnt").textContent=posts.length+"개";document.getElementById("emSt").style.display=fp.length?"none":"block";if(!fp.length){document.getElementById("emSt").querySelector("p").innerHTML=isFlt?"조건에 맞는 기록이 없어요":"아직 기록이 없어요<br>오늘의 일상을 조용히 남겨보세요";document.getElementById("emSt").querySelector(".ic").textContent=isFlt?"🔍":"🌙"}document.getElementById("cmpSec").style.display=isFlt?"none":"block";const fh=document.getElementById("fltHd");if(isFlt){fh.style.display="block";fh.innerHTML=`<div class="fhd"><button class="fbk" onclick="arcM=null;arcT=null;render()">←</button><span style="font-weight:700;font-size:15px">${arcM?`📅 ${ml(arcM)}`:""}${arcM&&arcT?" · ":""}${arcT?`🏷️ ${arcT}`:""}</span><span style="color:#2A3A48;font-size:13px">${fp.length}개의 기록</span></div>`}else fh.style.display="none";renderArc();const tl=document.getElementById("tl");tl.innerHTML="";fp.forEach(post=>{const pi=post.images||(post.image?[post.image]:[]);const gIdx=posts.indexOf(post);const card=document.createElement("div");card.className="pc";let cmH="";if(exp[post.id]&&post.comments.length)cmH=`<div class="cms">${post.comments.map(c=>`<div class="cmi"><div class="cma" style="background:${AC[c.username.charCodeAt(0)%8]}">${c.username[0]}</div><div><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:600;font-size:13px">${c.username}</span><span style="color:#2A3A48;font-size:12px">${ta(c.time)}</span></div><p style="font-size:14px;color:#D9D9D9;margin-top:2px">${c.text}</p></div></div>`).join("")}</div>`;card.innerHTML=`<button class="dl" onclick="posts.splice(${gIdx},1);sv();render()">✕</button><div class="pn">${avH(40)}<div class="prt"><div class="ph"><span style="font-weight:700;font-size:15px">룹</span><span style="color:#6B8299;font-size:14px">🔒</span><span style="color:#4A5D6E;font-size:13px;cursor:default" title="${fd(post.createdAt)}">· ${ta(post.createdAt)}</span></div>${post.text?`<p class="pt">${esc(post.text)}</p>`:""}${tagH(post.tags)}${gridH(pi)}<div class="ab"><button class="act cc" onclick="exp['${post.id}']=!exp['${post.id}'];render()"><span>💬</span> ${post.comments.length||""}</button><button class="act rr"><span>🔁</span> ${post.retweets?fmt(post.retweets):""}</button><button class="act lk"><span>${post.likes>0?"❤️":"🤍"}</span>${post.likes>0?`<span class="lc">${fmt(post.likes)}</span>`:""}</button><button class="act bm" onclick="posts[${gIdx}].bookmarked=!posts[${gIdx}].bookmarked;sv();render()"><span>${post.bookmarked?"🔖":"📑"}</span></button></div>${cmH}</div></div>`;tl.appendChild(card)})}
function toast(m){const o=document.querySelector(".toast");if(o)o.remove();const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2100)}
document.getElementById("pBtn").addEventListener("click",()=>{const t=document.getElementById("cTxt").value.trim();const ti=document.getElementById("tagIn").value;if(!t&&!pend.length)return;const tags=ptags(ti);posts.unshift({id:Date.now().toString(),text:t,images:[...pend],tags,likes:Math.floor(Math.random()*2)+1,retweets:0,comments:[],createdAt:Date.now(),bookmarked:false});sv();render();document.getElementById("cTxt").value="";document.getElementById("tagIn").value="";document.getElementById("tagPrev").innerHTML="";pend=[];updPrev();toast("기록 완료 🌙")});
document.getElementById("cTxt").addEventListener("input",updBtn);document.getElementById("tagIn").addEventListener("input",updTagPrev);
document.getElementById("fIn").addEventListener("change",e=>{Array.from(e.target.files).forEach(f=>{if(!f.type.startsWith("image/"))return;const r=new FileReader;r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f)});e.target.value=""});
window.addEventListener("paste",e=>{const it=e.clipboardData?.items;if(!it)return;for(const i of it){if(i.type.startsWith("image/")){e.preventDefault();const r=new FileReader;r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(i.getAsFile());break}}});
const cb=document.getElementById("cmpBox");cb.addEventListener("dragover",e=>{e.preventDefault();cb.classList.add("dg");if(!pend.length)document.getElementById("dropZ").style.display="block"});cb.addEventListener("dragleave",()=>{cb.classList.remove("dg");document.getElementById("dropZ").style.display="none"});cb.addEventListener("drop",e=>{e.preventDefault();cb.classList.remove("dg");document.getElementById("dropZ").style.display="none";Array.from(e.dataTransfer.files).forEach(f=>{if(!f.type.startsWith("image/"))return;const r=new FileReader;r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f)})});
function openLB(imgs,idx){lbI=imgs;lbX=idx;renderLB()}function closeLB(){document.getElementById("lbox").style.display="none";lbI=null}function renderLB(){if(!lbI)return;const lb=document.getElementById("lbox");lb.style.display="flex";let dots=lbI.length>1?`<div class="lbd">${lbI.map((_,i)=>`<div class="ldd${i===lbX?" on":""}"></div>`).join("")}</div>`:"";let prev=lbI.length>1&&lbX>0?`<button class="lbp" onclick="event.stopPropagation();lbX--;renderLB()">◀</button>`:"";let next=lbI.length>1&&lbX<lbI.length-1?`<button class="lbn" onclick="event.stopPropagation();lbX++;renderLB()">▶</button>`:"";lb.innerHTML=`<div onclick="event.stopPropagation()"><img src="${lbI[lbX]}" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px"></div><button class="lbc" onclick="event.stopPropagation();closeLB()">✕</button>${prev}${next}${dots}`}
window.addEventListener("keydown",e=>{if(!lbI)return;if(e.key==="Escape")closeLB();if(e.key==="ArrowLeft"&&lbX>0){lbX--;renderLB()}if(e.key==="ArrowRight"&&lbX<lbI.length-1){lbX++;renderLB()}});
setInterval(()=>{lastTick=Date.now();if(!posts.length)return;if(simReact(1)){sv();render()}},TICK);
setInterval(render,60000);
(async()=>{
  await openDB();
  let p=await dbGet(SK),a=await dbGet(AK);
  console.log("🔍 IndexedDB posts:",p?p.length+"개":"없음");
  const existingIds=new Set((p||[]).map(x=>String(x.id)));
  for(const k of["timeline-private-posts","tl-prv-posts"]){const old=localStorage.getItem(k);if(old){try{const parsed=JSON.parse(old);if(Array.isArray(parsed)&&parsed.length){const newOnes=parsed.filter(x=>!existingIds.has(String(x.id)));if(newOnes.length){p=(p||[]).concat(newOnes);p.sort((a,b)=>b.createdAt-a.createdAt);console.log(`✅ ${k}에서 ${newOnes.length}개 기록 병합`)}localStorage.removeItem(k)}}catch(e){}}}
  if(p&&p.length){posts=p;await dbSet(SK,p)}
  if(!a){for(const k of["timeline-private-avatar","tl-prv-av"]){const old=localStorage.getItem(k);if(old){a=old;await dbSet(AK,a);localStorage.removeItem(k);break}}}
  if(a)avSrc=a;
  updCAv();render();
})();
