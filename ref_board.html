<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레퍼런스 보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', system-ui, -apple-system, sans-serif;
    background: #111113;
    color: #e4e4e7;
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }

  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Tab Bar ── */
  .tab-bar {
    display: flex;
    align-items: center;
    background: #18181b;
    border-bottom: 1px solid #27272a;
    padding: 0 8px;
    height: 42px;
    flex-shrink: 0;
    gap: 2px;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .tab-bar::-webkit-scrollbar { height: 0; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 400;
    color: #71717a;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
    height: 100%;
    position: relative;
  }
  .tab:hover { color: #a1a1aa; }
  .tab.active {
    color: #c4b5a0;
    border-bottom-color: #c4b5a0;
    font-weight: 500;
  }
  .tab .tab-delete {
    display: none;
    font-size: 11px;
    width: 16px;
    height: 16px;
    line-height: 16px;
    text-align: center;
    border-radius: 3px;
    color: #71717a;
    cursor: pointer;
  }
  .tab:hover .tab-delete { display: inline-block; }
  .tab .tab-delete:hover { background: #3f3f46; color: #ef4444; }

  .tab-rename-input {
    background: #27272a;
    border: 1px solid #c4b5a0;
    color: #e4e4e7;
    font-size: 13px;
    font-family: inherit;
    padding: 2px 6px;
    border-radius: 3px;
    outline: none;
    width: 100px;
  }

  .tab-add {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: transparent;
    border: 1px dashed #3f3f46;
    border-radius: 5px;
    color: #52525b;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .tab-add:hover { border-color: #71717a; color: #a1a1aa; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #141416;
    border-bottom: 1px solid #27272a;
    flex-shrink: 0;
    height: 36px;
  }
  .toolbar-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    font-size: 12px;
    font-family: inherit;
    color: #a1a1aa;
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .toolbar-btn:hover { background: #3f3f46; color: #e4e4e7; }

  .toolbar-hint {
    font-size: 11px;
    color: #52525b;
    margin-left: auto;
  }

  /* ── Board ── */
  .board-container {
    flex: 1;
    overflow: auto;
    position: relative;
    background: #1a1a1e;
  }
  .board {
    position: relative;
    width: 5000px;
    height: 4000px;
    background-image: radial-gradient(circle, #2a2a2e 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* ── Board Items ── */
  .board-item {
    position: absolute;
    cursor: grab;
    border-radius: 6px;
    transition: box-shadow 0.15s ease;
  }
  .board-item:active { cursor: grabbing; }
  .board-item.selected {
    outline: 2px solid #7c93c3;
    outline-offset: 2px;
  }

  .board-item-image {
    background: #222226;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    overflow: hidden;
    border-radius: 6px;
  }
  .board-item-image img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    border-radius: 6px;
  }

  .board-item-text {
    background: #fef9ef;
    color: #3a3531;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    min-width: 120px;
    min-height: 60px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    border-radius: 6px;
    white-space: pre-wrap;
    word-break: break-word;
    border-left: 4px solid #e8c06a;
  }
  .board-item-text.editing {
    outline: 2px solid #e8c06a;
    outline-offset: 0;
  }
  .board-item-text textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    color: #3a3531;
    font-size: 13px;
    font-family: inherit;
    line-height: 1.6;
    resize: none;
    outline: none;
  }

  /* ── Item Controls ── */
  .item-delete {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 20px;
    height: 20px;
    background: #ef4444;
    color: white;
    border: 2px solid #1a1a1e;
    border-radius: 50%;
    font-size: 11px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    display: none;
    z-index: 10;
  }
  .board-item.selected .item-delete { display: block; }
  .item-delete:hover { background: #dc2626; }

  .item-resize {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 12px;
    height: 12px;
    background: #7c93c3;
    border: 2px solid #1a1a1e;
    border-radius: 2px;
    cursor: nwse-resize;
    display: none;
    z-index: 10;
  }
  .board-item.selected .item-resize { display: block; }

  /* ── Drop Zone Overlay ── */
  .drop-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(124, 147, 195, 0.1);
    border: 3px dashed #7c93c3;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    pointer-events: none;
  }
  .drop-overlay span {
    background: rgba(0,0,0,0.7);
    color: #7c93c3;
    padding: 16px 32px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 500;
  }

  /* ── Empty State ── */
  .empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #3f3f46;
    pointer-events: none;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .empty-state .desc { font-size: 12px; color: #2a2a2e; }

  /* ── Context Menu ── */
  .context-menu {
    position: fixed;
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 8px;
    padding: 4px;
    min-width: 170px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 10000;
    animation: ctxIn 0.1s ease-out;
  }
  @keyframes ctxIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    font-size: 12.5px;
    font-family: inherit;
    color: #d4d4d8;
    background: none;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.1s;
  }
  .ctx-item:hover { background: #3f3f46; }
  .ctx-item .ctx-shortcut {
    margin-left: auto;
    font-size: 10.5px;
    color: #52525b;
  }
  .ctx-sep {
    height: 1px;
    background: #3f3f46;
    margin: 3px 8px;
  }
  .ctx-item.danger { color: #f87171; }
  .ctx-item.danger:hover { background: rgba(239,68,68,0.15); }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    cursor: zoom-out;
    animation: lbIn 0.15s ease-out;
  }
  @keyframes lbIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.6);
    cursor: default;
  }
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    color: #e4e4e7;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #27272a;
    color: #d4d4d8;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 10001;
    animation: toastIn 0.2s ease-out;
    pointer-events: none;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════
   IndexedDB Helpers
   ═══════════════════════════════════════ */
const DB_NAME = 'refboard_db';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('tabs')) {
        db.createObjectStore('tabs', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('items')) {
        const store = db.createObjectStore('items', { keyPath: 'id' });
        store.createIndex('tabId', 'tabId', { unique: false });
      }
    };
  });
}

async function dbGetAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(storeName, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    store.put(data);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDelete(storeName, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    store.delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbGetByIndex(storeName, indexName, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const idx = store.index(indexName);
    const req = idx.getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbDeleteByIndex(storeName, indexName, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const idx = store.index(indexName);
    const req = idx.openCursor(value);
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        cursor.delete();
        cursor.continue();
      }
    };
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

/* ═══════════════════════════════════════
   Image Helpers
   ═══════════════════════════════════════ */
function compressImage(blob, maxDim = 800, quality = 0.8) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let { naturalWidth: w, naturalHeight: h } = img;
      if (w > maxDim || h > maxDim) {
        const r = Math.min(maxDim / w, maxDim / h);
        w = Math.round(w * r);
        h = Math.round(h * r);
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      URL.revokeObjectURL(img.src);
      resolve({ dataUrl, width: w, height: h });
    };
    img.src = URL.createObjectURL(blob);
  });
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

/* ═══════════════════════════════════════
   App Component
   ═══════════════════════════════════════ */
function App() {
  const [tabs, setTabs] = useState([]);
  const [activeTabId, setActiveTabId] = useState(null);
  const [items, setItems] = useState([]);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [editingTextId, setEditingTextId] = useState(null);
  const [renamingTabId, setRenamingTabId] = useState(null);
  const [showDrop, setShowDrop] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [contextMenu, setContextMenu] = useState(null);
  const [lightboxSrc, setLightboxSrc] = useState(null);
  const [toast, setToast] = useState(null);
  const boardRef = useRef(null);
  const containerRef = useRef(null);
  const maxZRef = useRef(1);
  const saveTimerRef = useRef(null);
  const toastTimerRef = useRef(null);
  const itemsRef = useRef(items);
  itemsRef.current = items;
  const selectedIdsRef = useRef(selectedIds);
  selectedIdsRef.current = selectedIds;

  const showToast = useCallback((msg) => {
    setToast(msg);
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(null), 1800);
  }, []);

  // ── Init ──
  useEffect(() => {
    (async () => {
      let savedTabs = await dbGetAll('tabs');
      if (savedTabs.length === 0) {
        const defaultTab = { id: uid(), name: '기본', order: 0 };
        await dbPut('tabs', defaultTab);
        savedTabs = [defaultTab];
      }
      savedTabs.sort((a, b) => a.order - b.order);
      setTabs(savedTabs);
      setActiveTabId(savedTabs[0].id);
      setLoaded(true);
    })();
  }, []);

  // ── Load items on tab change ──
  useEffect(() => {
    if (!activeTabId) return;
    (async () => {
      const tabItems = await dbGetByIndex('items', 'tabId', activeTabId);
      setItems(tabItems);
      maxZRef.current = tabItems.length > 0 ? Math.max(...tabItems.map(i => i.zIndex || 0)) + 1 : 1;
      setSelectedIds(new Set());
      setEditingTextId(null);
    })();
  }, [activeTabId]);

  // ── Debounced save ──
  const scheduleSave = useCallback((updatedItems) => {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      for (const item of updatedItems) {
        await dbPut('items', item);
      }
    }, 300);
  }, []);

  const updateItem = useCallback((id, changes) => {
    setItems(prev => {
      const next = prev.map(i => i.id === id ? { ...i, ...changes } : i);
      scheduleSave(next);
      return next;
    });
  }, [scheduleSave]);

  const updateItems = useCallback((updates) => {
    setItems(prev => {
      const next = prev.map(i => updates[i.id] ? { ...i, ...updates[i.id] } : i);
      scheduleSave(next);
      return next;
    });
  }, [scheduleSave]);

  // ── Add image ──
  const addImage = useCallback(async (blob) => {
    if (!activeTabId) return;
    const { dataUrl, width, height } = await compressImage(blob);
    const container = containerRef.current;
    const scrollX = container ? container.scrollLeft : 0;
    const scrollY = container ? container.scrollTop : 0;
    const viewW = container ? container.clientWidth : 800;
    const viewH = container ? container.clientHeight : 600;

    const dispW = 180;
    const dispH = Math.round((height / width) * dispW);
    const cx = scrollX + viewW / 2 - dispW / 2 + (Math.random() - 0.5) * 60;
    const cy = scrollY + viewH / 2 - dispH / 2 + (Math.random() - 0.5) * 60;

    const newItem = {
      id: uid(), tabId: activeTabId, type: 'image',
      x: Math.max(0, Math.round(cx)), y: Math.max(0, Math.round(cy)),
      width: dispW, height: dispH,
      content: dataUrl, zIndex: maxZRef.current++
    };
    await dbPut('items', newItem);
    setItems(prev => [...prev, newItem]);
  }, [activeTabId]);

  // ── Add text memo ──
  const addTextMemo = useCallback(async () => {
    if (!activeTabId) return;
    const container = containerRef.current;
    const scrollX = container ? container.scrollLeft : 0;
    const scrollY = container ? container.scrollTop : 0;
    const viewW = container ? container.clientWidth : 800;
    const viewH = container ? container.clientHeight : 600;

    const newItem = {
      id: uid(), tabId: activeTabId, type: 'text',
      x: Math.round(scrollX + viewW / 2 - 80 + (Math.random() - 0.5) * 60),
      y: Math.round(scrollY + viewH / 2 - 40 + (Math.random() - 0.5) * 60),
      width: 180, height: 80,
      content: '', zIndex: maxZRef.current++
    };
    await dbPut('items', newItem);
    setItems(prev => [...prev, newItem]);
    setSelectedIds(new Set([newItem.id]));
    setEditingTextId(newItem.id);
  }, [activeTabId]);

  // ── Delete items ──
  const deleteItems = useCallback(async (ids) => {
    for (const id of ids) {
      await dbDelete('items', id);
    }
    setItems(prev => prev.filter(i => !ids.has(i.id)));
    setSelectedIds(prev => {
      const next = new Set(prev);
      ids.forEach(id => next.delete(id));
      return next;
    });
    setEditingTextId(prev => ids.has(prev) ? null : prev);
  }, []);

  // ── Copy image to clipboard ──
  const copyImage = useCallback(async (itemId) => {
    const item = itemsRef.current.find(i => i.id === itemId);
    if (!item || item.type !== 'image') return;
    try {
      const img = new Image();
      img.onload = async () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);
        canvas.toBlob(async (pngBlob) => {
          try {
            await navigator.clipboard.write([
              new ClipboardItem({ 'image/png': pngBlob })
            ]);
            showToast('📋 이미지를 클립보드에 복사했어요');
          } catch (e) {
            showToast('⚠️ 복사에 실패했어요');
          }
        }, 'image/png');
      };
      img.src = item.content;
    } catch (e) {
      showToast('⚠️ 복사에 실패했어요');
    }
  }, [showToast]);

  // ── Paste handler ──
  useEffect(() => {
    const handler = (e) => {
      if (editingTextId) return;
      const clipItems = e.clipboardData?.items;
      if (!clipItems) return;
      for (const ci of clipItems) {
        if (ci.type.startsWith('image/')) {
          e.preventDefault();
          addImage(ci.getAsFile());
          return;
        }
      }
    };
    document.addEventListener('paste', handler);
    return () => document.removeEventListener('paste', handler);
  }, [addImage, editingTextId]);

  // ── Drag & Drop files ──
  useEffect(() => {
    let dragCount = 0;
    const enter = (e) => { e.preventDefault(); dragCount++; setShowDrop(true); };
    const leave = (e) => { e.preventDefault(); dragCount--; if (dragCount <= 0) { dragCount = 0; setShowDrop(false); } };
    const over = (e) => e.preventDefault();
    const drop = (e) => {
      e.preventDefault();
      dragCount = 0;
      setShowDrop(false);
      const files = e.dataTransfer.files;
      for (const f of files) {
        if (f.type.startsWith('image/')) addImage(f);
      }
    };
    document.addEventListener('dragenter', enter);
    document.addEventListener('dragleave', leave);
    document.addEventListener('dragover', over);
    document.addEventListener('drop', drop);
    return () => {
      document.removeEventListener('dragenter', enter);
      document.removeEventListener('dragleave', leave);
      document.removeEventListener('dragover', over);
      document.removeEventListener('drop', drop);
    };
  }, [addImage]);

  // ── Keyboard ──
  useEffect(() => {
    const handler = (e) => {
      if (editingTextId) return;

      if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIdsRef.current.size > 0) {
        e.preventDefault();
        deleteItems(new Set(selectedIdsRef.current));
      }
      if (e.key === 'Escape') {
        setSelectedIds(new Set());
        setContextMenu(null);
        setLightboxSrc(null);
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
        const selArr = Array.from(selectedIdsRef.current);
        const imgItem = itemsRef.current.find(i => selArr.includes(i.id) && i.type === 'image');
        if (imgItem) {
          e.preventDefault();
          copyImage(imgItem.id);
        }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
        e.preventDefault();
        setSelectedIds(new Set(itemsRef.current.map(i => i.id)));
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [deleteItems, editingTextId, copyImage]);

  // ── Close context menu on click ──
  useEffect(() => {
    if (!contextMenu) return;
    const handler = () => setContextMenu(null);
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, [contextMenu]);

  // ── Tab functions ──
  const addTab = async () => {
    const newTab = { id: uid(), name: `탭 ${tabs.length + 1}`, order: tabs.length };
    await dbPut('tabs', newTab);
    setTabs(prev => [...prev, newTab]);
    setActiveTabId(newTab.id);
  };

  const renameTab = async (id, newName) => {
    const name = newName.trim() || '이름없음';
    setTabs(prev => prev.map(t => t.id === id ? { ...t, name } : t));
    const tab = tabs.find(t => t.id === id);
    if (tab) await dbPut('tabs', { ...tab, name });
    setRenamingTabId(null);
  };

  const deleteTab = async (id) => {
    if (tabs.length <= 1) return;
    if (!confirm('이 탭과 모든 내용을 삭제할까요?')) return;
    await dbDelete('tabs', id);
    await dbDeleteByIndex('items', 'tabId', id);
    const remaining = tabs.filter(t => t.id !== id);
    setTabs(remaining);
    if (activeTabId === id) setActiveTabId(remaining[0].id);
  };

  // ── Selection ──
  const handleSelect = useCallback((id, shiftKey) => {
    if (shiftKey) {
      setSelectedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
    } else {
      setSelectedIds(new Set([id]));
    }
    const z = maxZRef.current++;
    updateItem(id, { zIndex: z });
  }, [updateItem]);

  // ── Context menu ──
  const handleContextMenu = useCallback((e, itemId) => {
    e.preventDefault();
    e.stopPropagation();
    if (!selectedIdsRef.current.has(itemId)) {
      setSelectedIds(new Set([itemId]));
    }
    setContextMenu({ x: e.clientX, y: e.clientY, itemId });
  }, []);

  // ── Backup ──
  const handleBackup = useCallback(async () => {
    try {
      const allTabs = await dbGetAll('tabs');
      const allItems = await dbGetAll('items');
      const data = { version: 1, exportedAt: new Date().toISOString(), tabs: allTabs, items: allItems };
      const json = JSON.stringify(data);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `refboard_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('💾 백업 파일을 저장했어요');
    } catch (e) {
      showToast('⚠️ 백업에 실패했어요');
    }
  }, [showToast]);

  // ── Restore ──
  const handleRestore = useCallback(() => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data.tabs || !data.items) {
          showToast('⚠️ 올바른 백업 파일이 아니에요');
          return;
        }
        if (!confirm(`백업 데이터를 복원할까요?\n(탭 ${data.tabs.length}개, 아이템 ${data.items.length}개)\n\n⚠️ 현재 데이터는 모두 덮어씌워져요!`)) return;

        // Clear existing data
        const db = await openDB();
        const tx = db.transaction(['tabs', 'items'], 'readwrite');
        tx.objectStore('tabs').clear();
        tx.objectStore('items').clear();
        await new Promise((resolve, reject) => {
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });

        // Restore data
        for (const tab of data.tabs) await dbPut('tabs', tab);
        for (const item of data.items) await dbPut('items', item);

        // Reload
        const restoredTabs = data.tabs.sort((a, b) => (a.order || 0) - (b.order || 0));
        setTabs(restoredTabs);
        setActiveTabId(restoredTabs[0].id);
        showToast('✅ 복원 완료!');
      } catch (e) {
        showToast('⚠️ 복원에 실패했어요. 파일을 확인해주세요');
      }
    };
    input.click();
  }, [showToast]);

  const handleBoardClick = (e) => {
    if (e.target === boardRef.current || e.target === containerRef.current) {
      setSelectedIds(new Set());
      setEditingTextId(null);
    }
  };

  const handleBoardContextMenu = (e) => {
    if (e.target === boardRef.current) {
      e.preventDefault();
      setContextMenu({ x: e.clientX, y: e.clientY, itemId: null });
    }
  };

  if (!loaded) return null;

  return (
    <div className="app-container">
      {/* Tab Bar */}
      <div className="tab-bar">
        {tabs.map(tab => (
          <div
            key={tab.id}
            className={`tab ${activeTabId === tab.id ? 'active' : ''}`}
            onClick={() => setActiveTabId(tab.id)}
            onDoubleClick={(e) => { e.stopPropagation(); setRenamingTabId(tab.id); }}
          >
            {renamingTabId === tab.id ? (
              <input
                className="tab-rename-input"
                defaultValue={tab.name}
                autoFocus
                onBlur={(e) => renameTab(tab.id, e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter') renameTab(tab.id, e.target.value);
                  if (e.key === 'Escape') setRenamingTabId(null);
                }}
                onClick={(e) => e.stopPropagation()}
              />
            ) : (
              <>
                <span>{tab.name}</span>
                {tabs.length > 1 && (
                  <span className="tab-delete" onClick={(e) => { e.stopPropagation(); deleteTab(tab.id); }}>✕</span>
                )}
              </>
            )}
          </div>
        ))}
        <button className="tab-add" onClick={addTab}>+</button>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <button className="toolbar-btn" onClick={addTextMemo}>📝 메모 추가</button>
        <button className="toolbar-btn" onClick={handleBackup}>💾 백업</button>
        <button className="toolbar-btn" onClick={handleRestore}>📂 복원</button>
        <span className="toolbar-hint">Ctrl+V 붙여넣기 · Shift+클릭 다중선택 · Ctrl+C 이미지복사 · 우클릭 메뉴 · 더블클릭 확대/편집</span>
      </div>

      {/* Board */}
      <div className="board-container" ref={containerRef} onClick={handleBoardClick}>
        <div className="board" ref={boardRef} onContextMenu={handleBoardContextMenu}>
          {items.length === 0 && (
            <div className="empty-state">
              <div className="icon">📋</div>
              <div className="title">보드가 비어 있어요</div>
              <div className="desc">Ctrl+V로 이미지를 붙여넣거나, 파일을 드래그해 보세요</div>
            </div>
          )}
          {items.map(item => (
            <BoardItem
              key={item.id}
              item={item}
              isSelected={selectedIds.has(item.id)}
              isEditing={editingTextId === item.id}
              selectedIds={selectedIds}
              allItems={items}
              onSelect={handleSelect}
              onDelete={(id) => deleteItems(new Set([id]))}
              onUpdate={updateItem}
              onUpdateMulti={updateItems}
              onStartEdit={(id) => setEditingTextId(id)}
              onEndEdit={() => setEditingTextId(null)}
              onContextMenu={handleContextMenu}
              onViewImage={(src) => setLightboxSrc(src)}
            />
          ))}
        </div>
      </div>

      {showDrop && (
        <div className="drop-overlay"><span>이미지를 여기에 놓으세요</span></div>
      )}

      {contextMenu && (
        <ContextMenu
          x={contextMenu.x} y={contextMenu.y}
          itemId={contextMenu.itemId}
          items={items} selectedIds={selectedIds}
          onCopy={copyImage}
          onDelete={(id) => {
            if (id) {
              const toDelete = selectedIds.has(id) && selectedIds.size > 1 ? new Set(selectedIds) : new Set([id]);
              deleteItems(toDelete);
            }
          }}
          onView={(id) => {
            const item = items.find(i => i.id === id);
            if (item?.type === 'image') setLightboxSrc(item.content);
          }}
          onAddMemo={addTextMemo}
          onClose={() => setContextMenu(null)}
        />
      )}

      {lightboxSrc && (
        <div className="lightbox" onClick={() => setLightboxSrc(null)}>
          <img src={lightboxSrc} alt="" onClick={(e) => e.stopPropagation()} />
          <button className="lightbox-close" onClick={() => setLightboxSrc(null)}>✕</button>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

/* ═══════════════════════════════════════
   Context Menu
   ═══════════════════════════════════════ */
function ContextMenu({ x, y, itemId, items, selectedIds, onCopy, onDelete, onView, onAddMemo, onClose }) {
  const item = items.find(i => i.id === itemId);
  const isImage = item?.type === 'image';
  const multiSel = selectedIds.size > 1 && selectedIds.has(itemId);
  const menuRef = useRef(null);
  const [pos, setPos] = useState({ x, y });

  useEffect(() => {
    if (menuRef.current) {
      const rect = menuRef.current.getBoundingClientRect();
      let nx = x, ny = y;
      if (x + rect.width > window.innerWidth) nx = x - rect.width;
      if (y + rect.height > window.innerHeight) ny = y - rect.height;
      setPos({ x: Math.max(0, nx), y: Math.max(0, ny) });
    }
  }, [x, y]);

  const stop = (e) => { e.stopPropagation(); e.preventDefault(); };

  if (!itemId) {
    return (
      <div className="context-menu" ref={menuRef} style={{ left: pos.x, top: pos.y }}
        onClick={stop} onContextMenu={stop}>
        <button className="ctx-item" onClick={() => { onAddMemo(); onClose(); }}>
          📝 메모 추가
        </button>
      </div>
    );
  }

  return (
    <div className="context-menu" ref={menuRef} style={{ left: pos.x, top: pos.y }}
      onClick={stop} onContextMenu={stop}>
      {isImage && (
        <>
          <button className="ctx-item" onClick={() => { onView(itemId); onClose(); }}>
            🔍 원본 보기 <span className="ctx-shortcut">더블클릭</span>
          </button>
          <button className="ctx-item" onClick={() => { onCopy(itemId); onClose(); }}>
            📋 이미지 복사 <span className="ctx-shortcut">Ctrl+C</span>
          </button>
          <div className="ctx-sep" />
        </>
      )}
      <button className="ctx-item danger" onClick={() => { onDelete(itemId); onClose(); }}>
        🗑 {multiSel ? `${selectedIds.size}개 삭제` : '삭제'} <span className="ctx-shortcut">Del</span>
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════
   Board Item
   ═══════════════════════════════════════ */
function BoardItem({ item, isSelected, isEditing, selectedIds, allItems, onSelect, onDelete, onUpdate, onUpdateMulti, onStartEdit, onEndEdit, onContextMenu, onViewImage }) {
  const elRef = useRef(null);

  const handleMouseDown = (e) => {
    if (e.button !== 0) return;
    if (isEditing && item.type === 'text') return;
    e.stopPropagation();

    const shiftKey = e.shiftKey;
    if (shiftKey) {
      onSelect(item.id, true);
      return;
    }
    if (!selectedIds.has(item.id)) {
      onSelect(item.id, false);
    }

    const startX = e.clientX;
    const startY = e.clientY;
    const dragging = selectedIds.has(item.id) ? selectedIds : new Set([item.id]);
    const startPositions = {};
    allItems.forEach(i => {
      if (dragging.has(i.id)) startPositions[i.id] = { x: i.x, y: i.y };
    });

    let moved = false;
    const onMove = (ev) => {
      moved = true;
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      const updates = {};
      for (const [id, pos] of Object.entries(startPositions)) {
        updates[id] = { x: Math.max(0, pos.x + dx), y: Math.max(0, pos.y + dy) };
      }
      onUpdateMulti(updates);
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (!moved && !shiftKey) {
        onSelect(item.id, false);
      }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  const handleResizeDown = (e) => {
    e.stopPropagation();
    e.preventDefault();
    const startX = e.clientX;
    const startY = e.clientY;
    const startW = item.width;
    const startH = item.height;
    const onMove = (ev) => {
      onUpdate(item.id, {
        width: Math.max(60, startW + ev.clientX - startX),
        height: Math.max(40, startH + ev.clientY - startY)
      });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  const handleDoubleClick = (e) => {
    e.stopPropagation();
    if (item.type === 'text') onStartEdit(item.id);
    else if (item.type === 'image') onViewImage(item.content);
  };

  const style = {
    left: item.x, top: item.y, width: item.width,
    height: item.type === 'text' ? 'auto' : item.height,
    minHeight: item.type === 'text' ? item.height : undefined,
    zIndex: item.zIndex || 0,
  };

  return (
    <div
      ref={elRef}
      className={`board-item ${item.type === 'image' ? 'board-item-image' : ''} ${isSelected ? 'selected' : ''}`}
      style={style}
      onMouseDown={handleMouseDown}
      onDoubleClick={handleDoubleClick}
      onContextMenu={(e) => onContextMenu(e, item.id)}
    >
      {item.type === 'image' ? (
        <img src={item.content} alt="" draggable={false} />
      ) : (
        <div className={`board-item-text ${isEditing ? 'editing' : ''}`} style={{ width: '100%', minHeight: item.height }}>
          {isEditing ? (
            <textarea
              autoFocus
              defaultValue={item.content}
              onBlur={(e) => { onUpdate(item.id, { content: e.target.value }); onEndEdit(); }}
              onKeyDown={(e) => { if (e.key === 'Escape') { onUpdate(item.id, { content: e.target.value }); onEndEdit(); } }}
              onMouseDown={(e) => e.stopPropagation()}
              style={{ minHeight: Math.max(40, item.height - 20) }}
            />
          ) : (
            <span>{item.content || '더블클릭하여 편집...'}</span>
          )}
        </div>
      )}
      {isSelected && (
        <>
          <div className="item-delete" onClick={(e) => { e.stopPropagation(); onDelete(item.id); }}>✕</div>
          <div className="item-resize" onMouseDown={handleResizeDown} />
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
