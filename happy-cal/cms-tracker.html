function _syncCommToFirebase(commissions, customTypes) {
  try {
    const now = new Date();
    const dateKey = k => { const d = new Date(k); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    // 날짜별 작업시간 집계
    const dailyLog = {};
    const checkDoodle = t => { const ct = (customTypes||[]).find(x => x.name === t); return ct ? ct.category === 'doodle' : t && t.indexOf('낙서:') === 0; };
    (commissions||[]).forEach(c => {
      const isDoodle = checkDoodle(c.type);
      (c.sessions||[]).forEach(s => {
        const k = dateKey(s.date);
        if (!dailyLog[k]) dailyLog[k] = { comm: 0, doodle: 0 };
        if (isDoodle) dailyLog[k].doodle += (s.duration||0);
        else dailyLog[k].comm += (s.duration||0);
      });
    });
    _fbDb.collection('trackerSync').doc('commission').set({ dailyLog, updatedAt: Date.now() }, { merge: true }).catch(e => console.warn('Firebase sync failed:', e));
    // 마감일정
    const deadlines = (commissions||[]).filter(c => c.deadline && c.deadline.length >= 10 && c.status !== 'completed').map(c => ({ id: c.id, name: c.name, deadline: c.deadline, type: 'commission' }));
    _fbDb.collection('trackerSync').doc('deadlines_commission').set({ items: deadlines, updatedAt: Date.now() }).catch(e => console.warn('Firebase deadline sync failed:', e));
  } catch(e) { console.warn('Commission Firebase sync error:', e); }
}

const STORAGE_KEY = "commission-tracker-data";
const IDB_NAME = "commission-tracker-images";
const IDB_STORE = "images";
const TIMER_DEFAULTS = { work: 25, shortBreak: 5, longBreak: 15 };
const TIMER_STATE_KEY = "cms-timer-state";

function saveTimerState(state) {
  try { localStorage.setItem(TIMER_STATE_KEY, JSON.stringify(state)); } catch(e) {}
}
function clearTimerState() {
  try { localStorage.removeItem(TIMER_STATE_KEY); } catch(e) {}
}
function loadTimerState() {
  try {
    const raw = localStorage.getItem(TIMER_STATE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s.startTime && (Date.now() - s.startTime) > 24 * 60 * 60 * 1000) { clearTimerState(); return null; }
    return s;
  } catch(e) { return null; }
}

function openImageDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = function(e) { e.target.result.createObjectStore(IDB_STORE); };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e); };
  });
}

function idbPut(key, value) {
  return openImageDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e); };
    });
  });
}

function idbGet(key) {
  return openImageDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readonly");
      var req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = function() { resolve(req.result || null); };
      req.onerror = function(e) { reject(e); };
    });
  });
}

function idbDelete(key) {
  return openImageDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e); };
    });
  });
}

function idbGetAll() {
  return openImageDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readonly");
      var store = tx.objectStore(IDB_STORE);
      var keys = [], vals = [];
      var cursorReq = store.openCursor();
      cursorReq.onsuccess = function(e) {
        var cursor = e.target.result;
        if (cursor) { keys.push(cursor.key); vals.push(cursor.value); cursor.continue(); }
        else {
          var result = {};
          keys.forEach(function(k, i) { result[k] = vals[i]; });
          resolve(result);
        }
      };
      cursorReq.onerror = function(e) { reject(e); };
    });
  });
}

function isDataUrl(s) { return s && typeof s === "string" && s.indexOf("data:") === 0; }
function imageKey(commId, field, idx) { return commId + ":" + field + (idx !== undefined ? ":" + idx : ""); }

const DEFAULT_CUSTOM_TYPES = [
  { id: "t1", name: "예시 타입", price: 50000, category: "commission" },
];
const DEFAULT_PLATFORMS = [
  { id: "p1", name: "예시 플랫폼" },
];

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}시간 ${m}분 ${s < 10 ? "0" : ""}${s}초`;
  return `${m}분 ${s < 10 ? "0" : ""}${s}초`;
}

function formatTimerDisplay(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m < 10 ? "0" : ""}${m}:${s < 10 ? "0" : ""}${s}`;
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
}

function formatDateTime(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}

function totalSeconds(sessions) {
  return sessions.reduce((sum, s) => sum + s.duration, 0);
}

function calcHourlyRate(price, extras, seconds) {
  if (seconds === 0) return null;
  const total = price + extras;
  const hours = seconds / 3600;
  return Math.round(total / hours);
}

function CommissionTracker() {
  const [commissions, setCommissions] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("list");
  const [selectedId, setSelectedId] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [manualTimeInput, setManualTimeInput] = useState({ show: false, hours: 0, minutes: 0 });
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [archiveFilter, setArchiveFilter] = useState({ month: "all", type: "all", platform: "all" });
  const [archiveSubTab, setArchiveSubTab] = useState("list");
  const [heatmapYear, setHeatmapYear] = useState(new Date().getFullYear());
  const [matrixRange, setMatrixRange] = useState("all");
  const [heatmapCell, setHeatmapCell] = useState(null);
  const [showHourlyRate, setShowHourlyRate] = useState(false);
  const [listFilter, setListFilter] = useState("all");
  const [listPage, setListPage] = useState(1);
  const [archivePage, setArchivePage] = useState(1);
  const [galleryPage, setGalleryPage] = useState(1);
  const PAGE_SIZE = 15;
  const [statsView, setStatsView] = useState("paid");
  const [showFee, setShowFee] = useState(false);
  const [customTypes, setCustomTypes] = useState(DEFAULT_CUSTOM_TYPES);
  const [platforms, setPlatforms] = useState(DEFAULT_PLATFORMS);

  const listFiltered = [...commissions]
    .filter(c => listFilter === "all" ? true : c.status === listFilter)
    .sort((a, b) => {
      if (a.status === "in-progress" && b.status === "completed") return -1;
      if (a.status === "completed" && b.status === "in-progress") return 1;
      return 0;
    });
  const listTotalPages = Math.ceil(listFiltered.length / PAGE_SIZE);
  const listSafePage = Math.min(listPage, Math.max(listTotalPages, 1));
  const listPaged = listFiltered.slice((listSafePage - 1) * PAGE_SIZE, listSafePage * PAGE_SIZE);

  const isStatsExcluded = (typeName) => {
    const t = customTypes.find(ct => ct.name === typeName);
    return t ? t.category === "doodle" : typeName.indexOf("낙서:") === 0;
  };
  const TIME_SLOTS = ["오전", "오후", "저녁", "심야"];
  const HEATMAP_COLORS = ["#F5EDF5", "#E1CCE5", "#C8A2D8", "#9B6FB5", "#6E3F8C"];
  const HEATMAP_ACCENT = "#9B6FB5";
  function getTimeSlot(isoStr, isOvernightBatch) {
    if (isOvernightBatch) return "심야";
    const h = new Date(isoStr).getHours();
    if (h >= 5 && h < 12) return "오전";
    if (h >= 12 && h < 18) return "오후";
    if (h >= 18 && h < 22) return "저녁";
    return "심야";
  }
  function toLocalDatetimeInput(date) {
    const pad = n => String(n).padStart(2, "0");
    return date.getFullYear() + "-" + pad(date.getMonth()+1) + "-" + pad(date.getDate()) + "T" + pad(date.getHours()) + ":" + pad(date.getMinutes());
  }
  function formatDateKey(date) {
    const pad = n => String(n).padStart(2, "0");
    return date.getFullYear() + "-" + pad(date.getMonth()+1) + "-" + pad(date.getDate());
  }
  function heatLevel(n) {
    if (n === 0) return 0;
    if (n === 1) return 1;
    if (n <= 3) return 2;
    if (n <= 6) return 3;
    return 4;
  }
  const getTypePrice = (typeName) => {
    const t = customTypes.find(ct => ct.name === typeName);
    return t ? t.price : 0;
  };
  const typeNames = customTypes.map(ct => ct.name);
  const [commentText, setCommentText] = useState("");
  const [commentImage, setCommentImage] = useState(null);

  const [form, setForm] = useState({
    name: "", type: "", price: 0,
    hasExtras: false, extrasAmount: 0, imageData: null, notes: "",
    requestUrl: "", deadline: "", paidDate: "", platform: "",
    receivedAt: "", isOvernightBatch: false
  });

  const [timerState, setTimerState] = useState("idle");
  const [timerMode, setTimerMode] = useState("work");
  const [timeLeft, setTimeLeft] = useState(TIMER_DEFAULTS.work * 60);
  const [sessionElapsed, setSessionElapsed] = useState(0);
  const [pomodoroCount, setPomodoroCount] = useState(0);
  const [timerSettings, setTimerSettings] = useState(TIMER_DEFAULTS);
  const [showSettings, setShowSettings] = useState(false);

  const intervalRef = useRef(null);
  const fileInputRef = useRef(null);
  const backupInputRef = useRef(null);
  const prevViewRef = useRef("list");
  const timerStartRef = useRef(null);
  const timerAccumulatedRef = useRef(0);

  useEffect(() => {
    (function loadData() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) { setLoaded(true); return; }
        var parsed = JSON.parse(raw);
        var comms = (parsed.commissions || []).map(function(c) {
          var fixed = Object.assign({}, c);
          if (fixed.type === "기타낙서") fixed.type = "낙서:낙서";
          if (!fixed.comments) fixed.comments = [];
          return fixed;
        });
        if (parsed.timerSettings) setTimerSettings(parsed.timerSettings);
        if (parsed.customTypes && parsed.customTypes.length > 0) setCustomTypes(parsed.customTypes);
        if (parsed.platforms && parsed.platforms.length > 0) setPlatforms(parsed.platforms);

        var imageKeys = [];
        comms.forEach(function(c) {
          if (c.imageData && c.imageData.indexOf("idb:") === 0) imageKeys.push({ commIdx: comms.indexOf(c), field: "imageData", key: c.imageData.slice(4) });
          (c.comments || []).forEach(function(cm, ci) {
            if (cm.image && cm.image.indexOf("idb:") === 0) imageKeys.push({ commIdx: comms.indexOf(c), commentIdx: ci, field: "commentImage", key: cm.image.slice(4) });
          });
        });

        if (imageKeys.length === 0) { setCommissions(comms); setLoaded(true); return; }

        Promise.all(imageKeys.map(function(ik) { return idbGet(ik.key).then(function(val) { return { ik: ik, val: val }; }); }))
          .then(function(results) {
            results.forEach(function(r) {
              if (r.ik.field === "imageData") comms[r.ik.commIdx].imageData = r.val;
              else comms[r.ik.commIdx].comments[r.ik.commentIdx].image = r.val;
            });
            setCommissions(comms);
            setLoaded(true);
          }).catch(function() { setCommissions(comms); setLoaded(true); });
      } catch (e) { setLoaded(true); }
    })();
  }, []);

  const saveData = useCallback((comms, settings) => {
    try {
      var imageOps = [];
      var stripped = comms.map(function(c) {
        var sc = Object.assign({}, c, { comments: (c.comments || []).slice() });
        if (isDataUrl(sc.imageData)) {
          var k = imageKey(c.id, "thumb");
          imageOps.push(idbPut(k, sc.imageData));
          sc.imageData = "idb:" + k;
        }
        sc.comments = sc.comments.map(function(cm) {
          if (isDataUrl(cm.image)) {
            var ck = imageKey(c.id, "cm", cm.id);
            imageOps.push(idbPut(ck, cm.image));
            return Object.assign({}, cm, { image: "idb:" + ck });
          }
          return cm;
        });
        return sc;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        commissions: stripped, timerSettings: settings || timerSettings,
        customTypes: customTypes, platforms: platforms
      }));
      if (imageOps.length > 0) Promise.all(imageOps).catch(function() {});
      _syncCommToFirebase(comms, customTypes);
    } catch (e) {}
  }, [timerSettings, customTypes, platforms]);

  useEffect(() => {
    if (loaded) saveData(commissions, timerSettings);
  }, [commissions, timerSettings, customTypes, platforms, loaded, saveData]);

  // 타이머 복구
  useEffect(() => {
    if (!loaded) return;
    const saved = loadTimerState();
    if (!saved) return;
    setTimerMode(saved.mode);
    setPomodoroCount(saved.pomodoroCount || 0);
    if (saved.selectedId) setSelectedId(saved.selectedId);
    if (saved.state === "running" && saved.startTime) {
      timerStartRef.current = saved.startTime;
      timerAccumulatedRef.current = saved.accumulated || 0;
      setTimerState("running");
    } else if (saved.state === "paused") {
      timerAccumulatedRef.current = saved.accumulated || 0;
      setTimerState("paused");
    }
  }, [loaded]);

  useEffect(() => {
    if (timerState === "running") {
      if (!timerStartRef.current) timerStartRef.current = Date.now();
      const totalDuration = timerSettings[timerMode === "shortBreak" ? "shortBreak" : timerMode === "longBreak" ? "longBreak" : "work"] * 60;

      intervalRef.current = setInterval(() => {
        const elapsed = timerAccumulatedRef.current + Math.floor((Date.now() - timerStartRef.current) / 1000);
        const remaining = Math.max(0, totalDuration - elapsed);

        if (timerMode === "work") setSessionElapsed(elapsed);
        setTimeLeft(remaining);

        if (remaining <= 0) {
          clearInterval(intervalRef.current);
          playAlarm();
          clearTimerState();
          timerStartRef.current = null;
          timerAccumulatedRef.current = 0;

          if (timerMode === "work") {
            if (selectedId) {
              setCommissions(prev => prev.map(c =>
                c.id === selectedId ? {
                  ...c, sessions: [...c.sessions, {
                    id: generateId(), duration: totalDuration,
                    date: Date.now(), type: "pomodoro"
                  }]
                } : c
              ));
            }
            setSessionElapsed(0);
            const newCount = pomodoroCount + 1;
            setPomodoroCount(newCount);
            const isLongBreak = newCount % 4 === 0;
            setTimerMode(isLongBreak ? "longBreak" : "shortBreak");
            setTimerState("idle");
            setTimeLeft((isLongBreak ? timerSettings.longBreak : timerSettings.shortBreak) * 60);
          } else {
            setTimerMode("work");
            setTimerState("idle");
            setTimeLeft(timerSettings.work * 60);
          }
        }
      }, 200);
    }
    return () => clearInterval(intervalRef.current);
  }, [timerState, timerMode, selectedId, pomodoroCount, timerSettings]);

  function playAlarm() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.6, 1.2].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 1200;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.5, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.5);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.5);
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.frequency.value = 1800;
        osc2.type = "sine";
        gain2.gain.setValueAtTime(0.2, ctx.currentTime + delay);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.3);
        osc2.start(ctx.currentTime + delay);
        osc2.stop(ctx.currentTime + delay + 0.3);
      });
    } catch (e) {}
  }

  function startTimer() {
    if (timerState === "idle") {
      if (timerMode === "work") setSessionElapsed(0);
      timerStartRef.current = Date.now();
      timerAccumulatedRef.current = 0;
      setTimerState("running");
      saveTimerState({ state: "running", mode: timerMode, startTime: Date.now(), accumulated: 0, selectedId, pomodoroCount, settings: timerSettings });
    }
  }
  function pauseTimer() {
    if (timerState === "running") {
      clearInterval(intervalRef.current);
      timerAccumulatedRef.current += Math.floor((Date.now() - timerStartRef.current) / 1000);
      timerStartRef.current = null;
      setTimerState("paused");
      saveTimerState({ state: "paused", mode: timerMode, startTime: null, accumulated: timerAccumulatedRef.current, selectedId, pomodoroCount, settings: timerSettings });
    }
  }
  function resumeTimer() {
    if (timerState === "paused") {
      timerStartRef.current = Date.now();
      setTimerState("running");
      saveTimerState({ state: "running", mode: timerMode, startTime: Date.now(), accumulated: timerAccumulatedRef.current, selectedId, pomodoroCount, settings: timerSettings });
    }
  }
  function stopTimer() {
    clearInterval(intervalRef.current);
    const elapsed = timerAccumulatedRef.current + (timerStartRef.current ? Math.floor((Date.now() - timerStartRef.current) / 1000) : 0);
    if (timerMode === "work" && elapsed > 0 && selectedId) {
      setCommissions(prev => prev.map(c =>
        c.id === selectedId ? {
          ...c, sessions: [...c.sessions, {
            id: generateId(), duration: elapsed,
            date: Date.now(), type: "manual"
          }]
        } : c
      ));
    }
    timerStartRef.current = null;
    timerAccumulatedRef.current = 0;
    setTimerState("idle");
    setTimerMode("work");
    setTimeLeft(timerSettings.work * 60);
    setSessionElapsed(0);
    clearTimerState();
  }

  function handleImageUpload(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const maxDim = 400;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = (h / w) * maxDim; w = maxDim; }
          else { w = (w / h) * maxDim; h = maxDim; }
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        setForm(f => ({ ...f, imageData: canvas.toDataURL("image/jpeg", 0.7) }));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

    setCommissions(prev => prev.map(c =>

  function handleCommentPaste(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf("image") !== -1) {
        e.preventDefault();
        var file = items[i].getAsFile();
        var reader = new FileReader();
        reader.onload = function(ev) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement("canvas");
            var maxDim = 800;
            var w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = (h / w) * maxDim; w = maxDim; }
              else { w = (w / h) * maxDim; h = maxDim; }
            }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            setCommentImage(canvas.toDataURL("image/jpeg", 0.7));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        break;
      }
    }
  }

  }

  function importBackup(e) {

    var reader = new FileReader();
    reader.onload = function(ev) {

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <h2 style={{ fontSize: 18, fontWeight: 500, margin: 0 }}>{selected.name}</h2>
                    <span style={{

                    }}>

                      setForm({

                        requestUrl: selected.requestUrl || "", deadline: selected.deadline || "",
                        paidDate: selected.paidDate || "",
                        platform: selected.platform || "",
                        receivedAt: selected.receivedAt || "",

                  <div style={{ fontWeight: 500 }}>
                    <span style={{ color: "var(--color-text-secondary)", fontWeight: 400 }}>합계:</span>{" "}

                  <div style={{ fontWeight: 500 }}>
                    <span style={{ color: "var(--color-text-secondary)", fontWeight: 400 }}>총 작업시간:</span>{" "}
                    {totalSeconds(selected.sessions) > 0 ? formatTime(totalSeconds(selected.sessions)) : "\u2014"}
                  </div>
                  {selected.deadline && (
                    <div>
                      <span style={{ color: "var(--color-text-secondary)" }}>마감일:</span>{" "}

                {selected.requestUrl && (

                    <a href={selected.requestUrl} target="_blank" rel="noopener noreferrer"

                {selected.notes && (
                  <div style={{ marginTop: 8, fontSize: 13, color: "var(--color-text-secondary)", fontStyle: "italic" }}>{selected.notes}</div>

            </div>
          </div>

          <div style={{
            background: "var(--color-background-primary)",
            border: "0.5px solid var(--color-border-tertiary)",
            borderRadius: "var(--border-radius-lg)", padding: "1.25rem",
            marginBottom: "1rem", textAlign: "center"

            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginBottom: 8 }}>

              }}>
                {[["work", "작업"], ["shortBreak", "짧은 휴식"], ["longBreak", "긴 휴식"]].map(([key, label]) => (
                  <div key={key} style={{ fontSize: 12 }}>
                    <label style={{ color: "var(--color-text-secondary)", display: "block", marginBottom: 2 }}>{label}</label>
                    <input type="number" value={timerSettings[key]} min={1} max={120}
                      onChange={e => {
                        const val = parseInt(e.target.value) || 1;
                        setTimerSettings(s => ({ ...s, [key]: val }));
                        if (timerState === "idle") {
                          if (key === "work" && timerMode === "work") setTimeLeft(val * 60);
                          if (key === "shortBreak" && timerMode === "shortBreak") setTimeLeft(val * 60);
                          if (key === "longBreak" && timerMode === "longBreak") setTimeLeft(val * 60);
                        }
                      }}
                      style={{ width: 56, textAlign: "center" }} />
                    <span style={{ color: "var(--color-text-tertiary)", marginLeft: 2 }}>분</span>
                  </div>
                ))}
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 16 }}>
              {["work", "shortBreak", "longBreak"].map(mode => (
                <button key={mode}
                  onClick={() => { if (timerState !== "idle") return; setTimerMode(mode); setTimeLeft(timerSettings[mode] * 60); }}
                  style={{
                    fontSize: 12, padding: "4px 12px",
                    background: timerMode === mode ? (mode === "work" ? "#534AB7" : "#D4537E") : "transparent",
                    color: timerMode === mode ? "#fff" : "var(--color-text-secondary)",
                    border: timerMode === mode ? "none" : "0.5px solid var(--color-border-tertiary)",
                    borderRadius: "var(--border-radius-md)", cursor: timerState === "idle" ? "pointer" : "default"
                  }}>
                  {mode === "work" ? "작업" : mode === "shortBreak" ? "짧은 휴식" : "긴 휴식"}
                </button>
              ))}
            </div>

            <div style={{ position: "relative", width: 200, height: 200, margin: "0 auto 16px" }}>
              <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="none" stroke="var(--color-border-tertiary)" strokeWidth="4" />
                <circle cx="100" cy="100" r="90" fill="none"
                  stroke={timerMode === "work" ? "#534AB7" : "#D4537E"}
                  strokeWidth="4" strokeLinecap="round"
                  strokeDasharray={circumference}
                  strokeDashoffset={dashOffset}
                  transform="rotate(-90 100 100)"
                  style={{ transition: "stroke-dashoffset 0.5s linear" }} />
              </svg>
              <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", textAlign: "center" }}>
                <div style={{ fontSize: 36, fontWeight: 500, fontFamily: "var(--font-mono)", color: "var(--color-text-primary)" }}>
                  {formatTimerDisplay(timeLeft)}
                </div>
                <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginTop: 2 }}>
                  {timerMode === "work" ? "작업 중" : timerMode === "shortBreak" ? "짧은 휴식" : "긴 휴식"}
                </div>
              </div>
            </div>

            {timerMode === "work" && sessionElapsed > 0 && (
              <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 8 }}>현재 세션: {formatTime(sessionElapsed)}</div>
            )}
            <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 12 }}>완료한 뽀모도로: {pomodoroCount}회</div>

            <div style={{ display: "flex", justifyContent: "center", gap: 8 }}>
              {timerState === "idle" && (
                <button onClick={startTimer}
                  style={{ fontSize: 14, padding: "8px 24px", background: timerMode === "work" ? "#534AB7" : "#D4537E", color: "#fff", border: "none", borderRadius: "var(--border-radius-md)" }}>
                  시작
                </button>
              )}
              {timerState === "running" && (
                <button onClick={pauseTimer} style={{ fontSize: 14, padding: "8px 24px" }}>일시정지</button>
              )}
              {timerState === "paused" && (
                <React.Fragment>
                  <button onClick={resumeTimer}
                    style={{ fontSize: 14, padding: "8px 24px", background: "#534AB7", color: "#fff", border: "none", borderRadius: "var(--border-radius-md)" }}>
                    재개
                  </button>
                  <button onClick={stopTimer} style={{ fontSize: 14, padding: "8px 24px", color: "var(--color-text-danger)" }}>중단 (시간 저장)</button>
                </React.Fragment>
              )}
              {timerState === "running" && (
                <button onClick={stopTimer} style={{ fontSize: 14, padding: "8px 24px", color: "var(--color-text-danger)" }}>중단 (시간 저장)</button>
              )}
            </div>
          </div>

          <div style={{
            background: "var(--color-background-primary)",
            border: "0.5px solid var(--color-border-tertiary)",
            borderRadius: "var(--border-radius-lg)", padding: "1.25rem"
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <h3 style={{ fontSize: 16, fontWeight: 500, margin: 0 }}>작업 기록</h3>
              <button onClick={() => setManualTimeInput(p => ({ ...p, show: !p.show }))} style={{ fontSize: 12, padding: "4px 10px" }}>
                {manualTimeInput.show ? "취소" : "+ 수동 입력"}
              </button>
            </div>

            {manualTimeInput.show && (
              <div style={{
                display: "flex", alignItems: "center", gap: 8,
                marginBottom: 12, padding: "10px 12px",
                background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)"
              }}>
                <span style={{ fontSize: 13, color: "var(--color-text-secondary)", flexShrink: 0 }}>작업시간:</span>
                <input type="number" min="0" max="99" value={manualTimeInput.hours}
                  onChange={e => setManualTimeInput(p => ({ ...p, hours: e.target.value }))} style={{ width: 52, textAlign: "center" }} />
                <span style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>시간</span>
                <input type="number" min="0" max="59" value={manualTimeInput.minutes}
                  onChange={e => setManualTimeInput(p => ({ ...p, minutes: e.target.value }))} style={{ width: 52, textAlign: "center" }} />
                <span style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>분</span>
                <button onClick={() => addManualTime(selected.id)}
                  style={{ fontSize: 12, padding: "4px 12px", marginLeft: 4, background: "#534AB7", color: "#fff", border: "none", borderRadius: "var(--border-radius-md)" }}>
                  추가
                </button>
              </div>
            )}

            {selected.sessions.length === 0 ? (
              <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", textAlign: "center", padding: "1rem" }}>
                아직 기록된 작업 세션이 없습니다. 타이머를 시작해보세요!
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {selected.sessions.slice().reverse().map(s => (
                  <div key={s.id} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "6px 8px", fontSize: 13,
                    background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)"
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{
                        fontSize: 11, padding: "1px 6px", borderRadius: "var(--border-radius-md)",
                        background: s.type === "pomodoro" ? "#EEEDFE" : "var(--color-background-warning)",
                        color: s.type === "pomodoro" ? "#3C3489" : "var(--color-text-warning)"
                      }}>
                        {s.type === "pomodoro" ? "뽀모도로" : "수동"}
                      </span>
                      <span style={{ color: "var(--color-text-secondary)" }}>{formatDate(s.date)}</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontWeight: 500 }}>{formatTime(s.duration)}</span>
                      <button onClick={(e) => { e.stopPropagation(); deleteSession(selected.id, s.id); }}
                        style={{ fontSize: 11, padding: "2px 6px", color: "var(--color-text-danger)", background: "transparent", border: "none", cursor: "pointer" }}>
                        ✕
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {selected.sessions.length > 0 && (() => {
              const total = totalSeconds(selected.sessions);
              const rate = calcHourlyRate(selected.price, selected.hasExtras ? selected.extrasAmount : 0, total);
              return (
                <React.Fragment>
                <div style={{
                  display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12,
                  marginTop: 16, paddingTop: 16, borderTop: "0.5px solid var(--color-border-tertiary)"
                }}>
                  <div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "10px 12px" }}>
                    <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>총 세션</div>
                    <div style={{ fontSize: 18, fontWeight: 500 }}>{selected.sessions.length}회</div>
                  </div>
                  <div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "10px 12px" }}>
                    <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>총 작업시간</div>
                    <div style={{ fontSize: 18, fontWeight: 500 }}>{formatTime(total)}</div>
                  </div>
                  <div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "10px 12px", cursor: "pointer" }}
                    onClick={() => setShowHourlyRate(p => !p)}>
                    <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>환산 시급 {showHourlyRate ? "🔓" : "🔒"}</div>
                    <div style={{ fontSize: 18, fontWeight: 500, color: "#534AB7" }}>
                      {showHourlyRate ? (rate !== null ? rate.toLocaleString() + "원" : "\u2014") : "클릭하여 보기"}
                    </div>
                  </div>
                </div>
                {!showHourlyRate && (
                  <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", textAlign: "right", marginTop: 4 }}>
                    작업 중에는 시급을 숨겨두는 것을 추천해요
                  </div>
                )}
                </React.Fragment>
              );
            })()}
          </div>

          <div style={{
            background: "var(--color-background-primary)",
            border: "0.5px solid var(--color-border-tertiary)",
            borderRadius: "var(--border-radius-lg)", padding: "1.25rem",
            marginTop: "1rem"
          }}>
            <h3 style={{ fontSize: 16, fontWeight: 500, margin: "0 0 12px" }}>코멘트</h3>
            <div style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
                <input type="text" value={commentText}
                  onChange={e => setCommentText(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) addComment(selected.id); }}
                  onPaste={handleCommentPaste}
                  placeholder="메모 입력 · 이미지 Ctrl+V 붙여넣기 가능"
                  style={{ flex: 1, boxSizing: "border-box" }} />
                <button onClick={() => addComment(selected.id)}
                  style={{ fontSize: 13, padding: "6px 14px", background: "#534AB7", color: "#fff", border: "none", borderRadius: "var(--border-radius-md)", flexShrink: 0 }}>
                  추가
                </button>
              </div>
              {commentImage && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 8px", background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)" }}>
                  <img src={commentImage} alt="" style={{ height: 48, borderRadius: 4, objectFit: "cover" }} />
                  <span style={{ fontSize: 12, color: "var(--color-text-secondary)", flex: 1 }}>WIP 이미지 첨부됨</span>
                  <button onClick={() => setCommentImage(null)}
                    style={{ fontSize: 11, padding: "2px 6px", color: "var(--color-text-danger)", background: "transparent", border: "none", cursor: "pointer" }}>
                    ✕ 제거
                  </button>
                </div>
              )}
            </div>
            {(selected.comments || []).length === 0 ? (
              <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", textAlign: "center", padding: "0.5rem" }}>
                아직 코멘트가 없습니다.
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {(selected.comments || []).slice().reverse().map(cm => (
                  <div key={cm.id} style={{
                    padding: "8px 10px",
                    background: "var(--color-background-secondary)",
                    borderRadius: "var(--border-radius-md)",
                    fontSize: 13
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div style={{ flex: 1 }}>
                        {cm.text && <div style={{ whiteSpace: "pre-wrap", wordBreak: "break-word", lineHeight: 1.5 }}>{cm.text}</div>}
                        {cm.image && (
                          <img src={cm.image} alt="WIP"
                            onClick={() => window.open(cm.image, "_blank")}
                            style={{ marginTop: cm.text ? 6 : 0, maxWidth: "100%", maxHeight: 300, borderRadius: 4, cursor: "pointer", display: "block" }} />
                        )}
                      </div>
                      <button onClick={() => deleteComment(selected.id, cm.id)}
                        style={{ fontSize: 11, padding: "0 4px", color: "var(--color-text-tertiary)", background: "transparent", border: "none", cursor: "pointer", flexShrink: 0, marginLeft: 8 }}>
                        ✕
                      </button>
                    </div>
                    <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 4 }}>
                      {formatDateTime(cm.date)}
                      {cm.image && <span style={{ marginLeft: 6, color: "#AFA9EC" }}>WIP</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function AuthGate({children}){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);
  const[err,setErr]=useState('');
  useEffect(()=>{const unsub=_fbAuth.onAuthStateChanged(u=>{setUser(u);setChecking(false)});return unsub},[]);
  const doLogin=()=>{setErr('');_fbAuth.signInWithPopup(_googleProvider).catch(e=>{console.error('Auth error:',e);setErr(e.code==='auth/operation-not-allowed'?'Firebase 콘솔에서 Google 로그인을 활성화해주세요':'팝업이 차단되었습니다. 브라우저 팝업 차단을 해제해주세요.')})};
  if(checking)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--color-background)',color:'var(--color-text-secondary)'}}><p>확인 중...</p></div>);
  if(!user)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,background:'var(--color-background)'}}>
    <p style={{fontSize:18,fontWeight:600,color:'var(--color-text)'}}>CMS 트래커</p>
    <p style={{fontSize:13,color:'var(--color-text-secondary)',marginBottom:8}}>Google 계정으로 로그인해주세요</p>
    <button onClick={doLogin} style={{padding:'12px 32px',background:'var(--color-primary)',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:600,cursor:'pointer'}}>Google 로그인</button>
    {err&&<p style={{color:'#D45B5B',fontSize:12,maxWidth:300,textAlign:'center'}}>{err}</p>}
  </div>);
  return children;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate><CommissionTracker /></AuthGate>);
</script>
</body>
</html>
