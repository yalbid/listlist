function createProject() {
  const title = document.getElementById('pTitle').value.trim();
  if (!title) return;

  const isNovel = document.getElementById('catNovel').classList.contains('active');
  const category = isNovel ? 'novel' : 'manga';

  const project = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    category,
    title,
    pairing: document.getElementById('pPairing').value.trim(),
    publishDate: document.getElementById('pDate').value,
    type: document.getElementById('pType').value,
    event: document.getElementById('pEvent').value.trim(),
    price: document.getElementById('pPrice').value.trim(),
    cover: null,
    plot: { done: false, time: 0 },
    reviews: [],
    createdAt: new Date().toISOString()
  };

  if (isNovel) {
    project.pages = parseInt(document.getElementById('pNovelPages').value) || 0;
    project.wordCount = parseInt(document.getElementById('pWordCount').value) || 0;
    project.writingUnit = document.getElementById('unitPages').classList.contains('active') ? 'pages' : 'chars';
    project.writingLogs = [];
    project.writing = { done: false, time: 0 };
    project.proofreading = { done: false, time: 0 };
    project.deadlines = {
      writing: document.getElementById('pDlWriting')?.value || '',
      proofreading: document.getElementById('pDlNProof')?.value || '',
      submission: document.getElementById('pDlNSubmission')?.value || ''
    };
  } else {
    const pages = parseInt(document.getElementById('pPages').value) || 0;
    project.pages = pages;
    const makePages = () => Array.from({length: pages}, () => ({done:false, time:0}));
    project.conti = makePages();
    project.rough = makePages();
    project.artwork = makePages();
    project.dailyGoals = {};
    project.deadlines = {
      conti: document.getElementById('pDlConti')?.value || '',
      rough: document.getElementById('pDlRough')?.value || '',
      artwork: document.getElementById('pDlArtwork')?.value || '',
      review: document.getElementById('pDlReview')?.value || '',
      submission: document.getElementById('pDlSubmission')?.value || ''
    };
  }

  projects.push(project);
  save();
  closeModal();
  renderProjectList();
  notify('프로젝트가 생성됐어요!');
}

    ${isNovel ? `<div class="form-row"><div class="form-group"><label>글자 수 (목표)</label><input type="number" id="eWordCount" value="${p.wordCount||''}" min="0"></div><div class="form-group"><label>집필 기록 단위</label><span class="badge" style="font-size:12px;padding:4px 10px;background:var(--bg);color:var(--text-sub);">${p.writingUnit==='pages'?'📄 페이지 수':'✍️ 글자 수'}</span></div></div>` : `<p style="font-size:12px;color:var(--text-light);margin-top:8px;">⚠️ 페이지 수를 변경하면 기존 트래킹 데이터가 조정돼요.</p>`}
    <div class="form-row">
      <div class="form-group">
        <label>발행일</label>
        <input type="date" id="eDate" value="${p.publishDate||''}">
      </div>
      <div class="form-group">
        <label>유형</label>
        <select id="eType">
          <option value="" ${!p.type?'selected':''}>미정</option>
          <option value="행사" ${p.type==='행사'?'selected':''}>행사</option>
          <option value="통판" ${p.type==='통판'?'selected':''}>통판</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>발행 행사</label>
        <input type="text" id="eEvent" value="${esc(p.event||'')}">
      </div>
      <div class="form-group">
        <label>가격</label>
        <input type="text" id="ePrice" value="${esc(p.price||'')}">
      </div>
    </div>
    ${isNovel ? `
    <div class="deadline-section-title">📅 단계별 마감일</div>
    <div class="deadlines-grid">
      <div class="form-group"><label>✍️ 집필 마감</label><input type="date" id="eDlWriting" value="${p.deadlines?.writing||''}"></div>
      <div class="form-group"><label>🔍 퇴고 마감</label><input type="date" id="eDlProof" value="${p.deadlines?.proofreading||''}"></div>
      <div class="form-group"><label>📦 입고일</label><input type="date" id="eDlSubmission" value="${p.deadlines?.submission||''}"></div>
    </div>` : `
    <div class="deadline-section-title">📅 단계별 마감일</div>
    <div class="deadlines-grid">
      <div class="form-group"><label>📋 콘티 마감</label><input type="date" id="eDlConti" value="${p.deadlines?.conti||''}"></div>
      <div class="form-group"><label>✏️ 러프 마감</label><input type="date" id="eDlRough" value="${p.deadlines?.rough||''}"></div>
      <div class="form-group"><label>🖊 작화 마감</label><input type="date" id="eDlArtwork" value="${p.deadlines?.artwork||''}"></div>
      <div class="form-group"><label>🔍 퇴고 마감</label><input type="date" id="eDlReview" value="${p.deadlines?.review||''}"></div>
      <div class="form-group"><label>📦 입고일</label><input type="date" id="eDlSubmission" value="${p.deadlines?.submission||''}"></div>
    </div>`}
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="updateProject()">저장</button>
    </div>`);
}

function updateProject() {
  const p = getProject();
  p.title = document.getElementById('eTitle').value.trim() || p.title;
  p.pairing = document.getElementById('ePairing').value.trim();
  p.publishDate = document.getElementById('eDate').value;
  p.type = document.getElementById('eType').value;
  p.event = document.getElementById('eEvent')?.value.trim() || '';
  p.price = document.getElementById('ePrice')?.value.trim() || '';

  if (!p.deadlines) p.deadlines = {};

  if (p.category === 'novel') {
    p.wordCount = parseInt(document.getElementById('eWordCount')?.value) || 0;
    p.deadlines.writing = document.getElementById('eDlWriting')?.value || '';
    p.deadlines.proofreading = document.getElementById('eDlProof')?.value || '';
    p.deadlines.submission = document.getElementById('eDlSubmission')?.value || '';
  } else {
    p.deadlines.conti = document.getElementById('eDlConti')?.value || '';
    p.deadlines.rough = document.getElementById('eDlRough')?.value || '';
    p.deadlines.artwork = document.getElementById('eDlArtwork')?.value || '';
    p.deadlines.review = document.getElementById('eDlReview')?.value || '';
    p.deadlines.submission = document.getElementById('eDlSubmission')?.value || '';
  }

  const newPages = parseInt(document.getElementById('ePages').value) || p.pages;
  if (newPages !== p.pages) {
    if (p.category !== 'novel') {
      ['conti','rough','artwork'].forEach(ph => {
        const old = p[ph] || [];
        p[ph] = Array.from({length: newPages}, (_, i) => old[i] || {done:false, time:0});
      });
    }
    p.pages = newPages;
  }

  save();
  closeModal();
  renderDetail();
  notify('프로젝트가 수정됐어요!');
}

function confirmDeleteProject() {
  const p = getProject();
  openModal(`
    <h2>🗑 프로젝트 삭제</h2>
    <p class="confirm-text">「${esc(p.title)}」을(를) 삭제할까요?<br>이 작업은 되돌릴 수 없어요.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" style="background:var(--red);border-color:var(--red);" onclick="deleteProject()">삭제</button>
    </div>`);
}

function deleteProject() {
  projects = projects.filter(p => p.id !== currentProjectId);
  save();
  closeModal();
  showView('list');
  notify('프로젝트가 삭제됐어요.');
}

// ========== POMODORO ==========
function togglePomodoro() {
  document.getElementById('pomoWidget').classList.toggle('hidden');
  document.getElementById('pomoToggle').classList.toggle('hidden');
}

function pomoAction(action) {
  if (action === 'start') {
    if (pomo.running) return;
    pomo.running = true;
    pomo.endTime = Date.now() + pomo.timeLeft * 1000;
    pomo.interval = setInterval(pomoTick, 250);
  } else if (action === 'pause') {
    if (!pomo.running) return;
    pomo.running = false;
    clearInterval(pomo.interval);
    // Freeze remaining time
    pomo.timeLeft = Math.max(0, Math.round((pomo.endTime - Date.now()) / 1000));
    pomo.endTime = null;
  } else if (action === 'reset') {
    pomo.running = false;
    clearInterval(pomo.interval);
    pomo.isBreak = false;
    pomo.timeLeft = WORK_MIN * 60;
    pomo.endTime = null;
    updatePomoDisplay();
  }
}

function pomoTick() {
  if (!pomo.running || !pomo.endTime) return;
  const remaining = Math.round((pomo.endTime - Date.now()) / 1000);
  pomo.timeLeft = Math.max(0, remaining);

  if (pomo.timeLeft <= 0) {
    clearInterval(pomo.interval);
    pomo.running = false;
    pomo.endTime = null;

    // Sound
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = pomo.isBreak ? 523 : 659;
      gain.gain.value = 0.3;
      osc.start();
      setTimeout(() => { osc.stop(); ctx.close(); }, 300);
    } catch(e) {}

    if (pomo.isBreak) {
      pomo.isBreak = false;
      pomo.timeLeft = WORK_MIN * 60;
      notify('🍅 휴식 끝! 다시 작업 시간이에요.');
    } else {
      pomo.isBreak = true;
      pomo.timeLeft = BREAK_MIN * 60;
      notify('☕ 수고했어요! 5분 쉬어가세요.');
    }
  }
  updatePomoDisplay();
}

function updatePomoDisplay() {
  const m = Math.floor(pomo.timeLeft / 60);
  const s = pomo.timeLeft % 60;
  const el = document.getElementById('pomoTime');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = `pomodoro-time ${pomo.isBreak ? 'break-mode' : 'work-mode'}`;
  document.getElementById('pomoLabel').textContent = pomo.isBreak ? '☕ 휴식 시간' : '🍅 작업 시간';
}

// ========== IMPORT/EXPORT ==========
function exportData() {
  const exportObj = { projects, dailyLog };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `doujinshi-tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  notify('데이터를 내보냈어요!');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      // Support both old format (array) and new format ({projects, dailyLog})
      if (Array.isArray(data)) {
        projects = data;
      } else if (data.projects && Array.isArray(data.projects)) {
        projects = data.projects;
        if (data.dailyLog) { dailyLog = data.dailyLog; saveDailyLog(); }
      } else { alert('올바른 형식이 아니에요.'); return; }
      projects.forEach(p => { if (!p.category) p.category = 'manga'; });
      save();
      renderProjectList();
      updateTodayDisplay();
      notify('데이터를 불러왔어요!');
    } catch(err) { alert('파일을 읽을 수 없어요.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ========== START ==========
init();
</script>
