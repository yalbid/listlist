<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐릭터 행복 일력</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#FFF9F0;--bg-secondary:#FFF3E4;--bg-card:#FFFFFF;--bg-input:#FFFBF5;--bg-sidebar:#FFF5EA;--text-primary:#3D2E1F;--text-secondary:#7A6555;--text-muted:#B09A85;--accent:#E8945A;--accent-hover:#D4803F;--accent-light:#FFF0E3;--border:#EDE0D1;--border-light:#F5EDE3;--shadow:rgba(61,46,31,0.08);--shadow-hover:rgba(61,46,31,0.14);--bubble-bg:#FFFFFF;--bubble-border:#EDE0D1;--tag-bg:#FFF0E3;--tag-text:#C47A3A;--danger:#D45B5B;--success:#5BA87A;--overlay:rgba(61,46,31,0.3);--tab-inactive:#D4C4B0;--radius-sm:8px;--radius-md:12px;--radius-lg:20px;--radius-xl:28px;--font-display:'Gowun Batang',serif;--font-body:'Noto Sans KR',sans-serif;--transition:0.25s ease;--sidebar-width:220px;--accent-shadow:rgba(232,148,90,0.3)}
[data-theme="dark"]{--bg-primary:#121822;--bg-secondary:#182030;--bg-card:#1C2636;--bg-input:#22303E;--bg-sidebar:#10161E;--text-primary:#E2EAF4;--text-secondary:#A0B4C8;--text-muted:#5A7088;--accent:#B48CDE;--accent-hover:#C9A5F0;--accent-light:#1E1A30;--border:#283848;--border-light:#1E2E3E;--shadow:rgba(0,4,16,0.3);--shadow-hover:rgba(0,4,16,0.5);--bubble-bg:#1C2636;--bubble-border:#283848;--tag-bg:#1E1A30;--tag-text:#B48CDE;--danger:#E06060;--success:#6BC090;--overlay:rgba(2,8,18,0.55);--tab-inactive:#4A6078;--accent-shadow:rgba(180,140,222,0.3)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;transition:background var(--transition),color var(--transition);overflow:hidden}button{cursor:pointer;font-family:var(--font-body)}input,textarea,select{font-family:var(--font-body)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bubbleIn{0%{opacity:0;transform:scale(0.9) translateY(8px)}60%{transform:scale(1.02) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.app-root{display:flex;height:100vh;width:100%}
.sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--bg-sidebar);border-right:1px solid var(--border-light);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:background var(--transition)}
.sidebar-header{padding:16px 14px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}
.sidebar-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}
.sidebar-add-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.sidebar-add-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.sidebar-bookmarks{flex:1;overflow-y:auto;padding:8px}
.bookmark-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.bookmark-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 3px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);text-decoration:none;color:var(--text-primary);transition:all var(--transition);position:relative;user-select:none}
.bookmark-item:hover{border-color:var(--accent);box-shadow:0 2px 10px var(--shadow);transform:translateY(-1px)}
.bookmark-item.dragging{opacity:0.4;transform:scale(0.95)}
.bookmark-item.drag-over-item{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-shadow)}
.bookmark-icon{width:32px;height:32px;border-radius:8px;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.bookmark-icon img{width:100%;height:100%;object-fit:cover}
.bookmark-label{font-size:10px;color:var(--text-secondary);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.3}
.bookmark-actions{position:absolute;top:2px;right:2px;display:none}
.bookmark-item:hover .bookmark-actions{display:flex;gap:2px}
.bookmark-action-btn{width:18px;height:18px;border-radius:4px;border:none;background:var(--bg-secondary);color:var(--text-muted);font-size:9px;display:flex;align-items:center;justify-content:center}
.bookmark-action-btn:hover{background:var(--danger);color:white}
.sidebar-empty{text-align:center;padding:20px 10px;color:var(--text-muted);font-size:12px;line-height:1.6}
.bm-icon-picker{display:flex;flex-direction:column;gap:8px}
.bm-icon-type-btns{display:flex;gap:4px}
.bm-icon-type-btn{flex:1;padding:5px 8px;font-size:11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all var(--transition)}
.bm-icon-type-btn.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent);font-weight:600}
.bm-icon-preview{width:40px;height:40px;border-radius:8px;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;border:1px solid var(--border-light);margin:0 auto}
.bm-icon-preview img{width:100%;height:100%;object-fit:cover}
.bm-paste-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;font-size:11px;color:var(--text-muted);cursor:pointer;transition:all var(--transition);min-height:50px;display:flex;align-items:center;justify-content:center}
.bm-paste-area:hover,.bm-paste-area:focus{border-color:var(--accent);color:var(--accent);outline:none}
.stats-container{max-width:640px;margin:0 auto}
.stats-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:14px;text-align:center}
.stat-card-value{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:2px;font-family:var(--font-display)}
.stat-card-label{font-size:11px;color:var(--text-muted)}
.stats-section{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:16px;margin-bottom:16px}
.stats-section-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.heatmap-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.heatmap-nav{display:flex;gap:6px;align-items:center}
.heatmap-nav button{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;font-family:inherit}
.heatmap-nav button:hover{border-color:var(--accent);color:var(--accent)}
.heatmap-month{font-size:14px;font-weight:600;min-width:100px;text-align:center}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heatmap-dow{font-size:10px;color:var(--text-muted);text-align:center;padding:2px 0}
.heatmap-cell{aspect-ratio:1;border-radius:3px;position:relative;cursor:default;transition:all 0.15s}
.heatmap-cell.empty{background:transparent}
.heatmap-cell.lv0{background:var(--border-light)}
.heatmap-cell.lv1{background:var(--accent-light);opacity:0.7}
.heatmap-cell.lv2{background:var(--accent);opacity:0.45}
.heatmap-cell.lv3{background:var(--accent);opacity:0.7}
.heatmap-cell.lv4{background:var(--accent);opacity:1}
.heatmap-cell.today-cell{box-shadow:inset 0 0 0 1.5px var(--accent)}
.heatmap-cell.selected-cell{box-shadow:inset 0 0 0 2px var(--text-primary);transform:scale(1.15);z-index:2}
.day-detail{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;margin-top:12px;animation:fadeIn .2s ease}
.day-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.day-detail-date{font-size:14px;font-weight:600}
.day-detail-total{font-size:13px;color:var(--accent);font-weight:600}
.day-detail-close{background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:4px}
.day-detail-close:hover{background:var(--border-light);color:var(--text-primary)}
.day-detail-rows{display:flex;flex-direction:column;gap:4px}
.day-detail-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0}
.day-detail-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.day-detail-name{flex:1;color:var(--text-secondary)}
.day-detail-time{font-weight:600;min-width:50px;text-align:right}
.day-detail-empty{font-size:12px;color:var(--text-muted);text-align:center;padding:8px 0}
.heatmap-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text-primary);color:var(--bg-primary);font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;z-index:10;pointer-events:none}
.heatmap-legend{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:8px;font-size:10px;color:var(--text-muted)}
.heatmap-legend-cell{width:12px;height:12px;border-radius:2px}
.heatmap-legend-cell.lv0{background:var(--border-light)}.heatmap-legend-cell.lv1{background:var(--accent-light);opacity:0.7}.heatmap-legend-cell.lv2{background:var(--accent);opacity:0.45}.heatmap-legend-cell.lv3{background:var(--accent);opacity:0.7}.heatmap-legend-cell.lv4{background:var(--accent);opacity:1}
.tracker-breakdown{display:flex;flex-direction:column;gap:8px}
.tracker-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.tracker-row:last-child{border-bottom:none}
.tracker-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tracker-name{font-size:13px;font-weight:500;flex:1}
.tracker-time{font-size:13px;font-weight:600;color:var(--accent)}
.tracker-bar-bg{flex:2;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden}
.tracker-bar{height:100%;border-radius:3px;transition:width 0.3s}
.main-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border-light);background:var(--bg-primary);flex-shrink:0}
.app-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.3px}
.header-actions{display:flex;gap:8px;align-items:center}
.today-work-badge{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;background:var(--bg-secondary);border:1px solid var(--border-light);font-size:12px;font-weight:500;color:var(--text-secondary);transition:all var(--transition);white-space:nowrap}
.today-work-badge .tw-time{color:var(--accent);font-weight:600}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--transition)}
.icon-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.tab-bar{display:flex;border-bottom:1px solid var(--border-light);background:var(--bg-primary);padding:0 24px;flex-shrink:0}
.tab-btn{flex:0 0 auto;padding:13px 20px;border:none;background:none;font-size:13px;font-weight:500;color:var(--tab-inactive);position:relative;transition:color var(--transition)}
.tab-btn.active{color:var(--accent);font-weight:600}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2.5px;background:var(--accent);border-radius:2px}
.tab-content{flex:1;padding:24px;overflow-y:auto;animation:fadeIn .3s ease}
.today-container{display:flex;flex-direction:column;align-items:center;gap:24px;padding-top:20px;max-width:560px;margin:0 auto}
.today-date{font-family:var(--font-display);font-size:15px;color:var(--text-muted);letter-spacing:1px}
.character-area{display:flex;flex-direction:column;align-items:center;gap:10px}
.character-img-wrapper{width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid var(--accent);box-shadow:0 4px 20px var(--shadow);background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition)}
.character-img-wrapper:hover{transform:scale(1.05);box-shadow:0 6px 28px var(--shadow-hover)}
.character-img-wrapper:active{transform:scale(.97)}
.character-img-wrapper img{width:100%;height:100%;object-fit:cover}
.character-placeholder{font-size:44px;color:var(--text-muted)}
.character-name{font-size:13px;color:var(--text-secondary);font-weight:500}
.click-hint{font-size:10px;color:var(--text-muted);margin-top:-4px}
.speech-bubble-container{width:100%;position:relative;animation:bubbleIn .5s ease}
.speech-bubble{background:var(--bubble-bg);border:1.5px solid var(--bubble-border);border-radius:var(--radius-lg);padding:24px;position:relative;box-shadow:0 4px 16px var(--shadow);min-height:80px}
.speech-bubble::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:10px solid var(--bubble-border)}
.speech-bubble::after{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:9px solid var(--bubble-bg)}
.bubble-text{font-family:var(--font-display);font-size:16px;line-height:1.8;text-align:center;word-break:keep-all}
.bubble-image{max-width:100%;border-radius:var(--radius-md);margin-top:12px}
.bubble-source{margin-top:12px;font-size:12px;color:var(--text-muted);text-align:right;font-style:italic}
.random-btn{padding:12px 28px;background:var(--accent);color:white;border:none;border-radius:var(--radius-xl);font-size:14px;font-weight:600;letter-spacing:.3px;box-shadow:0 4px 16px var(--accent-shadow);transition:all var(--transition);display:flex;align-items:center;gap:8px}
.random-btn:hover{background:var(--accent-hover);transform:translateY(-1px)}
.random-btn:active{transform:translateY(0)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state-icon{font-size:48px;margin-bottom:16px}
.empty-state-title{font-family:var(--font-display);font-size:18px;margin-bottom:8px;color:var(--text-secondary)}
.empty-state-desc{font-size:13px;line-height:1.6}
.manage-container{max-width:640px;margin:0 auto}
.manage-section{margin-bottom:28px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:var(--font-display);font-size:17px;font-weight:700}
.add-btn{padding:6px 14px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;transition:all var(--transition)}
.add-btn:hover{background:var(--accent-hover)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-size:14px;transition:border-color var(--transition);outline:none}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent)}
.form-textarea{min-height:80px;resize:vertical;line-height:1.6}
.image-drop-area{border:2px dashed var(--border);border-radius:var(--radius-md);padding:24px;text-align:center;color:var(--text-muted);font-size:13px;cursor:pointer;transition:all var(--transition)}
.image-drop-area:hover,.image-drop-area.drag-over{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.image-drop-area input[type="file"]{display:none}
.image-preview-wrapper{position:relative;display:inline-block;margin-top:10px}
.image-preview{max-width:100%;max-height:160px;border-radius:var(--radius-sm);object-fit:contain}
.image-remove-btn{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--danger);color:white;border:none;font-size:12px;display:flex;align-items:center;justify-content:center}
.tags-input-wrapper{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);min-height:40px;cursor:text}
.tags-input-wrapper:focus-within{border-color:var(--accent)}
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--tag-bg);color:var(--tag-text);border-radius:20px;font-size:12px;font-weight:500}
.tag-chip button{background:none;border:none;color:var(--tag-text);font-size:14px;padding:0;line-height:1;opacity:.7}
.tag-chip button:hover{opacity:1}
.tag-input{border:none;outline:none;background:none;font-size:13px;color:var(--text-primary);min-width:80px;flex:1}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-save{padding:8px 20px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all var(--transition)}
.btn-save:hover{background:var(--accent-hover)}
.btn-cancel{padding:8px 20px;background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all var(--transition)}
.btn-cancel:hover{background:var(--border-light)}
.item-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);margin-bottom:8px;transition:all var(--transition)}
.item-card:hover{border-color:var(--accent);box-shadow:0 2px 10px var(--shadow)}
.item-thumb{width:44px;height:44px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;background:var(--bg-secondary)}
.item-char-thumb{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg-secondary);border:2px solid var(--border)}
.item-info{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.item-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.item-tag{font-size:10px;padding:1px 7px;background:var(--tag-bg);color:var(--tag-text);border-radius:10px}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.item-action-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg-secondary);color:var(--text-muted);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.item-action-btn:hover{background:var(--border);color:var(--text-primary)}
.item-action-btn.danger:hover{background:var(--danger);color:white}
.today-char-badge{font-size:9px;padding:2px 6px;background:var(--accent);color:white;border-radius:10px;font-weight:600}
.category-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.category-chip{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg-card);color:var(--text-secondary);font-size:12px;display:flex;align-items:center;gap:6px}
.category-chip .remove-cat{background:none;border:none;color:var(--text-muted);font-size:14px;padding:0;cursor:pointer}
.category-chip .remove-cat:hover{color:var(--danger)}
.inline-add{display:flex;gap:6px}
.inline-add input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-size:13px;outline:none}
.inline-add input:focus{border-color:var(--accent)}
.inline-add button{padding:6px 12px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600}
.archive-container{max-width:800px;margin:0 auto}
.archive-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg-card);color:var(--text-secondary);font-size:12px;font-weight:500;transition:all var(--transition)}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:var(--accent);color:white;border-color:var(--accent)}
.archive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.archive-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;transition:all var(--transition);cursor:pointer}
.archive-card:hover{border-color:var(--accent);box-shadow:0 4px 16px var(--shadow-hover);transform:translateY(-2px)}
.archive-card-img{width:100%;height:130px;object-fit:cover;background:var(--bg-secondary)}
.archive-card-body{padding:12px}
.archive-card-text{font-size:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.archive-card-source{font-size:10px;color:var(--text-muted);margin-top:6px;font-style:italic}
.archive-card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal-content{background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px var(--shadow)}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:20px}
.detail-char-area{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.detail-char-img{width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}
.detail-bubble{background:var(--bubble-bg);border:1px solid var(--bubble-border);border-radius:var(--radius-lg);padding:20px;text-align:center}
.detail-image{max-width:100%;border-radius:var(--radius-md);margin-bottom:12px}
.detail-text{font-family:var(--font-display);font-size:15px;line-height:1.8}
.detail-float-actions{display:flex;gap:8px;justify-content:center;margin-top:16px}
.float-action-btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;display:flex;align-items:center;gap:5px;transition:all var(--transition)}
.float-action-btn.edit{background:var(--accent);color:white}
.float-action-btn.edit:hover{background:var(--accent-hover)}
.float-action-btn.delete{background:none;color:var(--danger);border:1px solid var(--danger)}
.float-action-btn.delete:hover{background:var(--danger);color:white}
.float-action-btn.close-btn{background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border)}
.count-badge{font-size:11px;padding:2px 8px;background:var(--bg-secondary);color:var(--text-muted);border-radius:10px;font-weight:500}
.loading-screen{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dl-calendar{border-top:1px solid var(--border-light);padding:12px;flex-shrink:0}
.dl-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dl-cal-title{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px}
.dl-cal-month{font-size:11px;color:var(--text-muted);font-weight:500}
.dl-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;margin-bottom:6px}
.dl-cal-dow{font-size:9px;color:var(--text-muted);padding:2px 0}
.dl-cal-day{font-size:10px;padding:3px 0 5px;border-radius:4px;position:relative;color:var(--text-secondary)}
.dl-cal-day.today{background:var(--accent-light);color:var(--accent);font-weight:700}
.dl-cal-day.past{color:var(--text-muted);opacity:.5}
.dl-cal-day.has-dl{font-weight:600;color:var(--text-primary);cursor:default}
.dl-cal-dot{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.dl-cal-dot.overdue{background:var(--danger)}
.dl-cal-dots{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);display:flex;gap:1px}
.dl-cal-dots .dot{width:4px;height:4px;border-radius:50%}
.dot-commission{background:var(--accent)}
.dot-conti{background:#4285F4}
.dot-rough{background:#34A853}
.dot-artwork{background:#E8A000}
.dot-review{background:#9C27B0}
.dot-submission{background:#EA4335}
.dl-list-icon{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:4px}
.dl-list-item{font-size:10px;display:flex;justify-content:space-between;align-items:center;padding:3px 6px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:6px;line-height:1.3}
.dl-list{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.dl-list-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary)}
.dl-list-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;margin-left:4px;flex-shrink:0}
.dl-list-tag.soon{background:var(--accent-light);color:var(--accent)}
.dl-list-tag.overdue{background:rgba(212,91,91,0.15);color:var(--danger)}
.dl-list-tag.normal{background:var(--bg-secondary);color:var(--text-muted)}
.dl-empty{font-size:10px;color:var(--text-muted);text-align:center;padding:8px 0}
/* Status Button (header) */
.status-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius-xl);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition);position:relative}
.status-btn:hover{box-shadow:0 2px 10px var(--shadow);transform:translateY(-1px)}
.status-btn:active{transform:translateY(0)}
.status-btn-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.popup-mood-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.popup-mood-chip.work{background:var(--accent-light);color:var(--accent)}
.popup-mood-chip.rest{background:rgba(91,168,122,.15);color:var(--success)}
.popup-mood-chip.both{background:var(--bg-secondary);color:var(--text-muted)}
/* Popup Toast */
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
.popup-toast{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;align-items:flex-start;gap:10px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 32px var(--shadow-hover);max-width:320px;animation:toastIn .4s ease forwards}
.popup-toast.hiding{animation:toastOut .4s ease forwards}
.popup-toast-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--accent)}
.popup-toast-avatar-placeholder{width:40px;height:40px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid var(--accent)}
.popup-toast-body{flex:1;min-width:0}
.popup-toast-name{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px}
.popup-toast-text{font-family:var(--font-display);font-size:13px;line-height:1.6;color:var(--text-primary);word-break:keep-all}
.popup-toast-close{position:absolute;top:6px;right:8px;width:18px;height:18px;border:none;background:none;color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%}
.popup-toast-close:hover{background:var(--bg-secondary);color:var(--text-primary)}
/* Popup Tab */
.popup-container{max-width:640px;margin:0 auto}
.popup-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);margin-bottom:20px}
.popup-toggle-label{font-size:14px;font-weight:500}
.popup-toggle-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.toggle-switch input{display:none}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:background .25s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;background:white;border-radius:50%;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-switch input:checked~.toggle-knob{transform:translateX(20px)}
.popup-line-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);margin-bottom:8px;transition:all var(--transition)}
.popup-line-card:hover{border-color:var(--accent);box-shadow:0 2px 10px var(--shadow)}
.popup-line-text{flex:1;font-size:13px;line-height:1.5;min-width:0;word-break:keep-all}
.popup-add-area{display:flex;gap:8px;margin-top:12px}
.popup-add-area textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-size:13px;resize:none;min-height:42px;outline:none;font-family:var(--font-body);line-height:1.5}
.popup-add-area textarea:focus{border-color:var(--accent)}
.popup-add-area button{padding:10px 16px;align-self:flex-end}
.popup-stats{font-size:11px;color:var(--text-muted);margin-bottom:8px;display:flex;gap:12px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
/* SW 등록 */
let swReg=null;
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").then(r=>{swReg=r}).catch(()=>{})}

const{useState,useEffect,useRef,useCallback,useMemo}=React;
const gid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,6);
function sr(seed){let h=0;for(let i=0;i<seed.length;i++)h=Math.imul(31,h)+seed.charCodeAt(i)|0;return()=>{h=Math.imul(h^(h>>>16),0x45d9f3b);h=Math.imul(h^(h>>>13),0x45d9f3b);return((h^(h>>>16))>>>0)/4294967296}}
const today=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const fmtDate=s=>{const d=new Date(s);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${'일월화수목금토'[d.getDay()]})`};

/* ── IndexedDB helpers ── */
const DB_NAME='CharHappyCal';
const DB_VER=1;
const openDB=()=>new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('meta'))db.createObjectStore('meta');if(!db.objectStoreNames.contains('images'))db.createObjectStore('images')};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const idbGet=async(store,key)=>{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const rq=tx.objectStore(store).get(key);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error)})};
const idbPut=async(store,key,val)=>{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const rq=tx.objectStore(store).put(val,key);rq.onsuccess=()=>res();rq.onerror=()=>rej(rq.error)})};
const idbDel=async(store,key)=>{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const rq=tx.objectStore(store).delete(key);rq.onsuccess=()=>res();rq.onerror=()=>rej(rq.error)})};
const idbAllKeys=async(store)=>{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const rq=tx.objectStore(store).getAllKeys();rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error)})};

/* ── Firebase 초기화 & 인증 ── */
const firebaseApp=firebase.initializeApp({apiKey:"AIzaSyC5zu4j-_ZChJQcEAEAZn9oBY1_amymnEM",authDomain:"happycalendar-1dd07.firebaseapp.com",projectId:"happycalendar-1dd07",storageBucket:"happycalendar-1dd07.firebasestorage.app",messagingSenderId:"961264346042",appId:"1:961264346042:web:35c85ff0a1c02ab2acb383"});
const fireDb=firebaseApp.firestore();
const fireAuth=firebaseApp.auth();
const googleProvider=new firebase.auth.GoogleAuthProvider();

const syncToFirebase=async(dateKey,data)=>{
  try{await fireDb.collection('dailyStats').doc(dateKey).set(data,{merge:true});
  }catch(e){console.warn('Firebase sync failed:',e)}
};

const readFromFirebase=async(dateKey)=>{
  try{const doc=await fireDb.collection('dailyStats').doc(dateKey).get();
    return doc.exists?doc.data():null;
  }catch(e){console.warn('Firebase read failed:',e);return null}
};

const syncMonthToFirebase=async(yearMonth,cells,rmLog)=>{
  try{
    const data={};
    cells.forEach(c=>{if(c&&c.key){
      data[c.key]={comm:c.comm||0,doodle:c.doodle||0,doj:c.doj||0,novel:c.novel||0,dev:c.dev||0,etc:c.etc||0,total:c.total||0};
    }});
    await fireDb.collection('monthlyStats').doc(yearMonth).set(data,{merge:true});
  }catch(e){console.warn('Firebase month sync failed:',e)}
};

const gFav=u=>{try{const h=new URL(u).hostname;if(!h)return null;return`https://www.google.com/s2/favicons?domain=${h}&sz=64`}catch{return null}};
const DEF={entries:[],characters:[],categories:[],bookmarks:[],popupLines:[],settings:{todayCharacterId:null,darkMode:false,popupEnabled:true,myStatus:'off'}};

function App(){
  const[data,setData]=useState(DEF),[iC,setIC]=useState({}),[tab,setTab]=useState('today'),[loaded,setLoaded]=useState(false);
  useEffect(()=>{document.documentElement.setAttribute('data-theme',data.settings.darkMode?'dark':'light')},[data.settings.darkMode]);

  /* ── load from IndexedDB on mount ── */
  useEffect(()=>{(async()=>{try{const saved=await idbGet('meta','appData');const d=saved?{...DEF,...saved,bookmarks:saved.bookmarks||[],popupLines:saved.popupLines||[],settings:{...DEF.settings,...(saved.settings||{})}}:DEF;setData(d);const imgKeys=await idbAllKeys('images');const cache={};for(const k of imgKeys){const v=await idbGet('images',k);if(v)cache[k]=v}setIC(cache)}catch(e){console.error('Load error:',e)}setLoaded(true)})()},[]);

  const save=useCallback(async nd=>{setData(nd);try{await idbPut('meta','appData',nd)}catch(e){console.error('Save error:',e)}},[]);

  const sI=async du=>{const fn=`img_${gid()}.${du.startsWith('data:image/png')?'png':'jpg'}`;await idbPut('images',fn,du);setIC(p=>({...p,[fn]:du}));return fn};
  const rmI=async fn=>{if(!fn)return;await idbDel('images',fn);setIC(p=>{const n={...p};delete n[fn];return n})};
  const backupRef=useRef(null);

  const doBackup=async()=>{try{const imgKeys=await idbAllKeys('images');const imgs={};for(const k of imgKeys){const v=await idbGet('images',k);if(v)imgs[k]=v}const backup={version:1,exportedAt:new Date().toISOString(),appData:data,images:imgs};const blob=new Blob([JSON.stringify(backup)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`행복일력_백업_${today().replace(/-/g,'')}.json`;a.click();URL.revokeObjectURL(url)}catch(e){alert('백업 중 오류가 발생했습니다: '+e.message)}};

  const doRestore=async e=>{const file=e.target.files?.[0];if(!file)return;e.target.value='';try{const text=await file.text();const backup=JSON.parse(text);if(!backup.appData){alert('올바른 백업 파일이 아닙니다.');return}if(!confirm(`이 백업을 복원하면 현재 데이터가 모두 대체됩니다.\n백업 시점: ${backup.exportedAt?new Date(backup.exportedAt).toLocaleString('ko-KR'):'알 수 없음'}\n계속하시겠습니까?`))return;const nd={...DEF,...backup.appData,bookmarks:backup.appData.bookmarks||[],popupLines:backup.appData.popupLines||[],settings:{...DEF.settings,...(backup.appData.settings||{})}};await idbPut('meta','appData',nd);if(backup.images){const oldKeys=await idbAllKeys('images');for(const k of oldKeys)await idbDel('images',k);for(const[k,v]of Object.entries(backup.images))await idbPut('images',k,v);setIC(backup.images)}setData(nd);alert('복원이 완료되었습니다!')}catch(e){alert('복원 중 오류가 발생했습니다: '+e.message)}};

  if(!loaded)return(<div className="loading-screen"><div style={{fontSize:56}}>📖</div><div className="loading-spinner"/><p style={{fontSize:13,color:'var(--text-muted)'}}>데이터를 불러오는 중...</p></div>);

  return(<div className="app-root">
    <Sidebar data={data} save={save}/>
    <div className="main-area">
      <header className="app-header"><span className="app-title">📖 캐릭터 행복 일력</span><div className="header-actions"><TodayWorkTime onClick={()=>setTab('stats')}/><StatusBtn data={data} save={save}/><button className="icon-btn" onClick={doBackup} title="백업">💾</button><button className="icon-btn" onClick={()=>backupRef.current?.click()} title="복원">📂</button><input type="file" ref={backupRef} accept=".json" onChange={doRestore} style={{display:'none'}}/><button className="icon-btn" onClick={()=>save({...data,settings:{...data.settings,darkMode:!data.settings.darkMode}})} title="테마 전환">{data.settings.darkMode?'☀️':'🌙'}</button></div></header>
      <nav className="tab-bar">{[['today','오늘'],['manage','등록/관리'],['archive','아카이브'],['popup','팝업 대사'],['stats','통계']].map(([k,l])=><button key={k} className={`tab-btn ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>)}</nav>
      <div className="tab-content" key={tab}>
        {tab==='today'&&<TodayTab data={data} iC={iC}/>}
        {tab==='manage'&&<ManageTab data={data} save={save} iC={iC} sI={sI} rmI={rmI}/>}
        {tab==='archive'&&<ArchiveTab data={data} save={save} iC={iC} sI={sI} rmI={rmI}/>}
        {tab==='popup'&&<PopupTab data={data} save={save} iC={iC}/>}
        {tab==='stats'&&<StatsTab/>}
      </div>
    </div>
    <PopupToast data={data} iC={iC}/>
  </div>);
}

function DeadlineCalendar(){
  const[dls,setDls]=useState([]);

  useEffect(()=>{
    const load=async()=>{
      const items=[];
      try{
        const[commDlDoc,dojDlDoc]=await Promise.all([
          fireDb.collection('trackerSync').doc('deadlines_commission').get(),
          fireDb.collection('trackerSync').doc('deadlines_doujinshi').get()
        ]);
        if(commDlDoc.exists)(commDlDoc.data().items||[]).forEach(c=>items.push(c));
        if(dojDlDoc.exists)(dojDlDoc.data().items||[]).forEach(c=>items.push(c));
      }catch(e){console.warn('Deadline load failed:',e)}
      setDls(items);
    };
    load();const iv=setInterval(load,30000);return()=>clearInterval(iv);
  },[]);

  const now=new Date();now.setHours(0,0,0,0);
  const ty=now.getFullYear(),tm=now.getMonth(),td=now.getDate();

  if(!dls.length)return <div className="dl-calendar"><div className="dl-cal-header"><span className="dl-cal-title">마감 일정</span></div><div className="dl-empty">진행 중인 마감이 없어요 ✨</div></div>;

  const parseDL=s=>{const p=s.split('-');return{y:+p[0],m:+p[1]-1,d:+p[2]}};
  const dotCls=t=>({commission:'dot-commission',conti:'dot-conti',rough:'dot-rough',artwork:'dot-artwork',review:'dot-review',submission:'dot-submission'}[t]||'dot-commission');
  const iconCls=t=>({commission:'var(--accent)',conti:'#4285F4',rough:'#34A853',artwork:'#E8A000',review:'#9C27B0',submission:'#EA4335'}[t]||'var(--accent)');

  // 가장 가까운 마감의 월을 기준으로 달력 표시 (지난 달이면 이번 달)
  const sorted=[...dls].sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const nr=parseDL(sorted[0].deadline);
  const calY=(nr.y<ty||(nr.y===ty&&nr.m<tm))?ty:nr.y;
  const calM=(nr.y<ty||(nr.y===ty&&nr.m<tm))?tm:nr.m;

  const firstDay=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const isCM=calY===ty&&calM===tm;
  const dlMap={};dls.forEach(c=>{const p=parseDL(c.deadline);if(p.y===calY&&p.m===calM){if(!dlMap[p.d])dlMap[p.d]=[];dlMap[p.d].push(c)}});
  const cells=Array(firstDay).fill(null).concat(Array.from({length:dim},(_,i)=>i+1));

  // D-day 기준 가장 가까운 3건
  const withDiff=dls.map(c=>{const p=parseDL(c.deadline);const dlD=new Date(p.y,p.m,p.d);const diff=Math.ceil((dlD-now)/86400000);return{...c,diff}});
  const upcoming=withDiff.filter(c=>c.diff>=0).sort((a,b)=>a.diff-b.diff);
  const overdue=withDiff.filter(c=>c.diff<0).sort((a,b)=>b.diff-a.diff);
  const top3=[...upcoming,...overdue].slice(0,3);

  return(<div className="dl-calendar">

/* ── TodayWorkTime: Firebase에서 트래커 데이터 읽기 ── */
function TodayWorkTime({onClick}){
  const[total,setTotal]=useState(0);
  useEffect(()=>{
    const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};

    const update=async()=>{
      try{
        const tk=todayStr();
        const[commDoc,novelDoc,rmDoc,dojDoc,mlDoc]=await Promise.all([
          fireDb.collection('trackerSync').doc('commission').get(),
          fireDb.collection('trackerSync').doc('novel').get(),
          fireDb.collection('remoteManualLog').doc(tk).get(),
          fireDb.collection('trackerSync').doc('doujinshi').get(),
          fireDb.collection('trackerSync').doc('manualLog').get()
        ]);
        // 커미션 작업시간
        let comm=0,doodle=0;
        if(commDoc.exists){const dl=commDoc.data().dailyLog||{};const entry=dl[tk]||{};comm=entry.comm||0;doodle=entry.doodle||0}
        // 동인지 작업시간
        let doj=0;
        if(dojDoc.exists){const dl=dojDoc.data().dailyLog||{};doj=dl[tk]||0}
        // 소설 작업시간
        let novel=0,novelChars=0;
        if(novelDoc.exists){const nd=novelDoc.data();const dl=nd.dailyLog||{};novel=dl[tk]||0;const wl=nd.dailyWritingLog||{};novelChars=wl[tk]||0}
        // 수동 기록 (daily-log에서 입력한 것)
        let rm=0;
        if(rmDoc.exists){const d=rmDoc.data();rm=(d.dev||0)+(d.etc||0)}
        // 수동 기록 (행복일력에서 입력한 것)
        let manDev=0,manEtc=0;
        if(mlDoc.exists){const ml=mlDoc.data().data||{};const entry=ml[tk]||{};manDev=(entry.dev||0);manEtc=(entry.etc||0)}
        // 동인지 작업량(페이지 등)
        let dojOut={dojConti:0,dojRough:0,dojArtwork:0,dojWritingPages:0,dojWritingChars:0};
        if(dojDoc.exists){const wo=dojDoc.data().workOutput||{};const entry=wo[tk]||{};dojOut={dojConti:entry.conti||0,dojRough:entry.rough||0,dojArtwork:entry.artwork||0,dojWritingPages:entry.wPages||0,dojWritingChars:entry.wChars||0}}

        const t=comm+doodle+doj+novel+manDev+manEtc;
        setTotal(t);
        syncToFirebase(tk,{comm,doodle,doj,novel,dev:manDev,etc:manEtc,manual:manDev+manEtc,total:comm+doodle+doj+novel+manDev+manEtc,updatedAt:Date.now(),
          workOutput:{...dojOut,novelChars}
        });
      }catch(e){console.warn('TodayWorkTime update failed:',e)}
    };
    update();const iv=setInterval(update,15000);return()=>clearInterval(iv);
  },[]);

  const fmtTW=s=>{if(s<60)return'0m';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}h ${m}m`:`${m}m`};
  return(<div className="today-work-badge" title="오늘의 총 작업시간 — 클릭하여 통계 보기" onClick={onClick} style={{cursor:onClick?'pointer':'default'}}>⏱ 오늘 <span className="tw-time">{fmtTW(total)}</span></div>);
}

/* ── Chime Sound (부드러운 차임벨 - 뽀모도로와 구별) ── */
function playChime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523.25,659.25,783.99]; /* C5 E5 G5 - 밝은 화음 */
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.type='sine';osc.frequency.value=freq;
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.15);
      gain.gain.linearRampToValueAtTime(0.12,ctx.currentTime+i*0.15+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.6);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.15);osc.stop(ctx.currentTime+i*0.15+0.6);
    });
    setTimeout(()=>ctx.close(),2000);
  }catch(e){}
}

function PopupToast({data,iC}){
  const[show,setShow]=useState(false),[hiding,setHiding]=useState(false),[line,setLine]=useState(''),[char,setChar]=useState(null);
  const timerRef=useRef(null);const checkRef=useRef(null);
  const blinkRef=useRef(null);const origTitle=useRef(document.title);const pendingRef=useRef(null);

  const pickLine=(status)=>{
    const pool=data.popupLines.filter(l=>!l.mood||l.mood==='both'||l.mood===status);
    if(!pool.length)return null;
    return pool[Math.floor(Math.random()*pool.length)];
  };
  const pickChar=(ln)=>{
    if(ln.characterId){const c=data.characters.find(x=>x.id===ln.characterId);if(c)return c}
    return data.characters.length?data.characters[Math.floor(Math.random()*data.characters.length)]:null;
  };

  const stopBlink=useCallback(()=>{
    if(blinkRef.current){clearInterval(blinkRef.current);blinkRef.current=null}
    document.title=origTitle.current;
  },[]);

  const startBlink=useCallback((name)=>{
    stopBlink();
    let on=true;
    blinkRef.current=setInterval(()=>{document.title=on?`💬 ${name||'캐릭터'}의 메시지!`:origTitle.current;on=!on},1000);
  },[stopBlink]);

  const showPopup=useCallback((ln,ch)=>{
    setChar(ch);setLine(ln);setShow(true);setHiding(false);
    if(timerRef.current)clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>{setHiding(true);setTimeout(()=>setShow(false),400)},10000);
  },[]);

  /* 탭 돌아왔을 때 밀린 팝업 표시 */
  useEffect(()=>{
    const onVisible=()=>{
      if(!document.hidden&&pendingRef.current){
        const{text,ch}=pendingRef.current;pendingRef.current=null;
        stopBlink();showPopup(text,ch);
      }
    };
    document.addEventListener('visibilitychange',onVisible);
    return()=>document.removeEventListener('visibilitychange',onVisible);
  },[showPopup,stopBlink]);

  useEffect(()=>{
    const handler=()=>{
      const st=data.settings.myStatus||'off';const status=st==='off'?'work':st;
      const ln=pickLine(status);if(!ln)return;
      showPopup(ln.text,pickChar(ln));
    };
    window.addEventListener('test-popup',handler);
    return()=>window.removeEventListener('test-popup',handler);
  },[data.popupLines,data.characters,data.settings.myStatus,showPopup]);

  useEffect(()=>{
    const status=data.settings.myStatus||'off';
    if(status==='off'||!data.settings.popupEnabled||!data.popupLines.length)return;
    const check=()=>{
      const curStatus=data.settings.myStatus||'off';
      if(curStatus==='off'||!data.popupLines.length||!data.settings.popupEnabled)return;
      const ps=getPS();const now=Date.now();
      const elapsed=now-(ps.lastTrigger||now);const interval=(ps.nextInterval||1800)*1000;
      if(!ps.lastTrigger){setPS({...ps,lastTrigger:now,nextInterval:(20+Math.random()*20)*60});return}
      if(elapsed>=interval){
        const ln=pickLine(curStatus);if(!ln){setPS({...ps,lastTrigger:now,nextInterval:(20+Math.random()*20)*60});return}
        const ch=pickChar(ln);
        if(document.hidden){
          pendingRef.current={text:ln.text,ch};
          startBlink(ch?.name);
          playChime();
          if(Notification.permission==='granted'){
            try{if(swReg){swReg.showNotification((ch?.name||'캐릭터')+' 💬',{body:ln.text,tag:'happiness-popup'});}else{new Notification((ch?.name||'캐릭터')+' 💬',{body:ln.text,tag:'happiness-popup'});}}catch(e){}
          }
        }else{showPopup(ln.text,ch)}
        setPS({lastTrigger:now,nextInterval:(20+Math.random()*20)*60});
      }
    };
    check();checkRef.current=setInterval(check,15000);
    return()=>{if(checkRef.current)clearInterval(checkRef.current);if(timerRef.current)clearTimeout(timerRef.current);stopBlink()};
  },[data.settings.popupEnabled,data.settings.myStatus,data.popupLines,data.characters,iC,showPopup,startBlink,stopBlink]);

  const dismiss=()=>{setHiding(true);setTimeout(()=>setShow(false),400)};
  if(!show)return null;
  const ci=char?.imageFile&&iC[char.imageFile];
  return(<div className={`popup-toast${hiding?' hiding':''}`}>
    <button className="popup-toast-close" onClick={dismiss}>✕</button>
    {ci?<img src={ci} alt="" className="popup-toast-avatar"/>:<div className="popup-toast-avatar-placeholder">🧸</div>}
    <div className="popup-toast-body">{char&&<div className="popup-toast-name">{char.name}</div>}<div className="popup-toast-text">{line}</div></div>
  </div>);
}
