<script>
const DB_NAME="timeline-db",DB_VER=1,SK="posts",AK="avatar",TICK=4000,LR=.15,RR=.05,CR=.03,ML=2000,MR=2000,MC=10;
const CM=["이 구도 너무 좋아요!","색감이 예뻐요 ✨","와 분위기 있다...","이거 천재 아님?","눈이 행복해지는 그림","계속 보게 돼요","감성 미쳤다","이 조합 최고예요!","퀄리티 대박...","새 작품 기대돼요!","이 느낌 좋아요 💕","작가님 팬이에요","RT 해가요!","타임라인 정화 감사","오늘도 눈호강","진짜 잘 그리신다","분위기 장인...","이 커플 너무 좋아","심장에 칼 꽂힘","해석이 너무 좋아요"];
const UN=["달빛사냥꾼","고양이집사","새벽감성","별헤는밤","구름위산책","햇살한모금","꿈꾸는붓","잉크요정","종이비행기","무지개다리","바람의노래","숲속여우","하늘연필","보름달떡","파도소리","벚꽃길","수채화하늘","밤하늘별","따뜻한차","마음정원"];
const AC=["#FF6B9D","#C084FC","#60A5FA","#34D399","#FBBF24","#F87171","#A78BFA","#38BDF8"];
/* Firebase */
const fbCfg={apiKey:"AIzaSyC5zu4j-_ZChJQcEAEAZn9oBY1_amymnEM",authDomain:"happycalendar-1dd07.firebaseapp.com",projectId:"happycalendar-1dd07",storageBucket:"happycalendar-1dd07.firebasestorage.app",messagingSenderId:"961264346042",appId:"1:961264346042:web:35c85ff0a1c02ab2acb383"};
firebase.initializeApp(fbCfg);const fdb=firebase.firestore();const FB_COL="my-timeline-posts",FB_CFG="my-timeline-config";
const fireAuth=firebase.auth();const googleProvider=new firebase.auth.GoogleAuthProvider();
function compImg(d,mw=800,q=0.85){return new Promise(r=>{const i=new Image;i.onload=()=>{const c=document.createElement("canvas");let w=i.width,h=i.height;if(w>mw){h=Math.round(h*mw/w);w=mw}c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);r(c.toDataURL("image/jpeg",q))};i.src=d})}
async function fbSave(post){try{const d={...post};if(d.images&&d.images.length)d.images=await Promise.all(d.images.map(img=>img.length>100000?compImg(img):Promise.resolve(img)));await fdb.collection(FB_COL).doc(String(post.id)).set(d)}catch(e){console.error("FB save:",e)}}
async function fbDel(id){try{await fdb.collection(FB_COL).doc(String(id)).delete()}catch(e){console.error("FB del:",e)}}
async function fbSaveAv(src){try{const s=src&&src.length>50000?await compImg(src,128,.7):src;await fdb.collection(FB_CFG).doc("avatar").set({src:s||null})}catch(e){console.error("FB av:",e)}}
async function fbLoad(){try{const s=await fdb.collection(FB_COL).get();return s.docs.map(d=>d.data())}catch(e){console.error("FB load:",e);return null}}
async function fbLoadAv(){try{const d=await fdb.collection(FB_CFG).doc("avatar").get();return d.exists?d.data().src:null}catch(e){return null}}
function delPost(i){const id=posts[i].id;posts.splice(i,1);sv();fbDel(id);render()}
/* IndexedDB wrapper */
let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains("kv"))d.createObjectStore("kv")};req.onsuccess=e=>{db=e.target.result;res(db)};req.onerror=e=>rej(e)})}
function dbGet(key){return new Promise((res,rej)=>{const tx=db.transaction("kv","readonly");const st=tx.objectStore("kv");const r=st.get(key);r.onsuccess=()=>res(r.result!==undefined?r.result:null);r.onerror=()=>res(null)})}
function dbSet(key,val){return new Promise((res,rej)=>{const tx=db.transaction("kv","readwrite");const st=tx.objectStore("kv");st.put(val,key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}
let posts=[],avSrc=null,pend=[],exp={},shArc=false,arcM=null,arcT=null,lbI=null,lbX=0,shMenu=false,lastTick=Date.now();
function sv(){dbSet(SK,posts)}
function svAv(){dbSet(AK,avSrc);fbSaveAv(avSrc)}
function ta(ts){const s=Math.floor((Date.now()-ts)/1e3);if(s<60)return"방금 전";const m=Math.floor(s/60);if(m<60)return m+"분 전";const h=Math.floor(m/60);if(h<24)return h+"시간 전";return Math.floor(h/24)+"일 전"}
function pk(a){return a[Math.floor(Math.random()*a.length)]}function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmt(n){return n>=1e3?(n/1e3).toFixed(1).replace(/\.0$/,"")+"k":n}
function mk(ts){const d=new Date(ts);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function ml(k){const[y,m]=k.split("-");return y+"년 "+parseInt(m)+"월"}
function ptags(s){return s.split(/[\s,]+/).map(t=>t.replace(/^#*/,"").trim()).filter(Boolean).map(t=>"#"+t)}
function avH(sz=40){return avSrc?`<div class="av" style="width:${sz}px;height:${sz}px"><img src="${avSrc}"></div>`:`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.4}px">룹</div>`}
function updCAv(){const el=document.getElementById("cAv"),d=document.getElementById("avDef");if(avSrc){if(!el.querySelector("img")){const i=document.createElement("img");i.src=avSrc;el.insertBefore(i,d)}else el.querySelector("img").src=avSrc;d.style.display="none"}}
document.getElementById("avIn").addEventListener("change",e=>{const f=e.target.files[0];if(!f||!f.type.startsWith("image/"))return;const r=new FileReader;r.onload=ev=>{const i=new Image;i.onload=()=>{const c=document.createElement("canvas");c.width=128;c.height=128;const ctx=c.getContext("2d"),s=Math.min(i.width,i.height);ctx.drawImage(i,(i.width-s)/2,(i.height-s)/2,s,s,0,0,128,128);avSrc=c.toDataURL("image/jpeg",.8);svAv();updCAv();render();toast("프로필 사진 변경 완료! ✨")};i.src=ev.target.result};r.readAsDataURL(f);e.target.value=""});
function simReact(ticks){let ch=false;posts.forEach(p=>{for(let i=0;i<ticks;i++){const age=(Date.now()-p.createdAt)/1e3,rate=Math.max(.15,1-age/7200);if(Math.random()<rate*LR&&p.likes<ML){p.likes=Math.min(ML,p.likes+Math.ceil(Math.random()*3));ch=true}if(Math.random()<rate*RR&&p.retweets<MR){p.retweets=Math.min(MR,p.retweets+1);ch=true}if(Math.random()<rate*CR&&p.comments.length<MC){p.comments.push({id:Date.now()+Math.random(),username:pk(UN),text:pk(CM),time:Date.now()-(ticks-i)*TICK});ch=true}}});return ch}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&posts.length){const missed=Math.min(Math.floor((Date.now()-lastTick)/TICK),500);if(missed>1&&simReact(missed)){sv();render()}lastTick=Date.now()}});
function gridH(imgs){if(!imgs||!imgs.length)return"";const n=Math.min(imgs.length,4);return`<div class="ig g${n}">${imgs.slice(0,4).map((s,i)=>`<img class="gi${i}" src="${s}" onclick="openLB(${JSON.stringify(imgs).replace(/"/g,'&quot;')},${i})">`).join("")}</div>`}
function tagH(tags){if(!tags||!tags.length)return"";return`<div style="margin-top:8px">${tags.map(t=>`<button class="tp${arcT===t?" on":""}" onclick="event.stopPropagation();clickTag('${t}')">${t}</button>`).join("")}</div>`}
function updPrev(){const b=document.getElementById("imgPrev"),h=document.getElementById("htTxt");if(!pend.length){b.innerHTML="";h.textContent="Ctrl+V 붙여넣기 (최대 4장)"}else{let s='<div class="pg">';pend.forEach((img,i)=>{s+=`<div class="pi"><img src="${img}"><button class="pr" onclick="pend.splice(${i},1);updPrev()">×</button></div>`});if(pend.length<4)s+=`<div class="pa" onclick="document.getElementById('fIn').click()">+ 추가</div>`;s+='</div>';b.innerHTML=s;h.textContent=pend.length+"/4장 선택됨"}updBtn()}
function updTagPrev(){const v=document.getElementById("tagIn").value,b=document.getElementById("tagPrev");if(!v.trim()){b.innerHTML="";return}b.innerHTML=ptags(v).map(t=>`<span class="tpv">${t}</span>`).join("")}
function addImg(d){if(pend.length<4){pend.push(d);updPrev()}}
function updBtn(){document.getElementById("pBtn").disabled=!document.getElementById("cTxt").value.trim()&&!pend.length}
function togArc(){shArc=!shArc;document.getElementById("aToggle").classList.toggle("on",shArc);renderArc()}
function togMenu(){shMenu=!shMenu;document.getElementById("menuDrop").style.display=shMenu?"block":"none";document.getElementById("menuOvr").style.display=shMenu?"block":"none";document.getElementById("mToggle").classList.toggle("on",shMenu)}
function setMon(m){arcM=m;render()}function setTag(t){arcT=arcT===t?null:t;render()}
function clickTag(t){arcT=arcT===t?null:t;shArc=true;document.getElementById("aToggle").classList.add("on");render()}
function doBackup(){const d=JSON.stringify({posts,avatarSrc:avSrc,exportedAt:new Date().toISOString(),version:"public-v1"},null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`타임라인_백업_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);togMenu();toast("백업 파일 다운로드 완료! 📦")}
document.getElementById("restIn").addEventListener("change",e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader;r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.posts&&Array.isArray(d.posts)){posts=d.posts;sv();if(d.avatarSrc){avSrc=d.avatarSrc;svAv();updCAv()}render();toast(`복원 완료! ${d.posts.length}개의 포스트 🎉`)}else toast("올바른 백업 파일이 아니에요 😥")}catch(err){toast("파일을 읽을 수 없어요 😥")}};r.readAsText(f);e.target.value="";togMenu()});
function renderArc(){const mb=document.getElementById("arcMonths"),tb=document.getElementById("arcTags");if(!shArc||!posts.length){mb.style.display="none";tb.style.display="none";return}const mm={},tm={};posts.forEach(p=>{const k=mk(p.createdAt);mm[k]=(mm[k]||0)+1;(p.tags||[]).forEach(t=>{tm[t]=(tm[t]||0)+1})});const ks=Object.keys(mm).sort().reverse();if(ks.length){mb.style.display="flex";mb.innerHTML=`<button class="pill${arcM===null?" on":""}" onclick="setMon(null)">전체 (${posts.length})</button>`+ks.map(k=>`<button class="pill${arcM===k?" on":""}" onclick="setMon('${k}')">${ml(k)} (${mm[k]})</button>`).join("")}else mb.style.display="none";const tks=Object.entries(tm).sort((a,b)=>b[1]-a[1]);if(tks.length){tb.style.display="flex";tb.innerHTML=`<span style="font-size:12px;color:#536471;flex-shrink:0;align-self:center">🏷️</span>`+tks.map(([t,c])=>`<button class="pill${arcT===t?" on":""}" onclick="setTag('${t}')" style="font-size:12px;padding:4px 10px">${t} (${c})</button>`).join("")}else tb.style.display="none"}
function render(){const isFlt=arcM||arcT;const fp=posts.filter(p=>{if(arcM&&mk(p.createdAt)!==arcM)return false;if(arcT&&!(p.tags||[]).includes(arcT))return false;return true});document.getElementById("pCnt").textContent=posts.length+"개";document.getElementById("emSt").style.display=fp.length?"none":"block";if(!fp.length){document.getElementById("emSt").querySelector("p").innerHTML=isFlt?"조건에 맞는 포스트가 없어요":"아직 포스트가 없어요<br>그림을 붙여넣거나 드래그해서 올려보세요!";document.getElementById("emSt").querySelector(".ic").textContent=isFlt?"🔍":"🌙"}document.getElementById("cmpSec").style.display=isFlt?"none":"block";const fh=document.getElementById("fltHd");if(isFlt){fh.style.display="block";fh.innerHTML=`<div class="fhd"><button class="fbk" onclick="arcM=null;arcT=null;render()">←</button><span style="font-weight:700;font-size:15px">${arcM?`📅 ${ml(arcM)}`:""}${arcM&&arcT?" · ":""}${arcT?`🏷️ ${arcT}`:""}</span><span style="color:#536471;font-size:13px">${fp.length}개의 포스트</span></div>`}else fh.style.display="none";renderArc();const tl=document.getElementById("tl");tl.innerHTML="";fp.forEach(post=>{const pi=post.images||(post.image?[post.image]:[]);const gIdx=posts.indexOf(post);const card=document.createElement("div");card.className="pc";let cmH="";if(exp[post.id]&&post.comments.length)cmH=`<div class="cms">${post.comments.map(c=>`<div class="cmi"><div class="cma" style="background:${AC[c.username.charCodeAt(0)%8]}">${c.username[0]}</div><div><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:600;font-size:13px">${c.username}</span><span style="color:#536471;font-size:12px">${ta(c.time)}</span></div><p style="font-size:14px;color:#D9D9D9;margin-top:2px">${c.text}</p></div></div>`).join("")}</div>`;card.innerHTML=`<button class="dl" onclick="delPost(${gIdx})">✕</button><div class="pn">${avH(40)}<div class="prt"><div class="ph"><span style="font-weight:700;font-size:15px">룹</span><span style="color:#1D9BF0;font-size:14px">✓</span><span style="color:#8899A6;font-size:13px">· ${ta(post.createdAt)}</span></div>${post.text?`<p class="pt">${esc(post.text)}</p>`:""}${tagH(post.tags)}${gridH(pi)}<div class="ab"><button class="act cc" onclick="exp['${post.id}']=!exp['${post.id}'];render()"><span>💬</span> ${post.comments.length||""}</button><button class="act rr"><span>🔁</span> ${post.retweets?fmt(post.retweets):""}</button><button class="act lk"><span>${post.likes>0?"❤️":"🤍"}</span>${post.likes>0?`<span class="lc">${fmt(post.likes)}</span>`:""}</button><button class="act bm" onclick="posts[${gIdx}].bookmarked=!posts[${gIdx}].bookmarked;sv();render()"><span>${post.bookmarked?"🔖":"📑"}</span></button></div>${cmH}</div></div>`;tl.appendChild(card)})}
function toast(m){const o=document.querySelector(".toast");if(o)o.remove();const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2100)}
document.getElementById("pBtn").addEventListener("click",()=>{const t=document.getElementById("cTxt").value.trim();const ti=document.getElementById("tagIn").value;if(!t&&!pend.length)return;const tags=ptags(ti);const np={id:Date.now().toString(),text:t,images:[...pend],tags,likes:Math.floor(Math.random()*3)+1,retweets:0,comments:[],createdAt:Date.now(),bookmarked:false};posts.unshift(np);sv();fbSave(np);render();document.getElementById("cTxt").value="";document.getElementById("tagIn").value="";document.getElementById("tagPrev").innerHTML="";pend=[];updPrev();toast("포스팅 완료! 💫")});
document.getElementById("cTxt").addEventListener("input",updBtn);document.getElementById("tagIn").addEventListener("input",updTagPrev);
document.getElementById("fIn").addEventListener("change",e=>{Array.from(e.target.files).forEach(f=>{if(!f.type.startsWith("image/"))return;const r=new FileReader;r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f)});e.target.value=""});
window.addEventListener("paste",e=>{const it=e.clipboardData?.items;if(!it)return;for(const i of it){if(i.type.startsWith("image/")){e.preventDefault();const r=new FileReader;r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(i.getAsFile());break}}});
const cb=document.getElementById("cmpBox");cb.addEventListener("dragover",e=>{e.preventDefault();cb.classList.add("dg");if(!pend.length)document.getElementById("dropZ").style.display="block"});cb.addEventListener("dragleave",()=>{cb.classList.remove("dg");document.getElementById("dropZ").style.display="none"});cb.addEventListener("drop",e=>{e.preventDefault();cb.classList.remove("dg");document.getElementById("dropZ").style.display="none";Array.from(e.dataTransfer.files).forEach(f=>{if(!f.type.startsWith("image/"))return;const r=new FileReader;r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f)})});
function openLB(imgs,idx){lbI=imgs;lbX=idx;renderLB()}function closeLB(){document.getElementById("lbox").style.display="none";lbI=null}function renderLB(){if(!lbI)return;const lb=document.getElementById("lbox");lb.style.display="flex";let dots=lbI.length>1?`<div class="lbd">${lbI.map((_,i)=>`<div class="ldd${i===lbX?" on":""}"></div>`).join("")}</div>`:"";let prev=lbI.length>1&&lbX>0?`<button class="lbp" onclick="event.stopPropagation();lbX--;renderLB()">◀</button>`:"";let next=lbI.length>1&&lbX<lbI.length-1?`<button class="lbn" onclick="event.stopPropagation();lbX++;renderLB()">▶</button>`:"";lb.innerHTML=`<div onclick="event.stopPropagation()"><img src="${lbI[lbX]}" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px"></div><button class="lbc" onclick="event.stopPropagation();closeLB()">✕</button>${prev}${next}${dots}`}
window.addEventListener("keydown",e=>{if(!lbI)return;if(e.key==="Escape")closeLB();if(e.key==="ArrowLeft"&&lbX>0){lbX--;renderLB()}if(e.key==="ArrowRight"&&lbX<lbI.length-1){lbX++;renderLB()}});
setInterval(()=>{lastTick=Date.now();if(!posts.length)return;if(simReact(1)){sv();render()}},TICK);
setInterval(render,60000);
let appInitialized=false;
fireAuth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('authGate').style.display='none';
    document.getElementById('appWrap').style.display='';
    if(!appInitialized){appInitialized=true;initApp()}
  }else{
    document.getElementById('authGate').style.display='flex';
    document.getElementById('appWrap').style.display='none';
  }
});
async function initApp(){
  try{
  await openDB();
  let p=await dbGet(SK),a=await dbGet(AK);
  console.log("🔍 IndexedDB posts:",p,Array.isArray(p)?"(배열)":"(배열 아님!)");
  console.log("🔍 IndexedDB avatar:",a?"있음":"없음");
  const lsKeys=[];for(let i=0;i<localStorage.length;i++)lsKeys.push(localStorage.key(i));
  console.log("🔍 localStorage 전체 키:",lsKeys);
  lsKeys.forEach(k=>{try{const v=localStorage.getItem(k);const parsed=JSON.parse(v);if(Array.isArray(parsed))console.log(`  📦 ${k}: 배열 ${parsed.length}개`);else console.log(`  📦 ${k}: ${typeof parsed}`)}catch(e){console.log(`  📦 ${k}: 문자열`)}});
  /* Ensure p is array */
  if(!Array.isArray(p))p=[];
  /* Merge: always combine localStorage data into IndexedDB */
  const existingIds=new Set(p.map(x=>String(x.id)));
  console.log("🔍 기존 ID 수:",existingIds.size);
  for(const k of["timeline-posts","tl-posts"]){
    const old=localStorage.getItem(k);
    if(!old)continue;
    console.log(`🔄 ${k} 발견, 파싱 시도...`);
    try{
      const parsed=JSON.parse(old);
      if(!Array.isArray(parsed)){console.log(`  ⚠️ ${k}는 배열이 아님`);continue}
      console.log(`  📊 ${k}: ${parsed.length}개 포스트`);
      const newOnes=parsed.filter(x=>!existingIds.has(String(x.id)));
      console.log(`  🆕 중복 제외 신규: ${newOnes.length}개`);
      if(newOnes.length){
        p=p.concat(newOnes);
        p.sort((a,b)=>b.createdAt-a.createdAt);
        newOnes.forEach(x=>existingIds.add(String(x.id)));
        console.log(`  ✅ ${k}에서 ${newOnes.length}개 포스트 병합 완료!`)
      }
      localStorage.removeItem(k);
    }catch(e){console.error(`  ❌ ${k} 파싱 실패:`,e)}
  }
  if(p.length){posts=p;await dbSet(SK,p);console.log("💾 총",posts.length,"개 포스트 저장 완료")}
  if(!a){for(const k of["timeline-avatar","tl-av"]){const old=localStorage.getItem(k);if(old){a=old;await dbSet(AK,a);localStorage.removeItem(k);break}}}
  if(a)avSrc=a;
  updCAv();render();
  /* Firebase 동기화 */
  try{
    const fbP=await fbLoad(),fbA=await fbLoadAv();
    if(fbP){
      const localIds=new Set(posts.map(x=>String(x.id)));
      const fbIds=new Set(fbP.map(x=>String(x.id)));
      const fromFb=fbP.filter(x=>!localIds.has(String(x.id)));
      if(fromFb.length){posts=posts.concat(fromFb);posts.sort((a,b)=>b.createdAt-a.createdAt)}
      const localOnly=posts.filter(x=>!fbIds.has(String(x.id)));
      for(const lp of localOnly)await fbSave(lp);
      if(fromFb.length||localOnly.length){sv();render()}
    }else if(posts.length){for(const lp of posts)await fbSave(lp)}
    if(fbA&&!avSrc){avSrc=fbA;dbSet(AK,avSrc);updCAv();render()}
    else if(avSrc&&!fbA)fbSaveAv(avSrc);
    console.log("☁️ Firebase 동기화 완료");toast("클라우드 동기화 완료! ☁️");
  }catch(e){console.error("FB sync err:",e)}
  }catch(e){console.error("❌ 초기화 에러:",e)}
}
</script></body></html>
